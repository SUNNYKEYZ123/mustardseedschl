<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-ID Verification Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { createClient } = window.supabase;
        
        // Using your exact database credentials from "no enter time (2).html"
        const SB_URL = 'https://jqrcoqslmylmubxwfgyt.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU';
        const _supabase = createClient(SB_URL, SB_KEY);

        const IdVerifier = () => {
            const [msId, setMsId] = React.useState('');
            const [status, setStatus] = React.useState('idle'); // idle, loading, success, error
            const [studentData, setStudentData] = React.useState(null);

            const checkId = async () => {
                if(!msId) return alert("Please enter your ID");
                setStatus('loading');
                const inputId = msId.toUpperCase().trim();

                try {
                    // Pulling from the same table used for exam login
                    const { data } = await _supabase.from('students').select('*').eq('status', 'Enrolled');
                    const found = data?.find(s => ("MS-" + s.id.substring(0, 5).toUpperCase()) === inputId);

                    if (found) {
                        setStudentData({
                            name: found.full_name,
                            class: found.grade_level || found.class || 'SSS 1'
                        });
                        setStatus('success');
                    } else {
                        setStatus('error');
                    }
                } catch (e) {
                    alert("System error connecting to database.");
                    setStatus('idle');
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 animate-in">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border w-full max-w-md text-center">
                        <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" className="w-20 mx-auto mb-6" />
                        <h1 className="text-3xl font-black mb-2 uppercase tracking-tighter">ID Verification</h1>
                        <p className="text-slate-400 mb-10 text-[10px] font-black uppercase tracking-[0.3em]">Pre-Exam Status Check</p>

                        <div className="space-y-4">
                            <input 
                                className="w-full p-5 border-2 border-slate-100 rounded-2xl uppercase text-center font-black bg-slate-50 text-blue-600 outline-none focus:border-blue-400 transition-all" 
                                placeholder="ENTER MS-ID" 
                                value={msId}
                                onChange={e => setMsId(e.target.value)} 
                            />
                            
                            {status !== 'success' && (
                                <button 
                                    onClick={checkId} 
                                    className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-blue-600 transition-colors"
                                >
                                    {status === 'loading' ? 'Checking...' : 'Verify My ID'}
                                </button>
                            )}

                            {status === 'success' && (
                                <div className="space-y-4 animate-in">
                                    <div className="bg-green-50 border border-green-100 p-6 rounded-[2rem]">
                                        <p className="text-[10px] font-black text-green-600 uppercase mb-2 tracking-widest">✅ Verified</p>
                                        <h3 className="text-xl font-black text-slate-800 uppercase leading-tight">{studentData.name}</h3>
                                        <p className="text-xs font-bold text-slate-400 mt-1 uppercase italic">{studentData.class}</p>
                                    </div>
                                    <p className="text-slate-500 text-[10px] font-bold uppercase tracking-tight">Your ID is working perfectly. You are cleared for the exam.</p>
                                    <button onClick={() => {setMsId(''); setStatus('idle');}} className="text-blue-600 text-[10px] font-black uppercase border-b border-blue-600 pb-1 mt-4">Check Another ID</button>
                                </div>
                            )}

                            {status === 'error' && (
                                <div className="space-y-4 animate-in">
                                    <div className="bg-red-50 border border-red-100 p-6 rounded-[2rem]">
                                        <p className="text-[10px] font-black text-red-600 uppercase mb-2 tracking-widest">❌ ID Not Found</p>
                                        <p className="text-xs font-bold text-slate-600">This ID is not in our system. Please contact your Class Teacher.</p>
                                    </div>
                                    <button onClick={() => setStatus('idle')} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">Try Again</button>
                                </div>
                            )}
                        </div>
                    </div>
                    <p className="mt-10 text-[9px] font-black text-slate-300 uppercase tracking-widest">Mustard Seed School • Ibokun</p>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<IdVerifier />);
    </script>
</body>
</html>
