<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Mustard Seed School Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            background-color: rgba(255, 255, 255, 0.8);
        }
        
        .logo-container {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin: 0 auto 1.5rem auto;
            border: 3px solid #c60bf5;
        }
        
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #be0bf5, #f59e0b, #5c0bdf);
        }
        
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .input-group i.main-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .input-field {
            width: 100%;
            padding: 0.75rem 2.5rem 0.75rem 2.5rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
        }
        
        .reset-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(90deg, #f50bce, #164bf9);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        
        .reset-btn:hover {
            background: linear-gradient(90deg, #16f921, #0bf580);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        
        .status-msg { font-size: 0.85rem; margin-top: 0.5rem; text-align: center; }
        .error-text { color: #ef4444; }
        .success-text { color: #10b981; }
        
        .footer-text { text-align: center; margin-top: 1.5rem; color: #6b7280; font-size: 0.85rem; }
        .footer-text a { color: #f59e0b; font-weight: 500; }
        .school-name { text-align: center; font-size: 1.5rem; font-weight: 700; color: #1f2937; margin-bottom: 0.25rem; }
        .school-motto { text-align: center; color: #6b7280; font-size: 0.9rem; margin-bottom: 1.5rem; font-style: italic; }
        
        .toggle-password-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" alt="School Logo" style="width: 80px; height: auto;" />
        </div>
        <h1 class="school-name">Mustard Seed School</h1>
        <p class="school-motto">Account Recovery Panel</p>
        
        <!-- STEP 1: Enter Email Form -->
        <form id="requestForm">
            <div class="input-group">
                <i class="fas fa-envelope main-icon"></i>
                <input type="email" id="resetEmail" class="input-field" placeholder="Enter Registered Email Address" style="padding-left: 2.5rem; padding-right: 1rem;">
            </div>
            
            <button type="button" onclick="sendResetLink()" class="reset-btn action-btn">
                <i class="fas fa-paper-plane mr-2"></i> Send Recovery Link
            </button>
        </form>

        <!-- STEP 2: New Password Form (Hidden initially, automatically shows when returning via email link) -->
        <form id="updateForm" class="hidden">
            <div class="input-group">
                <i class="fas fa-lock main-icon"></i>
                <input type="password" id="newPassword" class="input-field" placeholder="Enter New Password">
                <button type="button" onclick="toggleVisibility('newPassword', 'eyeIcon1')" class="toggle-password-btn">
                    <i id="eyeIcon1" class="fas fa-eye"></i>
                </button>
            </div>

            <div class="input-group">
                <i class="fas fa-lock main-icon"></i>
                <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm New Password">
                <button type="button" onclick="toggleVisibility('confirmPassword', 'eyeIcon2')" class="toggle-password-btn">
                    <i id="eyeIcon2" class="fas fa-eye"></i>
                </button>
            </div>
            
            <button type="button" onclick="updatePassword()" class="reset-btn update-btn">
                <i class="fas fa-save mr-2"></i> Save New Password
            </button>
        </form>
        
        <div class="status-msg" id="statusMessage"></div>
        
        <p class="footer-text">
            Remembered your password? <a href="login.html">Back to Login</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://jqrcoqslmylmubxwfgyt.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU';
        const mySupabase = window.supabase.createClient(SB_URL, SB_KEY);

        window.onload = function() {
            // Automatically detect if the student clicked the link inside their email
            if (window.location.hash && window.location.hash.includes('access_token=')) {
                document.getElementById('requestForm').classList.add('hidden');
                document.getElementById('updateForm').classList.remove('hidden');
                document.getElementById('statusMessage').className = 'status-msg success-text';
                document.getElementById('statusMessage').textContent = 'Secure link verified. Please enter your new password below.';
            }
        };

        function toggleVisibility(fieldId, iconId) {
            const field = document.getElementById(fieldId);
            const icon = document.getElementById(iconId);
            if (field.type === 'password') {
                field.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                field.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // Action 1: Send reset password email links to students
        async function sendResetLink() {
            const email = document.getElementById('resetEmail').value.trim();
            const statusDiv = document.getElementById('statusMessage');
            const btn = document.querySelector('.action-btn');

            statusDiv.textContent = '';
            if (!email) {
                statusDiv.className = 'status-msg error-text';
                statusDiv.textContent = 'Please enter your email address.';
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Sending...';
            btn.disabled = true;

            try {
                const { error } = await mySupabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.href, // Returns them right back to this page to set the password
                });

                if (error) throw error;

                statusDiv.className = 'status-msg success-text';
                statusDiv.textContent = 'Recovery email sent! Please check your inbox/spam folder.';
                btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i> Link Sent';
                btn.style.background = '#10b981';

            } catch (err) {
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Send Recovery Link';
                btn.disabled = false;
                statusDiv.className = 'status-msg error-text';
                statusDiv.textContent = err.message;
            }
        }

        // Action 2: Process and update password directly in Supabase Auth
        async function updatePassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const statusDiv = document.getElementById('statusMessage');
            const btn = document.querySelector('.update-btn');

            statusDiv.textContent = '';

            if (!newPassword || !confirmPassword) {
                statusDiv.className = 'status-msg error-text';
                statusDiv.textContent = 'Please fill out all password fields.';
                return;
            }

            if (newPassword !== confirmPassword) {
                statusDiv.className = 'status-msg error-text';
                statusDiv.textContent = 'Passwords do not match.';
                return;
            }

            if (newPassword.length < 6) {
                statusDiv.className = 'status-msg error-text';
                statusDiv.textContent = 'Password must be at least 6 characters long.';
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Saving...';
            btn.disabled = true;

            try {
                const { error } = await mySupabase.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                statusDiv.className = 'status-msg success-text';
                statusDiv.textContent = 'Password saved successfully! Redirecting to login desk...';
                btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i> Updated!';
                btn.style.background = '#10b981';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                btn.innerHTML = '<i class="fas fa-save mr-2"></i> Save New Password';
                btn.disabled = false;
                statusDiv.className = 'status-msg error-text';
                statusDiv.textContent = err.message;
            }
        }
    </script>
</body>
</html>
