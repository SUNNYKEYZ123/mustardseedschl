<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Result Manager | MSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .active-tab { @apply bg-blue-600 text-white; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-white h-screen sticky top-0 hidden md:flex flex-col p-6 shadow-2xl">
        <div class="flex items-center gap-3 mb-10">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-8 w-8">
            <span class="font-black tracking-tighter text-blue-400 uppercase text-xs">Mustard Seed Admin</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="switchTab('results')" id="btn-results" class="w-full flex items-center gap-3 p-3 bg-blue-600 rounded-xl font-bold text-sm transition"><i data-lucide="award" class="w-4 h-4"></i> Result Manager</button>
            <button onclick="switchTab('curriculum')" id="btn-curriculum" class="w-full flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-800 rounded-xl text-sm transition"><i data-lucide="book-open" class="w-4 h-4"></i> Subject Manager</button>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-10">
        <section id="section-results">
            <header class="mb-8 flex justify-between items-end">
                <div>
                    <h1 class="text-3xl font-black text-slate-800 tracking-tighter italic">Result Control Center</h1>
                    <p class="text-slate-500 font-medium text-sm">Manage academic scores for 170+ students.</p>
                </div>
                <div id="save-indicator" class="hidden bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-black shadow-lg">SAVING DATA...</div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-5 bg-slate-50 border-b">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-slate-400"></i>
                            <input type="text" id="searchBar" placeholder="Search students..." class="w-full pl-10 pr-4 py-2 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 ring-blue-500 outline-none text-sm font-medium">
                        </div>
                    </div>
                    <div id="studentContainer" class="divide-y max-h-[600px] overflow-y-auto"></div>
                </div>

                <div id="editorPanel" class="lg:col-span-8 hidden">
                    <div class="bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
                        <div class="p-8 bg-blue-900 text-white flex justify-between items-center">
                            <div>
                                <h2 id="st-name" class="text-2xl font-black italic">Student Name</h2>
                                <p id="st-info" class="text-blue-300 text-xs font-bold uppercase tracking-widest">Loading...</p>
                            </div>
                            <select id="res-status" class="bg-blue-800 text-white font-bold text-xs p-2 rounded-lg border-none">
                                <option value="Draft">DRAFT</option>
                                <option value="Published">PUBLISHED</option>
                            </select>
                        </div>

                        <div class="p-8 space-y-6">
                            <div class="flex justify-between items-center">
                                <h3 class="font-black text-slate-800 text-sm uppercase">Subject Scores</h3>
                                <button onclick="addRow()" class="text-blue-600 font-bold text-xs flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i> Add Row</button>
                            </div>
                            <div class="border rounded-2xl overflow-hidden">
                                <table class="w-full text-sm">
                                    <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-black">
                                        <tr>
                                            <th class="p-3 text-left">Subject</th>
                                            <th class="p-3 text-center">Test (30)</th>
                                            <th class="p-3 text-center">Exam (70)</th>
                                            <th class="p-3"></th>
                                        </tr>
                                    </thead>
                                    <tbody id="scoreTable"></tbody>
                                </table>
                            </div>
                            <button onclick="saveAll()" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-800 transition-all uppercase">Update Report Card</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-curriculum" class="hidden">
            <header class="mb-8">
                <h1 class="text-3xl font-black text-slate-800 tracking-tighter italic">Subject Manager</h1>
                <p class="text-slate-500 font-medium text-sm">Assign teachers like Uncle Sunday to specific subjects and classes.</p>
            </header>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 bg-slate-50 p-6 rounded-2xl">
                    <input type="text" id="new-class" placeholder="Class (e.g. JSS 1)" class="p-3 rounded-xl border border-slate-200 text-sm font-bold">
                    <input type="text" id="new-subject" placeholder="Subject Name" class="p-3 rounded-xl border border-slate-200 text-sm font-bold">
                    <input type="text" id="new-teacher" placeholder="Teacher Name" class="p-3 rounded-xl border border-slate-200 text-sm font-bold">
                    <button onclick="saveCurriculum()" class="bg-blue-600 text-white font-black rounded-xl text-sm">ADD ASSIGNMENT</button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[10px] uppercase font-black text-slate-400 border-b">
                            <tr>
                                <th class="p-4">Class</th>
                                <th class="p-4">Subject</th>
                                <th class="p-4">Assigned Teacher</th>
                                <th class="p-4">Action</th>
                            </tr>
                        </thead>
                        <tbody id="curriculumTable" class="divide-y text-sm font-medium"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Replace with your actual Supabase Key
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'YOUR_KEY_HERE');
        let students = [];
        let curriculum = [];
        let activeStudent = null;

        // --- NAVIGATION ---
        function switchTab(tab) {
            document.getElementById('section-results').classList.toggle('hidden', tab !== 'results');
            document.getElementById('section-curriculum').classList.toggle('hidden', tab !== 'curriculum');
            
            document.getElementById('btn-results').className = tab === 'results' ? 'w-full flex items-center gap-3 p-3 bg-blue-600 rounded-xl font-bold text-sm text-white' : 'w-full flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-800 rounded-xl text-sm transition';
            document.getElementById('btn-curriculum').className = tab === 'curriculum' ? 'w-full flex items-center gap-3 p-3 bg-blue-600 rounded-xl font-bold text-sm text-white' : 'w-full flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-800 rounded-xl text-sm transition';
            
            if (tab === 'curriculum') fetchCurriculum();
        }

        // --- DATA FETCHING ---
        async function fetchStudents() {
            const { data } = await _supabase.from('students').select('*').order('full_name');
            if (data) { students = data; renderList(data); }
            lucide.createIcons();
        }

        async function fetchCurriculum() {
            const { data } = await _supabase.from('school_curriculum').select('*').order('class_name');
            if (data) {
                curriculum = data;
                const tbody = document.getElementById('curriculumTable');
                tbody.innerHTML = data.map(c => `
                    <tr>
                        <td class="p-4 font-bold text-blue-600">${c.class_name}</td>
                        <td class="p-4">${c.subject_name}</td>
                        <td class="p-4 italic text-slate-500">${c.assigned_teacher}</td>
                        <td class="p-4"><button onclick="deleteCurriculum(${c.id})" class="text-red-400 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                    </tr>
                `).join('');
                lucide.createIcons();
            }
        }

        // --- SUBJECT MANAGER LOGIC ---
        async function saveCurriculum() {
            const className = document.getElementById('new-class').value.toUpperCase();
            const subName = document.getElementById('new-subject').value.toUpperCase();
            const teacher = document.getElementById('new-teacher').value;

            if(!className || !subName || !teacher) return alert("Fill all fields");

            const { error } = await _supabase.from('school_curriculum').insert([{ class_name: className, subject_name: subName, assigned_teacher: teacher }]);
            if(!error) {
                document.getElementById('new-subject').value = "";
                fetchCurriculum();
            }
        }

        async function deleteCurriculum(id) {
            await _supabase.from('school_curriculum').delete().eq('id', id);
            fetchCurriculum();
        }

        // --- RESULT EDITOR LOGIC ---
        function openEditor(id) {
            activeStudent = students.find(s => s.id === id);
            document.getElementById('section-results').querySelector('#emptyPanel')?.classList.add('hidden');
            document.getElementById('editorPanel').classList.remove('hidden');
            
            document.getElementById('st-name').innerText = activeStudent.full_name;
            document.getElementById('st-info').innerText = `${activeStudent.grade_level} • 2025/2026 Session`;
            document.getElementById('res-status').value = activeStudent.result_status || 'Draft';
            
            const table = document.getElementById('scoreTable');
            table.innerHTML = "";
            const subjects = Array.isArray(activeStudent.subjects) ? activeStudent.subjects : [];
            subjects.forEach(sub => addRow(sub.name, sub.test, sub.exam));
            if(subjects.length === 0) addRow();
        }

        function addRow(name="", test=0, exam=0) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="p-2"><input type="text" value="${name}" class="sub-name w-full p-2 bg-slate-50 border-none rounded text-xs font-bold uppercase" placeholder="Subject"></td>
                <td class="p-2"><input type="number" value="${test}" class="sub-test w-full p-2 bg-slate-50 border-none rounded text-xs text-center font-bold"></td>
                <td class="p-2"><input type="number" value="${exam}" class="sub-exam w-full p-2 bg-slate-50 border-none rounded text-xs text-center font-bold"></td>
                <td class="p-2 text-center"><button onclick="this.parentElement.parentElement.remove()" class="text-red-400"><i data-lucide="x" class="w-4 h-4"></i></button></td>
            `;
            document.getElementById('scoreTable').appendChild(tr);
            lucide.createIcons();
        }

        async function saveAll() {
            const indicator = document.getElementById('save-indicator');
            indicator.classList.remove('hidden');

            // 1. Fetch the teacher curriculum first to ensure it's up to date
            const { data: currentCurriculum } = await _supabase.from('school_curriculum').select('*').eq('class_name', activeStudent.grade_level);

            const subNames = document.querySelectorAll('.sub-name');
            const subTests = document.querySelectorAll('.sub-test');
            const subExams = document.querySelectorAll('.sub-exam');
            
            const subjects = [];
            subNames.forEach((n, i) => {
                if(n.value) {
                    const subjectUpper = n.value.toUpperCase();
                    // AUTO-LINK: Find the teacher from our curriculum table
                    const match = currentCurriculum?.find(c => c.subject_name.toUpperCase() === subjectUpper);
                    
                    subjects.push({ 
                        name: subjectUpper, 
                        test: Number(subTests[i].value), 
                        exam: Number(subExams[i].value),
                        teacher: match ? match.assigned_teacher : "Not Assigned" 
                    });
                }
            });

            const { error } = await _supabase.from('students').update({
                subjects: subjects,
                result_status: document.getElementById('res-status').value
            }).eq('id', activeStudent.id);
            
            indicator.classList.add('hidden');
            if(!error) fetchStudents(); else alert(error.message);
        }

        function renderList(list) {
            const container = document.getElementById('studentContainer');
            container.innerHTML = list.map(s => `
                <div onclick="openEditor('${s.id}')" class="p-4 hover:bg-blue-50 cursor-pointer transition flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden flex items-center justify-center">
                            <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <div>
                            <p class="text-xs font-black text-slate-800 uppercase">${s.full_name}</p>
                            <p class="text-[10px] text-slate-400 font-bold">${s.grade_level}</p>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        document.getElementById('searchBar').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            renderList(students.filter(s => s.full_name.toLowerCase().includes(val)));
        };

        window.onload = fetchStudents;
    </script>
</body>
</html>
