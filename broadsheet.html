<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Records | Broadsheet</title>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; }
        
        /* Table Styles to match image */
        table { border: 1.5px solid black !important; }
        th, td { border: 1px solid black !important; padding: 4px 2px; }
        th { background: #fff; text-transform: uppercase; font-size: 9px; line-height: 1; }
        
        .sidebar-dark { background: #0f172a; }
        
        @media print { 
            .no-print { display: none !important; } 
            body { padding: 0; margin: 0; }
            .main-content { width: 100% !important; margin: 0 !important; padding: 10px !important; }
            table { width: 100%; font-size: 8px; }
        }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- NAVIGATION SIDEBAR -->
    <aside class="w-64 sidebar-dark text-slate-400 p-6 hidden md:flex flex-col no-print">
        <div class="flex items-center gap-3 mb-10">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <span class="text-white font-black tracking-tighter text-xl uppercase">MSS Admin</span>
        </div>
        
        <nav class="space-y-1 flex-1">
            <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600 text-white font-bold text-sm">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> Broadsheet
            </button>
        </nav>

        <div class="mt-auto pt-6 border-t border-slate-800 space-y-4">
            <button onclick="window.print()" class="w-full flex items-center justify-center gap-2 bg-slate-800 py-3 rounded-xl text-white font-black text-xs">
                <i data-lucide="printer" class="w-4 h-4"></i> Print Broadsheet
            </button>
            <a href="admin2.html" class="block text-center text-xs font-black text-slate-500 hover:text-white uppercase">← Dashboard</a>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 p-4 md:p-8">
        
        <!-- HEADER CONTROL BAR -->
        <header class="mb-6 no-print flex flex-wrap gap-4 items-end">
            <div class="flex-1">
                <h1 class="text-2xl font-black uppercase text-slate-900">Broadsheet Generator</h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Select class and term to view results</p>
            </div>
            
            <div class="flex gap-2">
                <select id="classSelector" onchange="loadData()" class="p-3 rounded-xl border-2 border-slate-200 font-bold text-sm uppercase outline-none">
                    <option value="">Select Class...</option>
                    <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                    <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                </select>

                <select id="termSelector" onchange="loadData()" class="p-3 rounded-xl border-2 border-blue-200 text-blue-700 font-bold text-sm uppercase outline-none">
                    <option value="1">1st Term</option>
                    <option value="2">2nd Term</option>
                    <option value="3">3rd Term (Cumulative)</option>
                </select>
            </div>
        </header>

        <!-- OFFICIAL DOCUMENT HEADER (Visible on Print) -->
        <div class="text-center mb-6">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-16 w-16 mx-auto mb-2">
            <h1 class="text-3xl font-black uppercase tracking-tight">Mustard Seed International Group of Schools</h1>
            <p class="text-[10px] font-bold uppercase tracking-[0.3em] mb-4">P.O. BOX 107, IBOKUN OSUN STATE</p>
            <p class="text-[10px] font-bold uppercase tracking-[0.3em] mb-4">Christ is Our Conner Stone <br>Tel:0803366423</p>
            <div class="border-y-2 border-black py-1 inline-block px-10">
                <p id="docSubTitle" class="text-xs font-black uppercase">Official Academic Broadsheet - --- | 2026/2027</p>
            </div>
        </div>

        <!-- TABLE AREA -->
        <div class="overflow-x-auto">
            <table id="broadsheetTable" class="w-full text-center align-middle">
                <!-- Content Generated by JS -->
            </table>
        </div>
    </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        
        let students = [], curriculum = [];

        async function loadData() {
            const classLevel = document.getElementById('classSelector').value;
            if(!classLevel) return;

            const { data: st } = await _supabase.from('students').select('*').eq('grade_level', classLevel);
            const { data: cu } = await _supabase.from('school_curriculum').select('*').eq('class_name', classLevel);
            
            students = st || [];
            curriculum = cu || [];
            
            document.getElementById('docSubTitle').innerText = `Official Academic Broadsheet - ${classLevel} | 2026/2027`;
            renderBroadsheet();
            lucide.createIcons();
        }

        function renderBroadsheet() {
            const currentTerm = document.getElementById('termSelector').value;
            const termKey = `term${currentTerm}`;

            // Header Row
            let html = `<thead><tr><th class="w-[180px]">Student Name</th>`;
            curriculum.forEach(c => {
                // Short name logic (e.g., MATHEMATICS -> MATH)
                let shortName = c.subject_name.length > 5 ? c.subject_name.substring(0, 4) : c.subject_name;
                html += `<th class="w-12">${shortName}</th>`;
            });
            html += `<th class="bg-slate-100">AGG</th><th class="bg-slate-100">AVG</th><th class="bg-slate-200">CUM %</th></tr></thead><tbody>`;

            // Data Rows
            students.forEach(s => {
                const termScores = s.term_data?.[termKey] || [];
                let rowTotal = 0;
                let subCount = 0;

                html += `<tr><td class="text-left font-black px-2 uppercase text-[10px]">${s.full_name}</td>`;
                
                curriculum.forEach(c => {
                    const scoreObj = termScores.find(ts => ts.name === c.subject_name);
                    const score = scoreObj ? (parseFloat(scoreObj.test) || 0) + (parseFloat(scoreObj.exam) || 0) : 0;
                    
                    if (score > 0) { rowTotal += score; subCount++; }
                    html += `<td>${score > 0 ? score : '-'}</td>`;
                });

                const avg = subCount > 0 ? (rowTotal / subCount).toFixed(1) : '0.0';

                // Cumulative Calculation: (Term 1 + Term 2 + Term 3) / 3
                const t1Data = s.term_data?.term1 || [];
                const t2Data = s.term_data?.term2 || [];
                const t3Data = s.term_data?.term3 || [];

                const getTermAvg = (data) => {
                    let t = 0, c = 0;
                    data.forEach(x => { t += (parseFloat(x.test)||0) + (parseFloat(x.exam)||0); c++; });
                    return c > 0 ? (t / c) : 0;
                };

                const cumTotal = getTermAvg(t1Data) + getTermAvg(t2Data) + getTermAvg(t3Data);
                const cumulativePercent = (cumTotal / 3).toFixed(1);

                html += `<td class="font-black bg-slate-50">${rowTotal}</td>`;
                html += `<td class="font-black bg-slate-50">${avg}</td>`;
                html += `<td class="font-black bg-slate-100">${cumulativePercent}</td></tr>`;
            });

            document.getElementById('broadsheetTable').innerHTML = html + `</tbody>`;
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
