<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar { width: 280px; background: #0f172a; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .hidden-row { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <aside class="sidebar text-white p-6 fixed h-screen flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <span class="font-black italic text-xl tracking-tighter uppercase text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> Student Directory</button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="award"></i> Results Engine</button>
        </nav>
        <button onclick="handleLogout()" class="nav-link text-red-400 hover:bg-red-400/10 mt-auto"><i data-lucide="log-out"></i> Logout</button>
    </aside>

    <main class="flex-1 ml-[280px] p-10">
        
        <section id="view-directory" class="view-section active">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-4xl font-black text-slate-900 uppercase">Directory</h1>
                    <p class="text-blue-600 text-xs font-black uppercase">Total Students: <span id="count-dir">0</span></p>
                </div>
                <input type="text" id="dirSearch" onkeyup="filterDirectory()" placeholder="Search Name or MS-ID..." class="px-6 py-4 rounded-2xl border-none shadow-xl ring-1 ring-slate-200 text-sm font-bold w-80 uppercase outline-none">
            </div>
            <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] uppercase font-black text-slate-400">
                        <tr><th class="p-6">Student</th><th class="p-6">ID</th><th class="p-6">Group</th><th class="p-6">Status</th><th class="p-6 text-right">Actions</th></tr>
                    </thead>
                    <tbody id="directoryTable" class="divide-y divide-slate-50 uppercase text-[11px] font-bold"></tbody>
                </table>
            </div>
        </section>

        <section id="view-engine" class="view-section">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 bg-white rounded-3xl border h-[80vh] flex flex-col overflow-hidden shadow-sm">
                    <div class="p-6 bg-slate-50 border-b">
                        <input type="text" id="engSearch" onkeyup="filterEngine()" placeholder="Search Student..." class="w-full p-4 rounded-xl border-none ring-1 ring-slate-200 text-xs font-black uppercase outline-none">
                    </div>
                    <div id="engineList" class="overflow-y-auto divide-y"></div>
                </div>
                
                <div id="editorPanel" class="lg:col-span-8 bg-white rounded-3xl border shadow-2xl hidden flex flex-col overflow-hidden">
                    <div class="p-8 bg-blue-900 text-white flex justify-between items-center">
                        <div>
                            <h2 id="editName" class="text-2xl font-black uppercase tracking-tighter">---</h2>
                            <p id="editMeta" class="text-blue-300 text-[10px] font-black uppercase mt-1">---</p>
                        </div>
                        <button onclick="saveScores()" class="bg-green-500 px-8 py-3 rounded-xl font-black text-xs uppercase shadow-lg">Save Results</button>
                    </div>

                    <div class="p-8 flex-1 overflow-y-auto">
                        <div class="grid grid-cols-2 gap-6 mb-8">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase">Times School Opened</label>
                                <input type="number" id="opened" class="w-full mt-2 p-4 rounded-xl bg-slate-50 ring-1 ring-slate-100 border-none font-black outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase">Times Present</label>
                                <input type="number" id="present" class="w-full mt-2 p-4 rounded-xl bg-slate-50 ring-1 ring-slate-100 border-none font-black outline-none">
                            </div>
                        </div>

                        <table class="w-full">
                            <thead class="text-[10px] text-slate-400 font-black uppercase border-b">
                                <tr><th class="text-left py-4">Subject</th><th class="text-center w-28">Test</th><th class="text-center w-28">Exam</th><th class="w-10"></th></tr>
                            </thead>
                            <tbody id="scoreRows"></tbody>
                        </table>
                        <button onclick="addRow()" class="mt-4 text-blue-600 font-black text-[10px] uppercase">+ Add Subject</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Exact SB_KEY and URL from your CBT.html
        const SB_URL = 'https://jqrcoqslmylmubxwfgyt.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let students = [], activeId = null;

        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            loadData();
        }

        async function loadData() {
            const { data, error } = await _supabase.from('students').select('*').eq('is_admin', false).order('full_name');
            if (!error) {
                students = data;
                renderDirectory();
                renderEngineList();
            }
            lucide.createIcons();
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.getElementById(`btn-${v}`).classList.add('active');
            lucide.createIcons();
        }

        function renderDirectory() {
            const container = document.getElementById('directoryTable');
            document.getElementById('count-dir').innerText = students.length;
            container.innerHTML = students.map(st => {
                const msId = "MS-" + st.id.substring(0, 5).toUpperCase(); // MS- Logic
                return `
                    <tr class="student-row hover:bg-blue-50/50 transition" data-search="${st.full_name} ${msId}">
                        <td class="p-6">${st.full_name || 'NEW USER'}<br><span class="text-[9px] text-slate-400">${st.grade_level || 'No Class'}</span></td>
                        <td class="p-6 text-blue-600 font-black tracking-widest">${msId}</td>
                        <td class="p-6"><span class="px-2 py-1 bg-slate-100 rounded text-[9px]">${st.student_group || 'GENERAL'}</span></td>
                        <td class="p-6"><span class="px-2 py-1 rounded text-[9px] ${st.status === 'Enrolled' ? 'text-green-600 bg-green-50' : 'text-red-600 bg-red-50'}">${st.status || 'NULL'}</span></td>
                        <td class="p-6 text-right">
                            <button onclick="updateStatus('${st.id}', 'Enrolled')" class="p-2 text-green-500"><i data-lucide="check-circle"></i></button>
                            <button onclick="deleteStudent('${st.id}')" class="p-2 text-red-400"><i data-lucide="trash-2"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        function filterDirectory() {
            const val = document.getElementById('dirSearch').value.toLowerCase();
            document.querySelectorAll('.student-row').forEach(row => {
                row.classList.toggle('hidden-row', !row.getAttribute('data-search').toLowerCase().includes(val));
            });
        }

        function renderEngineList() {
            const list = document.getElementById('engineList');
            list.innerHTML = students.map(st => `
                <div onclick="openEditor('${st.id}')" class="engine-item p-4 hover:bg-blue-50 cursor-pointer transition uppercase" data-search="${st.full_name}">
                    <p class="text-[11px] font-black text-slate-800">${st.full_name}</p>
                    <p class="text-[9px] text-slate-400 font-bold">${st.grade_level || '---'}</p>
                </div>
            `).join('');
        }

        function filterEngine() {
            const val = document.getElementById('engSearch').value.toLowerCase();
            document.querySelectorAll('.engine-item').forEach(item => {
                item.classList.toggle('hidden-row', !item.getAttribute('data-search').toLowerCase().includes(val));
            });
        }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('editName').innerText = s.full_name;
            document.getElementById('editMeta').innerText = `${s.grade_level} • MS-${s.id.substring(0,5).toUpperCase()}`;
            document.getElementById('present').value = s.times_present || 0;
            document.getElementById('opened').value = s.times_opened || 0;
            
            const rows = document.getElementById('scoreRows');
            rows.innerHTML = '';
            (s.subjects || []).forEach(sub => addRow(sub.name, sub.test, sub.exam));
            if(!(s.subjects?.length)) addRow();
            lucide.createIcons();
        }

        function addRow(n="", t=0, e=0) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="pb-2"><input type="text" value="${n}" class="sn w-full p-2 bg-slate-50 rounded text-xs font-bold uppercase outline-none"></td>
                <td class="pb-2 px-2"><input type="number" value="${t}" class="st w-24 p-2 bg-slate-50 rounded text-xs font-black text-center outline-none"></td>
                <td class="pb-2"><input type="number" value="${e}" class="se w-24 p-2 bg-slate-50 rounded text-xs font-black text-center outline-none"></td>
                <td class="pb-2 text-right"><button onclick="this.parentElement.parentElement.remove()" class="text-slate-300 hover:text-red-500"><i data-lucide="x"></i></button></td>
            `;
            document.getElementById('scoreRows').appendChild(tr);
            lucide.createIcons();
        }

        async function saveScores() {
            const sNames = document.querySelectorAll('.sn'), sTests = document.querySelectorAll('.st'), sExams = document.querySelectorAll('.se');
            const subArray = [];
            sNames.forEach((n, i) => { if(n.value) subArray.push({ name: n.value, test: parseFloat(sTests[i].value)||0, exam: parseFloat(sExams[i].value)||0 }); });

            const { error } = await _supabase.from('students').update({
                subjects: subArray,
                times_present: parseInt(document.getElementById('present').value),
                times_opened: parseInt(document.getElementById('opened').value)
            }).eq('id', activeId);

            if(!error) { alert("Saved!"); loadData(); }
        }

        async function updateStatus(id, stat) {
            await _supabase.from('students').update({ status: stat }).eq('id', id);
            loadData();
        }

        async function deleteStudent(id) {
            if(confirm("Permanent Delete?")) {
                await _supabase.from('students').delete().eq('id', id);
                loadData();
            }
        }

        function handleLogout() { _supabase.auth.signOut().then(() => window.location.href='login.html'); }
        window.onload = init;
    </script>
</body>
</html>
