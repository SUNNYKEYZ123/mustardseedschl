<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | MSS Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 280px; position: fixed; height: 100vh; z-index: 50; }
        .sidebar.closed { transform: translateX(-280px); }
        .main-content { transition: all 0.3s ease; margin-left: 280px; width: calc(100% - 280px); }
        .main-content.expanded { margin-left: 0; width: 100%; }
        
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: all 0.2s; font-weight: 600; }
        .nav-link:hover, .nav-link.active { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <aside id="sidebar" class="sidebar bg-slate-900 text-white p-6 shadow-2xl flex flex-col">
        <div class="flex items-center justify-between mb-8 border-b border-slate-800 pb-6">
            <div class="flex items-center gap-3">
                <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
                <span class="font-black text-xl italic tracking-tighter">MSS ADMIN</span>
            </div>
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-800 rounded-lg lg:hidden">
                <i data-lucide="x"></i>
            </button>
        </div>

        <nav class="space-y-1 flex-1">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 ml-4">Management</p>
            <a href="#" onclick="showView('directory')" id="link-directory" class="nav-link active">
                <i data-lucide="users" class="w-5 h-5"></i> Student Directory
            </a>
            <a href="#" onclick="showView('results')" id="link-results" class="nav-link">
                <i data-lucide="award" class="w-5 h-5"></i> Results Engine
            </a>
            <a href="#" class="nav-link"><i data-lucide="shield-check" class="w-5 h-5"></i> CBT Control</a>
        </nav>

        <div class="pt-6 border-t border-slate-800">
            <button onclick="handleLogout()" class="nav-link w-full text-red-400 hover:bg-red-400/10">
                <i data-lucide="log-out" class="w-5 h-5"></i> Logout
            </button>
        </div>
    </aside>

    <main id="main-content" class="main-content min-h-screen p-4 md:p-8">
        
        <header class="flex justify-between items-center mb-10">
            <button onclick="toggleSidebar()" class="p-3 bg-white shadow-sm rounded-xl border border-slate-200">
                <i data-lucide="menu" class="w-6 h-6 text-slate-600"></i>
            </button>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-black text-slate-800 uppercase italic">Admin Portal</p>
                    <p id="admin-id" class="text-[10px] text-slate-400 font-bold">Verifying...</p>
                </div>
                <div class="w-12 h-12 rounded-2xl bg-blue-900 flex items-center justify-center text-white font-black">AD</div>
            </div>
        </header>

        <div id="view-directory">
            <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-3xl font-black text-slate-900 italic tracking-tighter">STUDENT DIRECTORY</h2>
                    <p class="text-slate-500 font-medium">Manage records for 170+ students.</p>
                </div>
                <div class="relative w-full max-w-xs">
                    <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-slate-400"></i>
                    <input type="text" oninput="filterDirectory(this.value)" placeholder="Search directory..." class="w-full pl-10 pr-4 py-2.5 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 ring-blue-500 outline-none text-sm font-bold">
                </div>
            </div>
            
            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b">
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                            <th class="p-6 text-left">Student</th>
                            <th class="p-6 text-center">Class</th>
                            <th class="p-6 text-center">Exam Access</th>
                            <th class="p-6 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="directoryTable">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="view-results" class="hidden-view">
            <div class="mb-8">
                <h2 class="text-3xl font-black text-slate-900 italic tracking-tighter uppercase">Results Engine Room</h2>
                <p class="text-slate-500 font-medium">Select a student from the sidebar to enter scores.</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 bg-white rounded-3xl border border-slate-200 h-[600px] flex flex-col overflow-hidden">
                    <div class="p-5 border-b bg-slate-50">
                        <input type="text" oninput="filterResultsList(this.value)" placeholder="Search for score entry..." class="w-full p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm font-bold">
                    </div>
                    <div id="resultsList" class="overflow-y-auto divide-y">
                        </div>
                </div>

                <div id="scoreEditor" class="lg:col-span-8 bg-white rounded-[2rem] shadow-2xl border border-slate-200 p-8 hidden-view">
                    <div class="flex justify-between items-start mb-8 border-b pb-6">
                        <div>
                            <h3 id="editName" class="text-2xl font-black uppercase text-slate-800 leading-none">---</h3>
                            <p id="editClass" class="text-blue-500 font-black text-[10px] uppercase mt-2">---</p>
                        </div>
                        <select id="resultStatus" class="bg-slate-900 text-white text-[10px] font-black p-2 px-4 rounded-full border-none outline-none">
                            <option value="Draft">DRAFT</option>
                            <option value="Published">PUBLISHED</option>
                        </select>
                    </div>
                    
                    <div class="space-y-6">
                        <table class="w-full text-sm">
                            <thead class="text-slate-400 text-[10px] uppercase font-black">
                                <tr><th class="text-left pb-4">Subject</th><th class="text-center pb-4">Test</th><th class="text-center pb-4">Exam</th><th class="pb-4"></th></tr>
                            </thead>
                            <tbody id="scoreRows"></tbody>
                        </table>
                        <button onclick="addSubjectRow()" class="text-blue-600 font-black text-xs uppercase flex items-center gap-1 hover:underline">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i> Add Subject
                        </button>

                        <div class="pt-6 border-t">
                            <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Teacher's Remark</label>
                            <textarea id="teacherRemark" rows="2" class="w-full p-4 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-100 italic text-sm outline-none focus:ring-2 ring-blue-500"></textarea>
                        </div>

                        <button onclick="saveResultData()" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black text-lg shadow-xl hover:scale-[1.01] active:scale-95 transition-all">
                            UPDATE ACADEMIC RECORDS
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        
        let allStudents = [];
        let activeStudentId = null;

        // 1. Sidebar Control
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('main-content').classList.toggle('expanded');
        }

        // 2. View Switching
        function showView(view) {
            document.getElementById('view-directory').classList.add('hidden-view');
            document.getElementById('view-results').classList.add('hidden-view');
            document.getElementById('link-directory').classList.remove('active');
            document.getElementById('link-results').classList.remove('active');

            document.getElementById(`view-${view}`).classList.remove('hidden-view');
            document.getElementById(`link-${view}`).classList.add('active');
            
            if(window.innerWidth < 1024) toggleSidebar();
        }

        // 3. Security & Loading
        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.replace('login.html'); return; }

            const { data: profile } = await _supabase.from('students').select('is_admin').eq('id', session.user.id).single();
            if (!profile?.is_admin) { window.location.replace('conf dshb.html'); return; }

            document.getElementById('admin-id').innerText = session.user.email;
            loadData();
        }

        async function loadData() {
            const { data } = await _supabase.from('students').select('*').order('full_name');
            if (data) {
                allStudents = data;
                renderDirectory(data);
                renderResultsList(data);
            }
            lucide.createIcons();
        }

        // 4. Directory Logic
        function renderDirectory(list) {
            const tbody = document.getElementById('directoryTable');
            tbody.innerHTML = list.map(st => `
                <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition">
                    <td class="p-6">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center font-black text-blue-900 text-xs">${st.full_name.charAt(0)}</div>
                            <p class="text-sm font-black text-slate-800 uppercase tracking-tighter">${st.full_name}</p>
                        </div>
                    </td>
                    <td class="p-6 text-center text-[11px] font-black text-slate-500">${st.grade_level || '---'}</td>
                    <td class="p-6 text-center">
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${st.status === 'Active' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                            ${st.status || 'Inactive'}
                        </span>
                    </td>
                    <td class="p-6 text-right">
                        <button onclick="openEditor('${st.id}')" class="p-2 bg-blue-900 text-white rounded-lg hover:shadow-lg transition">
                            <i data-lucide="award" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        // 5. Results Logic
        function renderResultsList(list) {
            const container = document.getElementById('resultsList');
            container.innerHTML = list.map(st => `
                <div onclick="openEditor('${st.id}')" class="p-4 hover:bg-blue-50 cursor-pointer transition flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center font-black text-[10px] text-slate-400">${st.full_name.charAt(0)}</div>
                    <div>
                        <p class="text-[11px] font-black text-slate-800 uppercase">${st.full_name}</p>
                        <p class="text-[9px] text-slate-400 font-bold uppercase">${st.result_status || 'Draft'}</p>
                    </div>
                </div>
            `).join('');
        }

        function openEditor(id) {
            showView('results');
            activeStudentId = id;
            const s = allStudents.find(x => x.id === id);
            
            document.getElementById('scoreEditor').classList.remove('hidden-view');
            document.getElementById('editName').innerText = s.full_name;
            document.getElementById('editClass').innerText = s.grade_level;
            document.getElementById('resultStatus').value = s.result_status || 'Draft';
            document.getElementById('teacherRemark').value = s.teacher_remark || "";

            const tbody = document.getElementById('scoreRows');
            tbody.innerHTML = "";
            const subjects = Array.isArray(s.subjects) ? s.subjects : [];
            subjects.forEach(sub => addSubjectRow(sub.name, sub.test, sub.exam));
            if(subjects.length === 0) addSubjectRow();
            lucide.createIcons();
        }

        function addSubjectRow(n="", t=0, e=0) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="pb-3"><input type="text" value="${n}" class="sub-name w-full p-2 bg-slate-50 border-none rounded-lg text-xs font-black uppercase" placeholder="Subject"></td>
                <td class="pb-3 text-center"><input type="number" value="${t}" class="sub-test w-16 p-2 bg-slate-50 border-none rounded-lg text-xs text-center font-black"></td>
                <td class="pb-3 text-center"><input type="number" value="${e}" class="sub-exam w-16 p-2 bg-slate-50 border-none rounded-lg text-xs text-center font-black"></td>
                <td class="pb-3 text-right"><button onclick="this.parentElement.parentElement.remove()" class="text-red-300 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
            `;
            document.getElementById('scoreRows').appendChild(tr);
            lucide.createIcons();
        }

        async function saveResultData() {
            const names = document.querySelectorAll('.sub-name');
            const tests = document.querySelectorAll('.sub-test');
            const exams = document.querySelectorAll('.sub-exam');
            const subjects = [];
            
            names.forEach((n, i) => { if(n.value) subjects.push({ name: n.value, test: tests[i].value, exam: exams[i].value }); });

            const { error } = await _supabase.from('students').update({
                subjects: subjects,
                result_status: document.getElementById('resultStatus').value,
                teacher_remark: document.getElementById('teacherRemark').value
            }).eq('id', activeStudentId);

            if(!error) { alert("Updated!"); loadData(); } else { alert(error.message); }
        }

        function filterDirectory(val) {
            renderDirectory(allStudents.filter(s => s.full_name.toLowerCase().includes(val.toLowerCase())));
        }

        function handleLogout() { _supabase.auth.signOut().then(() => window.location.replace('login.html')); }

        window.onload = init;
    </script>
</body>
</html>
