<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <aside class="sidebar text-white p-6 fixed h-screen flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <span class="font-black text-lg tracking-tighter uppercase text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> Students List</button>
            <button onclick="showView('curriculum')" id="btn-curriculum" class="nav-link"><i data-lucide="book-open"></i> Class Subjects</button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="award"></i> Score Entry</button>
        </nav>
        <button onclick="handleLogout()" class="nav-link text-red-400 hover:bg-red-400/10 mt-auto"><i data-lucide="log-out"></i> Logout</button>
    </aside>

    <main class="flex-1 ml-[260px] p-8">
        
        <section id="view-directory" class="view-section active">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-black text-slate-900 uppercase">Student Directory</h1>
                    <p class="text-slate-400 text-xs font-bold uppercase">View Names & IDs</p>
                </div>
                <input type="text" oninput="filterTable('directoryTable', this.value)" placeholder="Search Name or ID..." class="px-4 py-2 rounded-xl border-none shadow-sm ring-1 ring-slate-200 text-sm font-bold w-64">
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] uppercase font-black text-slate-400">
                        <tr><th class="p-4">Reg ID</th><th class="p-4">Student Name</th><th class="p-4">Class</th><th class="p-4">Status</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="directoryTable" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </section>

        <section id="view-curriculum" class="view-section">
            <div class="mb-8">
                <h1 class="text-3xl font-black text-slate-900 uppercase">Class Curriculum</h1>
                <p class="text-slate-400 text-xs font-bold uppercase">JSS (General) | SSS (Art/Science/General)</p>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-black text-xs uppercase mb-4 text-blue-600">Add Subject to Class Group</h3>
                    <div class="space-y-4">
                        <select id="currClass" class="w-full p-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-sm">
                            <optgroup label="Junior Secondary">
                                <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                            </optgroup>
                            <optgroup label="Senior Secondary">
                                <option>SSS 1 ART</option><option>SSS 1 SCIENCE</option>
                                <option>SSS 2 ART</option><option>SSS 2 SCIENCE</option>
                                <option>SSS 3 ART</option><option>SSS 3 SCIENCE</option>
                                <option>SSS GENERAL</option>
                            </optgroup>
                        </select>
                        <input type="text" id="currSub" placeholder="Subject Name" class="w-full p-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-sm uppercase">
                        <input type="text" id="currTeacher" placeholder="Teacher Name" class="w-full p-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-sm">
                        <button onclick="addCurriculum()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-xs">Update Curriculum</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] uppercase font-black text-slate-400">
                            <tr><th class="p-4">Group</th><th class="p-4">Subject</th><th class="p-4">Teacher</th><th class="p-4"></th></tr>
                        </thead>
                        <tbody id="curriculumTable" class="text-xs font-bold divide-y uppercase"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="view-engine" class="view-section">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 bg-white rounded-2xl border h-[700px] flex flex-col">
                    <div class="p-4 border-b bg-slate-50">
                        <input type="text" oninput="filterEngine(this.value)" placeholder="Find student..." class="w-full p-2.5 rounded-lg border-none ring-1 ring-slate-200 text-xs font-bold uppercase">
                    </div>
                    <div id="engineList" class="overflow-y-auto divide-y"></div>
                </div>
                <div id="editorPanel" class="lg:col-span-8 bg-white rounded-2xl border shadow-xl hidden overflow-hidden">
                    <div class="p-6 bg-blue-900 text-white flex justify-between items-center">
                        <div>
                            <h2 id="editName" class="text-xl font-black uppercase">---</h2>
                            <p id="editClass" class="text-blue-300 text-[10px] font-black uppercase tracking-widest">---</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="addExtraRow()" class="bg-amber-500 px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg">+ Extra Subject</button>
                            <button onclick="saveScores()" class="bg-green-500 px-6 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg">Save Results</button>
                        </div>
                    </div>
                    <div class="p-6">
                        <table class="w-full text-sm">
                            <thead class="text-[10px] text-slate-400 font-black uppercase">
                                <tr><th class="text-left p-2">Subject Name</th><th class="text-center w-24">Test</th><th class="text-center w-24">Exam</th><th></th></tr>
                            </thead>
                            <tbody id="scoreRows"></tbody>
                        </table>
                        <div class="mt-6 pt-6 border-t">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Terminal Remark</label>
                            <textarea id="remark" class="w-full p-4 mt-2 bg-slate-50 rounded-xl border-none ring-1 ring-slate-100 italic outline-none text-sm"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        let students = [], curriculum = [], activeId = null;

        async function init() {
            loadData();
        }

        async function loadData() {
            const { data: st } = await _supabase.from('students').select('*').order('full_name');
            const { data: cu } = await _supabase.from('school_curriculum').select('*').order('class_name');
            students = st || [];
            curriculum = cu || [];
            renderDirectory();
            renderCurriculum();
            renderEngineList(students);
            lucide.createIcons();
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.getElementById(`btn-${v}`).classList.add('active');
            lucide.createIcons();
        }

        function renderDirectory() {
            document.getElementById('directoryTable').innerHTML = students.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 font-black text-xs text-blue-600 uppercase">ID-${s.id.substring(0,5)}</td>
                    <td class="p-4 font-black text-xs uppercase">${s.full_name}</td>
                    <td class="p-4 text-[10px] font-bold text-slate-500 uppercase">${s.grade_level || '---'}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded text-[9px] font-black uppercase ${s.status === 'Suspended' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">${s.status || 'Active'}</span>
                    </td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button onclick="toggleSuspension('${s.id}', '${s.status}')" class="p-2 bg-slate-100 rounded-lg"><i data-lucide="user-minus" class="w-4 h-4 text-amber-600"></i></button>
                        <button onclick="deleteStudent('${s.id}')" class="p-2 bg-red-50 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4 text-red-600"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function addExtraRow() {
            const tbody = document.getElementById('scoreRows');
            const tr = document.createElement('tr');
            tr.className = "bg-amber-50 rounded-lg";
            tr.innerHTML = `
                <td class="p-2"><input type="text" placeholder="Extra Subject Name" class="extra-n w-full p-2 rounded border-none font-black text-xs uppercase outline-none bg-white ring-1 ring-amber-200"></td>
                <td class="p-2"><input type="number" value="0" class="st w-full p-2 rounded bg-white border-none font-black text-center text-xs outline-none"></td>
                <td class="p-2"><input type="number" value="0" class="se w-full p-2 rounded bg-white border-none font-black text-center text-xs outline-none"></td>
                <td class="p-2 text-center"><button onclick="this.closest('tr').remove()" class="text-red-500"><i data-lucide="x-circle" class="w-4 h-4"></i></button></td>
            `;
            tbody.appendChild(tr);
            lucide.createIcons();
        }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('editName').innerText = s.full_name;
            document.getElementById('editClass').innerText = s.grade_level;
            document.getElementById('remark').value = s.teacher_remark || '';
            
            // Logic: Class Subjects + Science/Art Specifics
            const classGroup = s.grade_level; 
            const classSubs = curriculum.filter(c => c.class_name === classGroup || c.class_name === 'SSS GENERAL');
            const existingScores = s.subjects || [];

            const rows = document.getElementById('scoreRows');
            rows.innerHTML = classSubs.map(cs => {
                const score = existingScores.find(es => es.name.toUpperCase() === cs.subject_name.toUpperCase()) || { test: 0, exam: 0 };
                return `
                    <tr class="bg-slate-50 border-b border-white">
                        <td class="p-3 font-black text-xs uppercase text-slate-700">${cs.subject_name} <span class="hidden extra-n-val">${cs.subject_name}</span></td>
                        <td class="p-3"><input type="number" value="${score.test}" class="st w-full p-2 rounded bg-white border-none font-black text-center text-xs outline-none focus:ring-2 ring-blue-500" data-sub="${cs.subject_name}" data-teacher="${cs.assigned_teacher}"></td>
                        <td class="p-3"><input type="number" value="${score.exam}" class="se w-full p-2 rounded bg-white border-none font-black text-center text-xs outline-none focus:ring-2 ring-blue-500"></td>
                        <td></td>
                    </tr>
                `;
            }).join('');
        }

        async function saveScores() {
            const subs = [];
            const rows = document.querySelectorAll('#scoreRows tr');
            
            rows.forEach(row => {
                const name = row.querySelector('.extra-n') ? row.querySelector('.extra-n').value : row.querySelector('.extra-n-val').innerText;
                const test = parseFloat(row.querySelector('.st').value) || 0;
                const exam = parseFloat(row.querySelector('.se').value) || 0;
                const teacher = row.querySelector('.st').getAttribute('data-teacher') || "Subject Staff";
                
                if(name) subs.push({ name: name.toUpperCase(), test, exam, teacher });
            });

            const { error } = await _supabase.from('students').update({
                subjects: subs,
                teacher_remark: document.getElementById('remark').value
            }).eq('id', activeId);

            if(!error) { alert("Student Data Saved!"); loadData(); }
        }

        // Standard helpers
        function renderCurriculum() {
            document.getElementById('curriculumTable').innerHTML = curriculum.map(c => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 text-blue-600 font-black">${c.class_name}</td>
                    <td class="p-4">${c.subject_name}</td>
                    <td class="p-4 text-slate-400 italic">${c.assigned_teacher || 'Staff'}</td>
                    <td class="p-4 text-right"><button onclick="deleteCurr('${c.id}')" class="text-red-400"><i data-lucide="trash" class="w-4 h-4"></i></button></td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        async function addCurriculum() {
            const class_name = document.getElementById('currClass').value;
            const subject_name = document.getElementById('currSub').value;
            const assigned_teacher = document.getElementById('currTeacher').value;
            if(!subject_name) return alert("Enter subject");
            await _supabase.from('school_curriculum').insert([{ class_name, subject_name, assigned_teacher }]);
            loadData();
        }

        async function deleteCurr(id) { await _supabase.from('school_curriculum').delete().eq('id', id); loadData(); }
        async function deleteStudent(id) { if(confirm("Delete student permanently?")) { await _supabase.from('students').delete().eq('id', id); loadData(); } }
        async function toggleSuspension(id, cur) { await _supabase.from('students').update({ status: cur === 'Suspended' ? 'Active' : 'Suspended' }).eq('id', id); loadData(); }
        function renderEngineList(l) { document.getElementById('engineList').innerHTML = l.map(s => `<div onclick="openEditor('${s.id}')" class="p-4 hover:bg-blue-50 cursor-pointer text-xs font-black uppercase">${s.full_name} <span class="block text-[9px] text-slate-400">${s.grade_level}</span></div>`).join(''); }
        function filterEngine(v) { renderEngineList(students.filter(s => s.full_name.toLowerCase().includes(v.toLowerCase()))); }
        function filterTable(id, v) { loadData(); } // Basic reload for filter
        window.onload = init;
    </script>
</body>
</html>
