<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex text-slate-900">

    <aside class="sidebar text-white p-6 fixed h-screen flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <span class="font-black text-lg tracking-tighter uppercase text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> Students List</button>
            <button onclick="showView('curriculum')" id="btn-curriculum" class="nav-link"><i data-lucide="book-open"></i> Class Subjects</button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="award"></i> Score Entry Room</button>
            <button onclick="showView('broadsheet')" id="btn-broadsheet" class="nav-link text-amber-400"><i data-lucide="layout"></i> Broadsheet</button>
        </nav>
        <button onclick="handleLogout()" class="nav-link text-red-400 mt-auto"><i data-lucide="log-out"></i> Logout</button>
    </aside>

    <main class="flex-1 ml-[260px] p-8">
        
        <section id="view-directory" class="view-section active">
            <div class="flex justify-between items-end mb-8">
                <div><h1 class="text-3xl font-black uppercase">Directory</h1><p class="text-slate-400 text-xs font-bold uppercase">Assign Art/Science Groups</p></div>
                <input type="text" oninput="filterDirectory(this.value)" placeholder="Search..." class="px-4 py-2 rounded-xl border-none shadow-sm ring-1 ring-slate-200 text-sm font-bold w-64 uppercase">
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] uppercase font-black text-slate-400">
                        <tr><th class="p-4">Reg ID</th><th class="p-4">Full Name</th><th class="p-4">Class</th><th class="p-4">Group</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="directoryTable" class="divide-y divide-slate-50 uppercase text-[11px] font-bold"></tbody>
                </table>
            </div>
        </section>

        <section id="view-engine" class="view-section">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black uppercase italic">Professional Entry Room</h1>
                <div class="flex gap-3">
                    <select id="engineClassFilter" onchange="refreshEngineList()" class="p-3 bg-white rounded-xl text-[10px] font-black border-none ring-1 ring-slate-200">
                        <option value="">Select Class</option>
                        <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                        <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                    </select>
                    <select id="activeTerm" onchange="refreshEditor()" class="p-3 bg-blue-900 text-white rounded-xl text-[10px] font-black">
                        <option value="term1">1st Term</option>
                        <option value="term2">2nd Term</option>
                        <option value="term3">3rd Term (Promotional)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-4 bg-white rounded-2xl border h-[700px] flex flex-col overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b">
                        <input type="text" oninput="filterEngine(this.value)" placeholder="Filter by Name..." class="w-full p-3 rounded-lg border-none ring-1 ring-slate-200 text-xs font-black uppercase">
                    </div>
                    <div id="engineList" class="overflow-y-auto divide-y"></div>
                </div>
                
                <div id="editorPanel" class="col-span-8 bg-white rounded-2xl border shadow-xl hidden flex flex-col overflow-hidden">
                    <div id="editorHeader" class="p-6 bg-blue-900 text-white flex justify-between items-center">
                        </div>
                    <div class="p-6 flex-1 overflow-y-auto">
                        <table class="w-full">
                            <thead class="text-[9px] text-slate-400 font-black uppercase border-b">
                                <tr><th class="text-left py-3">Subject</th><th class="text-center">Prev. Record</th><th class="w-20 text-center">Test</th><th class="w-20 text-center">Exam</th><th class="text-right">Term Total</th></tr>
                            </thead>
                            <tbody id="scoreRows"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-broadsheet" class="view-section">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-black uppercase">Class Broadsheet</h1>
                <div class="flex gap-4">
                    <select id="sheetClass" class="p-3 bg-white rounded-xl text-xs font-bold ring-1 ring-slate-200">
                        <option>JSS 1</option><option>SSS 1</option>
                    </select>
                    <button onclick="generateSheet()" class="bg-blue-600 text-white px-8 py-3 rounded-xl text-xs font-black">Generate Summary</button>
                </div>
            </div>
            <div id="sheetContainer" class="bg-white rounded-2xl border overflow-x-auto p-4">
                <p class="text-center text-slate-300 py-20 font-bold uppercase italic">Select class and click generate</p>
            </div>
        </section>

    </main>

    <script>
        // Supabase Init... (Using your credentials)
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        let students = [], curriculum = [], activeId = null;

        async function init() { loadData(); }

        async function loadData() {
            const { data: st } = await _supabase.from('students').select('*').order('full_name');
            const { data: cu } = await _supabase.from('school_curriculum').select('*');
            students = st || []; curriculum = cu || [];
            renderDirectory(); refreshEngineList();
            lucide.createIcons();
        }

        // Logic for Score Entry
        function refreshEngineList() {
            const cls = document.getElementById('engineClassFilter').value;
            const filtered = cls ? students.filter(s => s.grade_level === cls) : students;
            document.getElementById('engineList').innerHTML = filtered.map(s => `
                <div onclick="openEditor('${s.id}')" class="p-4 hover:bg-blue-50 cursor-pointer flex justify-between items-center group">
                    <div class="uppercase">
                        <p class="text-[11px] font-black text-slate-800">${s.full_name}</p>
                        <p class="text-[9px] font-bold text-slate-400">${s.grade_level} • ${s.student_group || 'GENERAL'}</p>
                    </div>
                    <i data-lucide="award" class="w-4 h-4 text-slate-100 group-hover:text-blue-500"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            const term = document.getElementById('activeTerm').value;
            document.getElementById('editorPanel').classList.remove('hidden');
            
            document.getElementById('editorHeader').innerHTML = `
                <div><h2 class="text-xl font-black uppercase">${s.full_name}</h2><p class="text-blue-300 text-[10px] font-black uppercase tracking-widest">${s.grade_level} | RECORDING: ${term}</p></div>
                <button onclick="saveProfessionalScores()" class="bg-green-500 px-6 py-2 rounded-lg font-black text-[9px] uppercase">Submit Term Data</button>
            `;

            const sGroup = s.student_group || 'GENERAL';
            const allowedSubs = curriculum.filter(c => c.class_name === s.grade_level && (c.subject_group === 'GENERAL' || c.subject_group === sGroup));
            const existingScores = s[term] || {};

            document.getElementById('scoreRows').innerHTML = allowedSubs.map(cs => {
                const score = existingScores[cs.subject_name] || { test: 0, exam: 0 };
                
                // CUMULATIVE DISPLAY LOGIC
                let prevInfo = "---";
                if(term === 'term2') prevInfo = `T1: ${s.term1?.[cs.subject_name]?.total || 0}`;
                if(term === 'term3') {
                    const t1 = s.term1?.[cs.subject_name]?.total || 0;
                    const t2 = s.term2?.[cs.subject_name]?.total || 0;
                    prevInfo = `Avg: ${((t1+t2)/2).toFixed(1)}`;
                }

                return `
                    <tr class="bg-slate-50 border-b border-white">
                        <td class="p-3"><span class="font-black text-[11px] uppercase block">${cs.subject_name}</span></td>
                        <td class="text-center text-[9px] text-slate-400 font-bold italic">${prevInfo}</td>
                        <td class="p-3"><input type="number" value="${score.test}" class="st w-full p-2 rounded bg-white text-center text-xs font-black" data-sub="${cs.subject_name}"></td>
                        <td class="p-3"><input type="number" value="${score.exam}" class="se w-full p-2 rounded bg-white text-center text-xs font-black"></td>
                        <td class="text-right font-black text-blue-600 text-xs">AUTO</td>
                    </tr>
                `;
            }).join('');
        }

        async function saveProfessionalScores() {
            const term = document.getElementById('activeTerm').value;
            const scoreData = {};
            document.querySelectorAll('#scoreRows tr').forEach(row => {
                const sub = row.querySelector('.st').dataset.sub;
                const test = parseFloat(row.querySelector('.st').value) || 0;
                const exam = parseFloat(row.querySelector('.se').value) || 0;
                scoreData[sub] = { test, exam, total: test + exam };
            });

            const updateObj = {};
            updateObj[term] = scoreData;

            const { error } = await _supabase.from('students').update(updateObj).eq('id', activeId);
            if(!error) { alert(`Successfully updated ${term} results!`); loadData(); }
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            lucide.createIcons();
        }

        // Standard helpers from your code...
        window.onload = init;
    </script>
</body>
</html>
