<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Engine Room | MSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .nav-active { @apply bg-blue-600 text-white shadow-lg shadow-blue-900/20; }
        .section-hidden { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <aside class="w-72 bg-slate-900 text-white h-screen sticky top-0 hidden md:flex flex-col p-6">
        <div class="flex items-center gap-3 mb-10 px-2">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <div>
                <h1 class="font-black tracking-tighter text-white leading-none italic">ENGINE ROOM</h1>
                <p class="text-[10px] text-blue-400 font-bold tracking-widest uppercase">Mustard Seed School</p>
            </div>
        </div>

        <nav class="space-y-2 flex-1">
            <button onclick="showSection('directory')" id="nav-directory" class="w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm nav-active">
                <i data-lucide="users" class="w-5 h-5"></i> Students Directory
            </button>
            <button onclick="showSection('records')" id="nav-records" class="w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm text-slate-400 hover:bg-slate-800">
                <i data-lucide="edit-3" class="w-5 h-5"></i> Record Entry
            </button>
            <button onclick="showSection('subjects')" id="nav-subjects" class="w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm text-slate-400 hover:bg-slate-800">
                <i data-lucide="book-open" class="w-5 h-5"></i> Subject Manager
            </button>
            <button onclick="showSection('teachers')" id="nav-teachers" class="w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm text-slate-400 hover:bg-slate-800">
                <i data-lucide="user-check" class="w-5 h-5"></i> Assign Teachers
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <section id="sec-directory">
            <div class="mb-8 flex justify-between items-center">
                <h2 class="text-3xl font-black text-slate-800 italic">Students Directory</h2>
            </div>
            <div class="bg-white rounded-3xl shadow-sm border p-6">
                <input type="text" oninput="filterList(this.value, 'directoryList')" placeholder="Search names or grade levels..." class="w-full p-4 bg-slate-50 rounded-2xl mb-6 outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 font-bold">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                        <tr><th class="p-4">Name</th><th class="p-4">Grade</th><th class="p-4">Status</th><th class="p-4 text-right">Actions</th></tr>
                    </thead>
                    <tbody id="directoryList" class="divide-y text-sm font-bold"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-records" class="section-hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 bg-white rounded-3xl p-6 border h-fit">
                    <input type="text" oninput="filterList(this.value, 'recordSearchList')" placeholder="Quick find..." class="w-full p-3 bg-slate-50 rounded-xl mb-4 text-sm font-bold">
                    <div id="recordSearchList" class="space-y-2 max-h-[500px] overflow-y-auto"></div>
                </div>
                <div id="scoreEditor" class="lg:col-span-8 hidden bg-white rounded-3xl shadow-2xl border overflow-hidden">
                    <div class="p-6 bg-blue-900 text-white flex justify-between">
                        <h3 id="edit-name" class="font-black italic uppercase">Select Student</h3>
                        <div id="save-status" class="hidden text-[10px] bg-green-500 px-3 py-1 rounded-full animate-bounce">SAVING...</div>
                    </div>
                    <div class="p-6">
                        <table class="w-full mb-4 text-sm"><tbody id="scoreRows"></tbody></table>
                        <div class="flex gap-2">
                            <button onclick="addRow()" class="bg-slate-100 p-3 rounded-xl font-bold text-xs uppercase">Add Row</button>
                            <button onclick="saveScores()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-black text-sm uppercase shadow-lg">Update Report Card</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-subjects" class="section-hidden">
            <div class="bg-white rounded-3xl p-8 border">
                <div class="flex gap-2 mb-8">
                    <input type="text" id="sub-class" placeholder="Class (e.g., JSS 1)" class="w-1/4 p-3 bg-slate-50 rounded-xl font-bold">
                    <input type="text" id="sub-name" placeholder="Subject Name" class="flex-1 p-3 bg-slate-50 rounded-xl font-bold">
                    <button onclick="addCurriculum()" class="bg-blue-600 text-white px-8 rounded-xl font-black text-sm">ADD SUBJECT</button>
                </div>
                <div id="curriculumDisplay" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
            </div>
        </section>

        <section id="sec-teachers" class="section-hidden">
            <div class="bg-white rounded-3xl border overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                        <tr><th class="p-4">Class Name</th><th class="p-4">Subject</th><th class="p-4">Teacher</th><th class="p-4">Action</th></tr>
                    </thead>
                    <tbody id="teacherTable" class="divide-y font-bold"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA2NTgyNzgsImV4cCI6MjA1NjIzNDI3OH0.S8X3WpQ6S8pQ6S8pQ6S8pQ6S8pQ6S8pQ6S8pQ6S8pQ6S8pQ6S8pQ6');
        
        let allStudents = [], curData = [], activeStudent = null;

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('section-hidden'));
            document.getElementById('sec-' + id).classList.remove('section-hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-white'));
            document.getElementById('nav-' + id).classList.add('nav-active', 'text-white');
            if(id === 'directory' || id === 'records') fetchStudents();
            if(id === 'subjects' || id === 'teachers') fetchCurriculum();
        }

        async function fetchStudents() {
            const { data } = await _supabase.from('students').select('*').order('full_name');
            if(data) { allStudents = data; renderDirectory(data); renderRecordSearch(data); }
            lucide.createIcons();
        }

        async function fetchCurriculum() {
            const { data } = await _supabase.from('school_curriculum').select('*').order('class_name');
            if(data) { curData = data; renderCurriculum(); renderTeacherTable(); }
            lucide.createIcons();
        }

        function filterList(val, targetId) {
            const lowVal = val.toLowerCase();
            const filtered = allStudents.filter(s => s.full_name.toLowerCase().includes(lowVal) || s.grade_level.toLowerCase().includes(lowVal));
            if(targetId === 'directoryList') renderDirectory(filtered);
            else renderRecordSearch(filtered);
        }

        function renderDirectory(list) {
            document.getElementById('directoryList').innerHTML = list.map(s => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-4 uppercase">${s.full_name}</td>
                    <td class="p-4 text-blue-600">${s.grade_level}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded-full text-[9px] uppercase ${s.status === 'Suspended' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">${s.status || 'Active'}</span></td>
                    <td class="p-4 text-right space-x-4">
                        <button onclick="updateStatus('${s.id}', '${s.status}')" title="Suspend/Activate" class="text-orange-500"><i data-lucide="shield-alert" class="w-4 h-4 inline"></i></button>
                        <button onclick="deleteStudent('${s.id}')" title="Delete" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4 inline"></i></button>
                        <button onclick="showSection('records'); openEditor('${s.id}')" class="text-blue-600 text-[10px] font-black uppercase">Edit Scores</button>
                    </td>
                </tr>`).join('');
            lucide.createIcons();
        }

        function renderRecordSearch(list) {
            document.getElementById('recordSearchList').innerHTML = list.map(s => `
                <div onclick="openEditor('${s.id}')" class="p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-blue-600 hover:text-white transition group text-xs font-black uppercase">
                    ${s.full_name} <span class="float-right opacity-40 text-[9px]">${s.grade_level}</span>
                </div>`).join('');
        }

        async function openEditor(id) {
            activeStudent = allStudents.find(s => s.id === id);
            document.getElementById('scoreEditor').classList.remove('hidden');
            document.getElementById('edit-name').innerText = activeStudent.full_name;
            const tbody = document.getElementById('scoreRows'); tbody.innerHTML = "";
            (activeStudent.subjects || []).forEach(s => addRow(s.name, s.test, s.exam));
            if(!(activeStudent.subjects?.length)) addRow();
            lucide.createIcons();
        }

        function addRow(n='', t=0, e=0) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="p-1"><input type="text" value="${n}" class="sub-name w-full p-2 bg-slate-50 rounded font-bold text-[11px] uppercase border-none" placeholder="SUBJECT"></td>
                <td class="p-1"><input type="number" value="${t}" class="sub-test w-full p-2 bg-slate-50 rounded font-black text-center border-none"></td>
                <td class="p-1"><input type="number" value="${e}" class="sub-exam w-full p-2 bg-slate-50 rounded font-black text-center border-none"></td>
                <td class="p-1 text-center"><button onclick="this.parentElement.parentElement.remove()" class="text-red-300"><i data-lucide="x" class="w-4 h-4"></i></button></td>`;
            document.getElementById('scoreRows').appendChild(tr);
            lucide.createIcons();
        }

        async function saveScores() {
            const st = document.getElementById('save-status'); st.classList.remove('hidden');
            const { data: cur } = await _supabase.from('school_curriculum').select('*').eq('class_name', activeStudent.grade_level);
            const subs = [];
            document.querySelectorAll('.sub-name').forEach((el, i) => {
                const name = el.value.toUpperCase();
                const match = cur?.find(c => c.subject_name.toUpperCase() === name);
                if(name) subs.push({ name, test: Number(document.querySelectorAll('.sub-test')[i].value), exam: Number(document.querySelectorAll('.sub-exam')[i].value), teacher: match ? match.assigned_teacher : "Not Assigned" });
            });
            await _supabase.from('students').update({ subjects: subs }).eq('id', activeStudent.id);
            st.classList.add('hidden'); fetchStudents();
        }

        async function updateStatus(id, current) {
            const next = current === 'Suspended' ? 'Active' : 'Suspended';
            if(confirm(`Set status to ${next}?`)) { await _supabase.from('students').update({ status: next }).eq('id', id); fetchStudents(); }
        }

        async function deleteStudent(id) {
            if(confirm("Permanently delete this student?")) { await _supabase.from('students').delete().eq('id', id); fetchStudents(); }
        }

        async function addCurriculum() {
            const c = document.getElementById('sub-class').value.toUpperCase();
            const s = document.getElementById('sub-name').value.toUpperCase();
            if(!c || !s) return;
            await _supabase.from('school_curriculum').insert([{ class_name: c, subject_name: s, assigned_teacher: 'Not Set' }]);
            fetchCurriculum();
        }

        function renderCurriculum() {
            document.getElementById('curriculumDisplay').innerHTML = curData.map(c => `
                <div class="p-3 bg-white border rounded-xl shadow-sm flex justify-between items-center uppercase font-black text-[10px]">
                    <div><span class="text-blue-600">${c.class_name}</span> | ${c.subject_name}</div>
                    <button onclick="deleteCur(${c.id})" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                </div>`).join('');
            lucide.createIcons();
        }

        async function deleteCur(id) { await _supabase.from('school_curriculum').delete().eq('id', id); fetchCurriculum(); }

        function renderTeacherTable() {
            document.getElementById('teacherTable').innerHTML = curData.map(c => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 text-blue-600">${c.class_name}</td>
                    <td class="p-4 uppercase">${c.subject_name}</td>
                    <td class="p-4"><input type="text" id="t-${c.id}" value="${c.assigned_teacher}" class="p-2 bg-slate-50 rounded border-none w-full text-xs font-bold uppercase"></td>
                    <td class="p-4"><button onclick="saveTeacher(${c.id})" class="text-blue-600 text-xs font-black">SAVE</button></td>
                </tr>`).join('');
        }

        async function saveTeacher(id) {
            await _supabase.from('school_curriculum').update({ assigned_teacher: document.getElementById('t-'+id).value }).eq('id', id);
            fetchCurriculum(); alert("Teacher assigned!");
        }

        window.onload = () => { fetchStudents(); lucide.createIcons(); };
    </script>
</body>
</html>
