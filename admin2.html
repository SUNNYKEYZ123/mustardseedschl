<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex text-slate-900">

    <aside class="sidebar text-white p-6 fixed h-screen flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <span class="font-black text-lg tracking-tighter uppercase text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> Students List</button>
            <button onclick="showView('curriculum')" id="btn-curriculum" class="nav-link"><i data-lucide="book-open"></i> Class Subjects</button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="award"></i> Score Entry Room</button>
            <button onclick="showView('broadsheet')" id="btn-broadsheet" class="nav-link"><i data-lucide="layout-grid"></i> Broadsheet</button>
            <button onclick="showView('diary')" id="btn-diary" class="nav-link"><i data-lucide="book"></i> Academic Diary</button>
        </nav>
        <button onclick="handleLogout()" class="nav-link text-red-400 hover:bg-red-400/10 mt-auto"><i data-lucide="log-out"></i> Logout</button>
    </aside>

    <main class="flex-1 ml-[260px] p-8">
        
        <section id="view-engine" class="view-section">
            <div class="flex flex-wrap gap-4 mb-6 bg-white p-4 rounded-2xl shadow-sm border">
                <div class="flex-1 min-w-[200px]">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Filter Class</label>
                    <select id="engineClassFilter" onchange="filterByClass(this.value)" class="w-full p-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-sm">
                        <option value="ALL">All Classes</option>
                        <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                        <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                    </select>
                </div>
                <div class="flex-1 min-w-[200px]">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Select Term</label>
                    <select id="engineTermFilter" onchange="setTerm(this.value)" class="w-full p-3 rounded-xl bg-blue-50 border-none ring-1 ring-blue-200 font-bold text-sm text-blue-700">
                        <option value="term1">1st Term</option>
                        <option value="term2">2nd Term</option>
                        <option value="term3">3rd Term</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 bg-white rounded-2xl border h-[700px] flex flex-col overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b">
                        <input type="text" id="engineSearch" oninput="filterEngine(this.value)" placeholder="Search Student..." class="w-full p-3 rounded-lg border-none ring-1 ring-slate-200 text-xs font-black uppercase">
                    </div>
                    <div id="engineList" class="overflow-y-auto divide-y"></div>
                </div>
                
                <div id="editorPanel" class="lg:col-span-8 bg-white rounded-2xl border shadow-xl hidden flex flex-col overflow-hidden">
                    <div class="p-6 bg-blue-900 text-white flex justify-between items-center">
                        <div>
                            <h2 id="editName" class="text-xl font-black uppercase leading-tight">---</h2>
                            <div class="flex gap-2 items-center mt-1">
                                <span id="editClass" class="text-blue-300 text-[10px] font-black uppercase tracking-widest">---</span>
                                <span id="activeTermTag" class="bg-amber-500 px-2 py-0.5 rounded text-[9px] font-black uppercase">TERM 1</span>
                                <span id="publishStatus" class="bg-red-500 px-2 py-0.5 rounded text-[9px] font-black uppercase">Unpublished</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="togglePublish()" id="publishBtn" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg font-black text-[9px] uppercase border border-white/20">Publish Result</button>
                            <button onclick="saveScores()" class="bg-green-500 px-6 py-2 rounded-lg font-black text-[9px] uppercase">Save Scores</button>
                        </div>
                    </div>

                    <div class="p-6 flex-1 overflow-y-auto">
                        <table class="w-full">
                            <thead class="text-[10px] text-slate-400 font-black uppercase border-b">
                                <tr><th class="text-left py-3">Subject</th><th class="text-center w-24">Test (30)</th><th class="text-center w-24">Exam (70)</th></tr>
                            </thead>
                            <tbody id="scoreRows"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-broadsheet" class="view-section">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-black uppercase">Broadsheet</h1>
                    <p class="text-slate-400 font-bold text-xs uppercase">Master Record Averaging</p>
                </div>
                <select id="broadsheetClassFilter" onchange="renderBroadsheet()" class="p-3 rounded-xl bg-white ring-1 ring-slate-200 font-bold text-sm">
                    <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                    <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                </select>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-x-auto">
                <table class="w-full text-left min-w-[1000px]">
                    <thead id="broadsheetHead" class="bg-slate-50 border-b text-[9px] uppercase font-black text-slate-400"></thead>
                    <tbody id="broadsheetBody" class="divide-y divide-slate-50 uppercase text-[10px] font-bold"></tbody>
                </table>
            </div>
        </section>

        </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'YOUR_KEY_HERE');
        let students = [], curriculum = [], activeId = null, currentTerm = "term1";

        async function loadData() {
            const { data: st } = await _supabase.from('students').select('*').order('full_name');
            const { data: cu } = await _supabase.from('school_curriculum').select('*').order('class_name');
            students = st || []; curriculum = cu || [];
            renderEngineList(students);
            if (activeId) openEditor(activeId);
        }

        function setTerm(t) {
            currentTerm = t;
            document.getElementById('activeTermTag').innerText = t.toUpperCase();
            if(activeId) openEditor(activeId);
        }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('editName').innerText = s.full_name;
            document.getElementById('editClass').innerText = s.grade_level;

            // Handle Publishing Status
            const isPublished = s.published_terms?.includes(currentTerm);
            const pStatus = document.getElementById('publishStatus');
            pStatus.innerText = isPublished ? "Published" : "Unpublished";
            pStatus.className = isPublished ? "bg-green-500 px-2 py-0.5 rounded text-[9px] font-black uppercase" : "bg-red-500 px-2 py-0.5 rounded text-[9px] font-black uppercase";
            document.getElementById('publishBtn').innerText = isPublished ? "Unpublish Result" : "Publish Result";

            const allowed = curriculum.filter(c => c.class_name === s.grade_level);
            const termScores = s[currentTerm] || []; // Uses columns: term1, term2, or term3

            document.getElementById('scoreRows').innerHTML = allowed.map(cs => {
                const score = termScores.find(e => e.name === cs.subject_name) || { test: "-", exam: "-" };
                return `
                    <tr class="bg-slate-50 border-b border-white">
                        <td class="p-3">
                            <span class="font-black text-[11px] uppercase block extra-n-val">${cs.subject_name}</span>
                        </td>
                        <td class="p-3"><input type="text" value="${score.test}" placeholder="-" class="st w-full p-2 rounded bg-white text-center font-black text-xs outline-none"></td>
                        <td class="p-3"><input type="text" value="${score.exam}" placeholder="-" class="se w-full p-2 rounded bg-white text-center font-black text-xs outline-none"></td>
                    </tr>
                `;
            }).join('');
        }

        async function saveScores() {
            const s = students.find(x => x.id === activeId);
            const termScores = [];
            
            document.querySelectorAll('#scoreRows tr').forEach(row => {
                const name = row.querySelector('.extra-n-val').innerText;
                const tVal = row.querySelector('.st').value;
                const eVal = row.querySelector('.se').value;
                
                termScores.push({
                    name: name,
                    test: (tVal === "-" || tVal === "") ? 0 : parseFloat(tVal),
                    exam: (eVal === "-" || eVal === "") ? 0 : parseFloat(eVal)
                });
            });

            // Update the specific term column (term1, term2, or term3)
            const updateData = {};
            updateData[currentTerm] = termScores;

            const { error } = await _supabase.from('students').update(updateData).eq('id', activeId);
            if(!error) { alert("Scores Saved Locally!"); loadData(); }
        }

        async function togglePublish() {
            const s = students.find(x => x.id === activeId);
            let published = s.published_terms || [];
            
            if (published.includes(currentTerm)) {
                published = published.filter(p => p !== currentTerm);
            } else {
                published.push(currentTerm);
            }

            await _supabase.from('students').update({ published_terms: published }).eq('id', activeId);
            loadData();
        }

        function renderBroadsheet() {
            const cls = document.getElementById('broadsheetClassFilter').value;
            const classStudents = students.filter(s => s.grade_level === cls);
            const classSubs = [...new Set(curriculum.filter(c => c.class_name === cls).map(c => c.subject_name))];

            // Header
            let head = `<tr><th class="p-4">Student Name</th>`;
            classSubs.forEach(sub => head += `<th class="p-4 text-center">${sub}</th>`);
            head += `<th class="p-4 text-center bg-blue-50 text-blue-600">Average</th></tr>`;
            document.getElementById('broadsheetHead').innerHTML = head;

            // Body with Averaging
            document.getElementById('broadsheetBody').innerHTML = classStudents.map(s => {
                let row = `<tr><td class="p-4 font-black">${s.full_name}</td>`;
                let total = 0;
                classSubs.forEach(sub => {
                    const t1 = s.term1?.find(i => i.name === sub) || {test:0, exam:0};
                    const t2 = s.term2?.find(i => i.name === sub) || {test:0, exam:0};
                    const t3 = s.term3?.find(i => i.name === sub) || {test:0, exam:0};
                    
                    // Term averaging logic
                    const count = (s.term3?.length ? 3 : (s.term2?.length ? 2 : 1));
                    const avg = ((t1.test + t1.exam) + (t2.test + t2.exam) + (t3.test + t3.exam)) / count;
                    total += avg;
                    row += `<td class="p-4 text-center">${avg.toFixed(1)}</td>`;
                });
                const finalAvg = total / (classSubs.length || 1);
                row += `<td class="p-4 text-center bg-blue-50 text-blue-700">${finalAvg.toFixed(1)}%</td></tr>`;
                return row;
            }).join('');
        }

        window.onload = loadData;
    </script>
</body>
</html>
