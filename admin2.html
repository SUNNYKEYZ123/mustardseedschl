<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex text-slate-900">

    <aside class="sidebar text-white p-6 fixed h-screen flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <span class="font-black text-lg tracking-tighter uppercase text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> Students List</button>
            <button onclick="showView('curriculum')" id="btn-curriculum" class="nav-link"><i data-lucide="book-open"></i> Class Subjects</button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="award"></i> Score Entry</button>
        </nav>
        <button onclick="handleLogout()" class="nav-link text-red-400 hover:bg-red-400/10 mt-auto"><i data-lucide="log-out"></i> Logout</button>
    </aside>

    <main class="flex-1 ml-[260px] p-8">
        
        <section id="view-directory" class="view-section active">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-black uppercase">Directory</h1>
                    <p class="text-slate-400 text-xs font-bold uppercase">Click the pen to set Art/Science group</p>
                </div>
                <input type="text" oninput="filterDirectory(this.value)" placeholder="Search Name..." class="px-4 py-2 rounded-xl border-none shadow-sm ring-1 ring-slate-200 text-sm font-bold w-64 uppercase">
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] uppercase font-black text-slate-400">
                        <tr><th class="p-4">Reg ID</th><th class="p-4">Name</th><th class="p-4">Class</th><th class="p-4">Sub-Group</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="directoryTable" class="divide-y divide-slate-50 uppercase text-[11px] font-bold"></tbody>
                </table>
            </div>
        </section>

        <section id="view-curriculum" class="view-section">
            <div class="mb-8">
                <h1 class="text-3xl font-black uppercase">Subject Master</h1>
                <p class="text-slate-400 text-xs font-bold uppercase">Assign subjects to Art or Science groups</p>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border h-fit">
                    <h3 class="font-black text-xs uppercase mb-4 text-blue-600">Define Group Subject</h3>
                    <div class="space-y-4">
                        <select id="currClass" class="w-full p-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-sm">
                            <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                            <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                        </select>
                        <select id="currGroup" class="w-full p-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-sm">
                            <option value="GENERAL">GENERAL (Everyone)</option>
                            <option value="ART">ART ONLY</option>
                            <option value="SCIENCE">SCIENCE ONLY</option>
                        </select>
                        <input type="text" id="currSub" placeholder="Subject Name" class="w-full p-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-sm uppercase">
                        <button onclick="addCurriculum()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-xs">Save to Group</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] uppercase font-black text-slate-400">
                            <tr><th class="p-4">Class</th><th class="p-4">Group</th><th class="p-4">Subject</th><th class="p-4"></th></tr>
                        </thead>
                        <tbody id="curriculumTable" class="text-[10px] font-bold divide-y uppercase"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="view-engine" class="view-section">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 bg-white rounded-2xl border h-[750px] flex flex-col overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b">
                        <input type="text" oninput="filterEngine(this.value)" placeholder="Search Student..." class="w-full p-3 rounded-lg border-none ring-1 ring-slate-200 text-xs font-black uppercase">
                    </div>
                    <div id="engineList" class="overflow-y-auto divide-y"></div>
                </div>
                
                <div id="editorPanel" class="lg:col-span-8 bg-white rounded-2xl border shadow-xl hidden flex flex-col overflow-hidden">
                    <div class="p-6 bg-blue-900 text-white flex justify-between items-center">
                        <div>
                            <h2 id="editName" class="text-xl font-black uppercase leading-tight">---</h2>
                            <div class="flex gap-2 items-center mt-1">
                                <span id="editClass" class="text-blue-300 text-[10px] font-black uppercase tracking-widest">---</span>
                                <span id="editGroupTag" class="bg-blue-700 px-2 py-0.5 rounded text-[9px] font-black">---</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="addExtraRow()" class="bg-amber-500 px-4 py-2 rounded-lg font-black text-[9px] uppercase shadow-md">+ Add One-Off</button>
                            <button onclick="saveScores()" class="bg-green-500 px-6 py-2 rounded-lg font-black text-[9px] uppercase shadow-md">Save Scores</button>
                        </div>
                    </div>

                    <div class="p-6 flex-1 overflow-y-auto">
                        <div class="mb-4 flex items-center gap-2 p-3 bg-blue-50 rounded-xl border border-blue-100">
                           <i data-lucide="info" class="w-4 h-4 text-blue-600"></i>
                           <p class="text-[10px] font-black uppercase text-blue-800">Showing subjects for this student's specific group.</p>
                        </div>
                        <table class="w-full">
                            <thead class="text-[10px] text-slate-400 font-black uppercase border-b">
                                <tr><th class="text-left py-3">Subject</th><th class="text-center w-24">Test</th><th class="text-center w-24">Exam</th><th></th></tr>
                            </thead>
                            <tbody id="scoreRows"></tbody>
                        </table>
                        <div class="mt-8 pt-6 border-t">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Teacher's Remark</label>
                            <textarea id="remark" class="w-full p-4 mt-2 bg-slate-50 rounded-xl border-none ring-1 ring-slate-100 italic outline-none text-sm"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="groupModal" class="fixed inset-0 bg-slate-900/50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="font-black uppercase text-sm mb-4">Set Student Group</h3>
            <p id="modalStudentName" class="text-xs font-bold text-slate-500 mb-4 uppercase"></p>
            <select id="modalGroupSelect" class="w-full p-3 rounded-xl bg-slate-50 ring-1 ring-slate-200 border-none font-bold mb-6">
                <option value="GENERAL">GENERAL</option>
                <option value="ART">ART STUDENT</option>
                <option value="SCIENCE">SCIENCE STUDENT</option>
            </select>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-3 font-black text-xs uppercase text-slate-400">Cancel</button>
                <button onclick="updateStudentGroup()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black text-xs uppercase">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        let students = [], curriculum = [], activeId = null;

        async function init() { loadData(); }

        async function loadData() {
            const { data: st } = await _supabase.from('students').select('*').order('full_name');
            const { data: cu } = await _supabase.from('school_curriculum').select('*').order('class_name');
            students = st || []; curriculum = cu || [];
            renderDirectory(); renderCurriculum(); renderEngineList(students);
            lucide.createIcons();
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.getElementById(`btn-${v}`).classList.add('active');
            lucide.createIcons();
        }

        // --- DIRECTORY & GROUP EDITING ---
        function renderDirectory() {
            document.getElementById('directoryTable').innerHTML = students.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 text-blue-600">ID-${s.id.substring(0,4)}</td>
                    <td class="p-4">${s.full_name}</td>
                    <td class="p-4">${s.grade_level || '---'}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded bg-slate-100 text-[9px] font-black">${s.student_group || 'GENERAL'}</span>
                    </td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button onclick="openGroupModal('${s.id}', '${s.full_name}', '${s.student_group}')" class="p-2 bg-blue-50 rounded-lg text-blue-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button onclick="deleteStudent('${s.id}')" class="p-2 bg-red-50 rounded-lg text-red-600"><i data-lucide="trash" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function openGroupModal(id, name, group) {
            activeId = id;
            document.getElementById('modalStudentName').innerText = name;
            document.getElementById('modalGroupSelect').value = group || 'GENERAL';
            document.getElementById('groupModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('groupModal').classList.add('hidden'); }

        async function updateStudentGroup() {
            const group = document.getElementById('modalGroupSelect').value;
            await _supabase.from('students').update({ student_group: group }).eq('id', activeId);
            closeModal(); loadData();
        }

        // --- ENGINE ROOM (THE FIX) ---
        function renderEngineList(l) {
            document.getElementById('engineList').innerHTML = l.map(s => `
                <div onclick="openEditor('${s.id}')" class="p-4 hover:bg-blue-50 cursor-pointer flex justify-between items-center group">
                    <div class="uppercase">
                        <p class="text-[11px] font-black text-slate-800">${s.full_name}</p>
                        <p class="text-[9px] font-bold text-slate-400">${s.grade_level} • ${s.student_group || 'GENERAL'}</p>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-200 group-hover:text-blue-500"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            const sGroup = s.student_group || 'GENERAL';
            
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('editName').innerText = s.full_name;
            document.getElementById('editClass').innerText = s.grade_level;
            document.getElementById('editGroupTag').innerText = sGroup;
            document.getElementById('remark').value = s.teacher_remark || '';
            
            // FILTER LOGIC: Show subjects matching (Class AND General) OR (Class AND Student's Group)
            const allowedSubjects = curriculum.filter(c => 
                c.class_name === s.grade_level && (c.subject_group === 'GENERAL' || c.subject_group === sGroup)
            );

            const existingScores = s.subjects || [];
            document.getElementById('scoreRows').innerHTML = allowedSubjects.map(cs => {
                const score = existingScores.find(es => es.name.toUpperCase() === cs.subject_name.toUpperCase()) || { test: 0, exam: 0 };
                return `
                    <tr class="bg-slate-50 border-b border-white">
                        <td class="p-3 font-black text-[11px] uppercase">${cs.subject_name} <span class="hidden extra-n-val">${cs.subject_name}</span></td>
                        <td class="p-3"><input type="number" value="${score.test}" class="st w-full p-2 rounded bg-white border-none font-black text-center text-xs outline-none" data-sub="${cs.subject_name}"></td>
                        <td class="p-3"><input type="number" value="${score.exam}" class="se w-full p-2 rounded bg-white border-none font-black text-center text-xs outline-none"></td>
                        <td></td>
                    </tr>
                `;
            }).join('');
        }

        // --- REMAINING UTILITIES ---
        async function saveScores() {
            const subs = [];
            document.querySelectorAll('#scoreRows tr').forEach(row => {
                const name = row.querySelector('.extra-n') ? row.querySelector('.extra-n').value : row.querySelector('.extra-n-val').innerText;
                const test = parseFloat(row.querySelector('.st').value) || 0;
                const exam = parseFloat(row.querySelector('.se').value) || 0;
                if(name) subs.push({ name: name.toUpperCase(), test, exam });
            });
            await _supabase.from('students').update({ subjects: subs, teacher_remark: document.getElementById('remark').value }).eq('id', activeId);
            alert("Results Updated!"); loadData();
        }

        async function addCurriculum() {
            const class_name = document.getElementById('currClass').value;
            const subject_group = document.getElementById('currGroup').value;
            const subject_name = document.getElementById('currSub').value.toUpperCase();
            if(!subject_name) return;
            await _supabase.from('school_curriculum').insert([{ class_name, subject_group, subject_name }]);
            loadData();
        }

        function renderCurriculum() {
            document.getElementById('curriculumTable').innerHTML = curriculum.map(c => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 font-black">${c.class_name}</td>
                    <td class="p-4"><span class="bg-blue-100 px-2 py-0.5 rounded">${c.subject_group}</span></td>
                    <td class="p-4">${c.subject_name}</td>
                    <td class="p-4 text-right"><button onclick="deleteCurr('${c.id}')" class="text-red-400"><i data-lucide="x" class="w-4 h-4"></i></button></td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function addExtraRow() {
            const tr = document.createElement('tr');
            tr.className = "bg-amber-50 border-b border-white";
            tr.innerHTML = `
                <td class="p-2"><input type="text" placeholder="Extra Subject" class="extra-n w-full p-2 rounded border-none font-black text-xs uppercase bg-white ring-1 ring-amber-200"></td>
                <td class="p-2"><input type="number" value="0" class="st w-full p-2 rounded bg-white border-none font-black text-center text-xs"></td>
                <td class="p-2"><input type="number" value="0" class="se w-full p-2 rounded bg-white border-none font-black text-center text-xs"></td>
                <td class="p-2 text-center"><button onclick="this.closest('tr').remove()" class="text-red-400"><i data-lucide="trash" class="w-4 h-4"></i></button></td>
            `;
            document.getElementById('scoreRows').appendChild(tr);
            lucide.createIcons();
        }

        async function deleteCurr(id) { await _supabase.from('school_curriculum').delete().eq('id', id); loadData(); }
        async function deleteStudent(id) { if(confirm("Delete permanently?")) { await _supabase.from('students').delete().eq('id', id); loadData(); } }
        function filterDirectory(v) { renderDirectory(); } 
        function filterEngine(v) { renderEngineList(students.filter(s => s.full_name.toLowerCase().includes(v.toLowerCase()))); }
        function handleLogout() { _supabase.auth.signOut().then(() => window.location.replace('login.html')); }
        window.onload = init;
    </script>
</body>
</html>
