<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex uppercase font-bold">

    <aside class="sidebar text-white p-6 fixed h-screen flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <span class="font-black text-lg text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> Students</button>
            <button onclick="showView('curriculum')" id="btn-curriculum" class="nav-link"><i data-lucide="book-open"></i> Subjects</button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="award"></i> Score Entry</button>
            <button onclick="showView('promotion')" id="btn-promotion" class="nav-link text-amber-400"><i data-lucide="trending-up"></i> Promotions</button>
        </nav>
        <button onclick="handleLogout()" class="nav-link text-red-400 mt-auto"><i data-lucide="log-out"></i> Logout</button>
    </aside>

    <main class="flex-1 ml-[260px] p-8">
        
        <section id="view-engine" class="view-section">
            <div class="mb-6 flex justify-between items-center">
                <h1 class="text-2xl font-black">Professional Score Engine</h1>
                <div class="flex gap-4 items-center bg-white p-2 rounded-xl shadow-sm border">
                    <span class="text-[10px] font-black text-slate-400 ml-2">Target Term:</span>
                    <select id="activeTerm" onchange="refreshEditor()" class="bg-blue-50 text-blue-700 px-4 py-2 rounded-lg text-xs font-black border-none outline-none ring-1 ring-blue-100">
                        <option value="term1">1st Term</option>
                        <option value="term2">2nd Term</option>
                        <option value="term3">3rd Term</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-4 bg-white rounded-2xl border h-[700px] flex flex-col">
                    <div class="p-4 border-b bg-slate-50">
                        <input type="text" oninput="filterEngine(this.value)" placeholder="Search Student..." class="w-full p-3 rounded-xl border-none ring-1 ring-slate-200 text-xs">
                    </div>
                    <div id="engineList" class="overflow-y-auto divide-y"></div>
                </div>

                <div id="editorPanel" class="col-span-8 bg-white rounded-2xl border shadow-xl hidden overflow-hidden">
                    <div id="termHeader" class="p-6 bg-slate-900 text-white flex justify-between items-center">
                        <div>
                            <h2 id="editName" class="text-xl font-black italic">---</h2>
                            <p id="editClass" class="text-blue-400 text-[10px] font-black">---</p>
                        </div>
                        <button onclick="saveScores()" class="bg-green-500 px-8 py-3 rounded-xl font-black text-xs shadow-lg">Upload to Database</button>
                    </div>
                    
                    <div class="p-6">
                        <table class="w-full text-[11px]">
                            <thead class="text-slate-400 font-black border-b">
                                <tr>
                                    <th class="text-left py-4">Subject</th>
                                    <th class="text-center bg-slate-50">Prev. Totals</th>
                                    <th class="text-center text-blue-600">Test (40)</th>
                                    <th class="text-center text-blue-600">Exam (60)</th>
                                    <th class="text-right">Current Avg</th>
                                </tr>
                            </thead>
                            <tbody id="scoreRows" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-promotion" class="view-section">
            <div class="bg-white p-8 rounded-3xl border shadow-sm">
                <h1 class="text-3xl font-black text-slate-900">Promotion Manager</h1>
                <p class="text-slate-400 text-xs mb-8">Move students to the next academic level</p>
                
                <div class="grid grid-cols-2 gap-8">
                    <div class="p-6 bg-slate-50 rounded-2xl border border-dashed border-slate-300">
                        <label class="text-[10px] font-black">Current Class</label>
                        <select id="promoFrom" class="w-full p-4 mt-2 rounded-xl border-none ring-1 ring-slate-200">
                            <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                            <option>SSS 1 ART</option><option>SSS 1 SCIENCE</option>
                        </select>
                    </div>
                    <div class="p-6 bg-blue-50 rounded-2xl border border-dashed border-blue-200">
                        <label class="text-[10px] font-black text-blue-800">Promote To</label>
                        <select id="promoTo" class="w-full p-4 mt-2 rounded-xl border-none ring-1 ring-blue-200">
                            <option>JSS 2</option><option>JSS 3</option><option>SSS 1 ART</option>
                            <option>SSS 1 SCIENCE</option><option>GRADUATED</option>
                        </select>
                    </div>
                </div>
                <button onclick="bulkPromote()" class="w-full mt-8 bg-slate-900 text-white py-5 rounded-2xl font-black text-sm hover:bg-blue-600 transition-all">Execute Bulk Promotion</button>
            </div>
        </section>

    </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        let students = [], curriculum = [], activeId = null;

        async function loadData() {
            const { data: st } = await _supabase.from('students').select('*');
            const { data: cu } = await _supabase.from('school_curriculum').select('*');
            students = st || []; curriculum = cu || [];
            renderEngineList(students);
        }

        function refreshEditor() { if(activeId) openEditor(activeId); }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            const term = document.getElementById('activeTerm').value;
            
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('editName').innerText = s.full_name;
            document.getElementById('editClass').innerText = `${s.grade_level} | RECORDING ${term.toUpperCase()}`;

            const subjects = curriculum.filter(c => c.class_name === s.grade_level || c.class_name.includes(s.grade_level.split(' ')[0]));
            const history = s.term_history || {}; // We will store 1st and 2nd term here

            document.getElementById('scoreRows').innerHTML = subjects.map(sub => {
                const prev1 = (history.term1 && history.term1[sub.subject_name]) ? (history.term1[sub.subject_name].test + history.term1[sub.subject_name].exam) : 0;
                const prev2 = (history.term2 && history.term2[sub.subject_name]) ? (history.term2[sub.subject_name].test + history.term2[sub.subject_name].exam) : 0;
                
                let prevDisplay = "---";
                if(term === 'term2') prevDisplay = `T1: ${prev1}`;
                if(term === 'term3') prevDisplay = `T1: ${prev1} | T2: ${prev2}`;

                const current = (s[term] && s[term][sub.subject_name]) ? s[term][sub.subject_name] : { test: 0, exam: 0 };

                return `
                    <tr class="hover:bg-slate-50">
                        <td class="py-4 font-black">${sub.subject_name}</td>
                        <td class="text-center text-[9px] text-slate-400 font-bold bg-slate-50">${prevDisplay}</td>
                        <td class="p-2"><input type="number" value="${current.test}" class="st w-full p-2 rounded text-center ring-1 ring-slate-100" data-name="${sub.subject_name}"></td>
                        <td class="p-2"><input type="number" value="${current.exam}" class="se w-full p-2 rounded text-center ring-1 ring-slate-100"></td>
                        <td class="text-right font-black text-blue-600">AUTO</td>
                    </tr>
                `;
            }).join('');
        }

        async function saveScores() {
            const term = document.getElementById('activeTerm').value;
            const scores = {};
            document.querySelectorAll('#scoreRows tr').forEach(row => {
                const name = row.querySelector('.st').dataset.name;
                scores[name] = {
                    test: parseFloat(row.querySelector('.st').value) || 0,
                    exam: parseFloat(row.querySelector('.se').value) || 0
                };
            });

            // Update the specific term column in Supabase
            const updateObj = {};
            updateObj[term] = scores; 
            
            // Also update term_history for easy access later
            const s = students.find(x => x.id === activeId);
            const history = s.term_history || {};
            history[term] = scores;
            updateObj['term_history'] = history;

            await _supabase.from('students').update(updateObj).eq('id', activeId);
            alert(`Termly Scores Uploaded Successfully!`);
            loadData();
        }

        async function bulkPromote() {
            const from = document.getElementById('promoFrom').value;
            const to = document.getElementById('promoTo').value;
            if(confirm(`Promote ALL students in ${from} to ${to}?`)) {
                await _supabase.from('students').update({ grade_level: to, term1: {}, term2: {}, term3: {}, term_history: {} }).eq('grade_level', from);
                alert("Promotion Complete. Scores have been reset for the new session.");
                loadData();
            }
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
        }

        function renderEngineList(l) {
            document.getElementById('engineList').innerHTML = l.map(s => `
                <div onclick="openEditor('${s.id}')" class="p-4 hover:bg-blue-50 cursor-pointer">
                    <p class="text-xs font-black">${s.full_name}</p>
                    <p class="text-[9px] text-slate-400">${s.grade_level}</p>
                </div>
            `).join('');
        }

        window.onload = loadData;
    </script>
</body>
</html>
