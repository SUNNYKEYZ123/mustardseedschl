<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 11px; width: 100%; text-transform: uppercase; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex font-bold uppercase">

    <aside class="sidebar text-white p-6 fixed h-screen flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <span class="font-black text-lg text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> Students</button>
            <button onclick="showView('curriculum')" id="btn-curriculum" class="nav-link"><i data-lucide="book-open"></i> Curriculum</button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="award"></i> Score Entry</button>
        </nav>
    </aside>

    <main class="flex-1 ml-[260px] p-8">
        
        <section id="view-directory" class="view-section active">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-black italic">Student Management</h1>
            </div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                <table class="w-full text-left text-[11px]">
                    <thead class="bg-slate-50 border-b text-slate-400">
                        <tr><th class="p-4">Name</th><th class="p-4">Class</th><th class="p-4">Group</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="directoryTable" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>

        <section id="view-curriculum" class="view-section">
            <div class="grid grid-cols-12 gap-8">
                <div class="col-span-4 bg-white p-6 rounded-2xl border">
                    <h2 class="text-blue-600 mb-6">Add Subject to Group</h2>
                    <div class="space-y-4">
                        <select id="currClass" class="w-full p-3 rounded-xl bg-slate-50 ring-1 ring-slate-200">
                            <option>JSS 1</option><option>SSS 1</option><option>SSS 2</option>
                        </select>
                        <select id="currGroup" class="w-full p-3 rounded-xl bg-slate-50 ring-1 ring-slate-200">
                            <option value="GENERAL">GENERAL</option>
                            <option value="SCIENCE">SCIENCE</option>
                            <option value="ART">ART</option>
                        </select>
                        <input id="currSub" type="text" placeholder="Subject Name" class="w-full p-3 rounded-xl bg-slate-50 ring-1 ring-slate-200">
                        <input id="currTeacher" type="text" placeholder="Teacher Name" class="w-full p-3 rounded-xl bg-slate-50 ring-1 ring-slate-200">
                        <button onclick="addCurriculum()" class="w-full bg-blue-600 text-white py-4 rounded-xl">Link to Curriculum</button>
                    </div>
                </div>
                <div class="col-span-8 bg-white rounded-2xl border overflow-hidden">
                    <table class="w-full text-left text-[10px]">
                        <thead class="bg-slate-50 border-b">
                            <tr><th class="p-4">Class/Group</th><th class="p-4">Subject</th><th class="p-4">Teacher</th><th></th></tr>
                        </thead>
                        <tbody id="curriculumTable" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="view-engine" class="view-section">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-xl font-black">Report Entry System</h1>
                <div class="flex gap-4">
                    <select id="filterClass" onchange="refreshEngine()" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-xs">
                        <option value="">Select Class</option>
                        <option>JSS 1</option><option>SSS 1</option><option>SSS 2</option>
                    </select>
                    <select id="filterGroup" onchange="refreshEngine()" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-xs">
                        <option value="GENERAL">GENERAL</option>
                        <option value="SCIENCE">SCIENCE</option>
                        <option value="ART">ART</option>
                    </select>
                    <select id="activeTerm" onchange="refreshEditor()" class="p-3 bg-blue-900 text-white rounded-xl text-xs">
                        <option value="term1">1st Term</option>
                        <option value="term2">2nd Term</option>
                        <option value="term3">3rd Term</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-4 bg-white rounded-2xl border h-[600px] overflow-y-auto" id="engineList">
                    </div>
                <div id="editorPanel" class="col-span-8 bg-white rounded-2xl border shadow-xl hidden overflow-hidden">
                    <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
                        <div>
                            <h2 id="editName" class="text-lg">---</h2>
                            <p id="editMeta" class="text-blue-400 text-[9px]">---</p>
                        </div>
                        <button onclick="saveScores()" class="bg-green-500 px-6 py-2 rounded-lg text-xs">Upload Results</button>
                    </div>
                    <div class="p-6 overflow-y-auto max-h-[500px]">
                        <table class="w-full text-[11px]">
                            <thead class="text-slate-400 border-b">
                                <tr><th class="py-4 text-left">Subject</th><th class="text-center">Prev. Avg</th><th class="w-20 text-center">Test</th><th class="w-20 text-center">Exam</th><th class="text-right">Total</th></tr>
                            </thead>
                            <tbody id="scoreRows" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        let students = [], curriculum = [], activeId = null;

        async function loadData() {
            const { data: st } = await _supabase.from('students').select('*').order('full_name');
            const { data: cu } = await _supabase.from('school_curriculum').select('*');
            students = st || []; curriculum = cu || [];
            renderDirectory();
            renderCurriculum();
            refreshEngine();
            lucide.createIcons();
        }

        function renderDirectory() {
            document.getElementById('directoryTable').innerHTML = students.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4">${s.full_name}</td>
                    <td class="p-4 text-slate-400">${s.grade_level || 'UNASSIGNED'}</td>
                    <td class="p-4"><span class="bg-blue-50 px-3 py-1 rounded-full text-blue-700">${s.student_group || 'GENERAL'}</span></td>
                    <td class="p-4 text-right">
                        <button onclick="manageStudent('${s.id}')" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-[10px]">Edit Profile</button>
                    </td>
                </tr>
            `).join('');
        }

        async function manageStudent(id) {
            const s = students.find(x => x.id === id);
            const newGroup = prompt("Set Group (GENERAL, SCIENCE, or ART):", s.student_group || "GENERAL");
            const newClass = prompt("Set Class (e.g. JSS 1, SSS 1):", s.grade_level || "");
            if(newGroup) {
                await _supabase.from('students').update({ student_group: newGroup.toUpperCase(), grade_level: newClass.toUpperCase() }).eq('id', id);
                loadData();
            }
        }

        function refreshEngine() {
            const cls = document.getElementById('filterClass').value;
            const grp = document.getElementById('filterGroup').value;
            const filtered = students.filter(s => s.grade_level === cls && (s.student_group === grp || s.student_group === 'GENERAL'));
            
            document.getElementById('engineList').innerHTML = filtered.map(s => `
                <div onclick="openEditor('${s.id}')" class="p-4 border-b hover:bg-blue-50 cursor-pointer">
                    <p class="text-xs font-black">${s.full_name}</p>
                    <p class="text-[9px] text-slate-400">${s.student_group}</p>
                </div>
            `).join('') || '<p class="p-10 text-center text-slate-300 text-xs">No students found in this class/group</p>';
        }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            const term = document.getElementById('activeTerm').value;
            const editor = document.getElementById('editorPanel');
            
            editor.classList.remove('hidden');
            document.getElementById('editName').innerText = s.full_name;
            document.getElementById('editMeta').innerText = `${s.grade_level} | ${s.student_group} | RECORDING: ${term}`;

            // GET SUBJECTS FROM CURRICULUM FOR THIS STUDENT
            const subs = curriculum.filter(c => c.class_name === s.grade_level && (c.student_group === s.student_group || c.student_group === 'GENERAL'));
            
            document.getElementById('scoreRows').innerHTML = subs.map(sub => {
                // Pull existing scores if any
                const existing = s[term] ? s[term][sub.subject_name] : { test: 0, exam: 0 };
                // Calculate Prev Avg logic (Example for 3rd term)
                const prevSum = (s.term1?.[sub.subject_name]?.total || 0) + (s.term2?.[sub.subject_name]?.total || 0);
                const prevAvg = term === 'term3' ? (prevSum / 2).toFixed(1) : "---";

                return `
                    <tr class="hover:bg-slate-50">
                        <td class="py-4 font-black">${sub.subject_name}<br><span class="text-[8px] text-slate-300">Teacher: ${sub.assigned_teacher || 'Staff'}</span></td>
                        <td class="text-center text-slate-400 bg-slate-50">${prevAvg}</td>
                        <td class="p-2"><input type="number" value="${existing.test}" class="st w-full p-2 rounded text-center ring-1 ring-slate-200" data-sub="${sub.subject_name}"></td>
                        <td class="p-2"><input type="number" value="${existing.exam}" class="se w-full p-2 rounded text-center ring-1 ring-slate-200"></td>
                        <td class="text-right font-black text-blue-600">---</td>
                    </tr>
                `;
            }).join('');
        }

        async function saveScores() {
            const term = document.getElementById('activeTerm').value;
            const results = {};
            document.querySelectorAll('#scoreRows tr').forEach(row => {
                const sub = row.querySelector('.st').dataset.sub;
                const test = parseFloat(row.querySelector('.st').value) || 0;
                const exam = parseFloat(row.querySelector('.se').value) || 0;
                results[sub] = { test, exam, total: test + exam };
            });

            const updatePayload = {};
            updatePayload[term] = results;
            
            const { error } = await _supabase.from('students').update(updatePayload).eq('id', activeId);
            if(!error) { alert("Term Scores Saved!"); loadData(); }
        }

        async function addCurriculum() {
            const payload = {
                class_name: document.getElementById('currClass').value,
                student_group: document.getElementById('currGroup').value,
                subject_name: document.getElementById('currSub').value.toUpperCase(),
                assigned_teacher: document.getElementById('currTeacher').value
            };
            await _supabase.from('school_curriculum').insert([payload]);
            loadData();
        }

        function renderCurriculum() {
            document.getElementById('curriculumTable').innerHTML = curriculum.map(c => `
                <tr>
                    <td class="p-4 font-black">${c.class_name} (${c.student_group})</td>
                    <td class="p-4">${c.subject_name}</td>
                    <td class="p-4 italic text-slate-400">${c.assigned_teacher}</td>
                    <td class="p-4"><button onclick="deleteCurr('${c.id}')" class="text-red-400">Remove</button></td>
                </tr>
            `).join('');
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.getElementById(`btn-${v}`).classList.add('active');
            lucide.createIcons();
        }

        window.onload = loadData;
    </script>
</body>
</html>
