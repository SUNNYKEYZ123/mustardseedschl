<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <aside class="sidebar text-white p-6 fixed h-screen flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <span class="font-black text-lg tracking-tighter uppercase text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> Students List</button>
            <button onclick="showView('curriculum')" id="btn-curriculum" class="nav-link"><i data-lucide="book-open"></i> Class Subjects</button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="award"></i> Score Entry</button>
        </nav>
        <button onclick="handleLogout()" class="nav-link text-red-400 hover:bg-red-400/10 mt-auto"><i data-lucide="log-out"></i> Logout</button>
    </aside>

    <main class="flex-1 ml-[260px] p-8">
        
        <section id="view-directory" class="view-section active">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-black text-slate-900 uppercase">Student Directory</h1>
                    <p class="text-slate-400 text-xs font-bold uppercase">Manage access and student status</p>
                </div>
                <input type="text" oninput="filterTable('directoryTable', this.value)" placeholder="Search students..." class="px-4 py-2 rounded-xl border-none shadow-sm ring-1 ring-slate-200 text-sm font-bold w-64">
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] uppercase font-black text-slate-400">
                        <tr><th class="p-4">Profile</th><th class="p-4">Class</th><th class="p-4">Status</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="directoryTable" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </section>

        <section id="view-curriculum" class="view-section">
            <div class="mb-8">
                <h1 class="text-3xl font-black text-slate-900 uppercase">Class Curriculum</h1>
                <p class="text-slate-400 text-xs font-bold uppercase">Define subjects for each class</p>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-black text-xs uppercase mb-4 text-blue-600">Add New Subject to Class</h3>
                    <div class="space-y-4">
                        <select id="currClass" class="w-full p-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-sm">
                            <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                            <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                        </select>
                        <input type="text" id="currSub" placeholder="Subject Name (e.g. Maths)" class="w-full p-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-sm uppercase">
                        <input type="text" id="currTeacher" placeholder="Teacher Name" class="w-full p-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 font-bold text-sm">
                        <button onclick="addCurriculum()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-xs">Save to Curriculum</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] uppercase font-black text-slate-400">
                            <tr><th class="p-4">Class</th><th class="p-4">Subject</th><th class="p-4">Teacher</th><th class="p-4"></th></tr>
                        </thead>
                        <tbody id="curriculumTable" class="text-xs font-bold divide-y uppercase"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="view-engine" class="view-section">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 bg-white rounded-2xl border h-[700px] flex flex-col overflow-hidden">
                    <div class="p-4 border-b bg-slate-50">
                        <input type="text" oninput="filterEngine(this.value)" placeholder="Find student..." class="w-full p-2.5 rounded-lg border-none ring-1 ring-slate-200 text-xs font-bold">
                    </div>
                    <div id="engineList" class="overflow-y-auto divide-y"></div>
                </div>
                <div id="editorPanel" class="lg:col-span-8 bg-white rounded-2xl border shadow-xl hidden overflow-hidden">
                    <div class="p-6 bg-blue-900 text-white flex justify-between items-center">
                        <div>
                            <h2 id="editName" class="text-xl font-black uppercase">---</h2>
                            <p id="editClass" class="text-blue-300 text-[10px] font-black uppercase tracking-widest">---</p>
                        </div>
                        <button onclick="saveScores()" class="bg-green-500 px-6 py-2 rounded-xl font-black text-xs uppercase shadow-lg">Save Scores</button>
                    </div>
                    <div class="p-6">
                        <table class="w-full text-sm border-separate border-spacing-y-2">
                            <thead class="text-[10px] text-slate-400 font-black uppercase">
                                <tr><th class="text-left">Subject</th><th class="text-center w-24">Test</th><th class="text-center w-24">Exam</th></tr>
                            </thead>
                            <tbody id="scoreRows"></tbody>
                        </table>
                        <div class="mt-6 pt-6 border-t">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Principal Remark</label>
                            <textarea id="remark" class="w-full p-4 mt-2 bg-slate-50 rounded-xl border-none ring-1 ring-slate-100 italic outline-none"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        let students = [], curriculum = [], activeId = null;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if(!session) window.location.replace('login.html');
            loadData();
        }

        async function loadData() {
            const { data: st } = await _supabase.from('students').select('*').order('full_name');
            const { data: cu } = await _supabase.from('school_curriculum').select('*').order('class_name');
            students = st || [];
            curriculum = cu || [];
            renderDirectory();
            renderCurriculum();
            renderEngineList(students);
            lucide.createIcons();
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.getElementById(`btn-${v}`).classList.add('active');
            lucide.createIcons();
        }

        // --- DIRECTORY LOGIC ---
        function renderDirectory() {
            document.getElementById('directoryTable').innerHTML = students.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 font-black text-xs uppercase">${s.full_name}</td>
                    <td class="p-4 text-xs font-bold text-slate-500">${s.grade_level || 'N/A'}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded-md text-[9px] font-black uppercase ${s.status === 'Suspended' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">${s.status || 'Enrolled'}</span>
                    </td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button onclick="toggleSuspension('${s.id}', '${s.status}')" class="p-2 bg-slate-100 rounded-lg" title="Toggle Suspension"><i data-lucide="slash" class="w-4 h-4 text-amber-600"></i></button>
                        <button onclick="deleteStudent('${s.id}')" class="p-2 bg-red-50 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4 text-red-600"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        async function toggleSuspension(id, current) {
            const next = current === 'Suspended' ? 'Enrolled' : 'Suspended';
            await _supabase.from('students').update({ status: next }).eq('id', id);
            loadData();
        }

        async function deleteStudent(id) {
            if(confirm("DANGER: This will permanently erase this student from the school records. Proceed?")) {
                await _supabase.from('students').delete().eq('id', id);
                loadData();
            }
        }

        // --- CURRICULUM LOGIC ---
        function renderCurriculum() {
            document.getElementById('curriculumTable').innerHTML = curriculum.map(c => `
                <tr>
                    <td class="p-4 text-blue-600 font-black">${c.class_name}</td>
                    <td class="p-4">${c.subject_name}</td>
                    <td class="p-4 text-slate-400 italic">${c.assigned_teacher || 'No Teacher'}</td>
                    <td class="p-4 text-right"><button onclick="deleteCurr('${c.id}')" class="text-red-400"><i data-lucide="x" class="w-4 h-4"></i></button></td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        async function addCurriculum() {
            const class_name = document.getElementById('currClass').value;
            const subject_name = document.getElementById('currSub').value;
            const assigned_teacher = document.getElementById('currTeacher').value;
            if(!subject_name) return alert("Enter subject name");
            await _supabase.from('school_curriculum').insert([{ class_name, subject_name, assigned_teacher }]);
            loadData();
        }

        async function deleteCurr(id) {
            await _supabase.from('school_curriculum').delete().eq('id', id);
            loadData();
        }

        // --- RESULTS ENGINE ROOM (AUTO-SUBJECTS) ---
        function renderEngineList(list) {
            document.getElementById('engineList').innerHTML = list.map(s => `
                <div onclick="openEditor('${s.id}')" class="p-4 hover:bg-blue-50 cursor-pointer flex justify-between items-center group">
                    <div>
                        <p class="text-xs font-black uppercase text-slate-800">${s.full_name}</p>
                        <p class="text-[9px] font-bold text-slate-400">${s.grade_level}</p>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-200 group-hover:text-blue-500"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('editName').innerText = s.full_name;
            document.getElementById('editClass').innerText = s.grade_level;
            document.getElementById('remark').value = s.teacher_remark || '';
            
            // Get subjects for this class from Curriculum
            const classSubs = curriculum.filter(c => c.class_name === s.grade_level);
            const existingScores = s.subjects || [];

            const rows = document.getElementById('scoreRows');
            rows.innerHTML = classSubs.map(cs => {
                // Check if student already has a score for this subject
                const score = existingScores.find(es => es.name.toUpperCase() === cs.subject_name.toUpperCase()) || { test: 0, exam: 0 };
                return `
                    <tr class="bg-slate-50 rounded-lg overflow-hidden">
                        <td class="p-3 font-black text-xs uppercase">${cs.subject_name} <span class="block text-[8px] text-slate-400 font-bold">${cs.assigned_teacher || ''}</span></td>
                        <td class="p-3"><input type="number" value="${score.test}" class="st w-full p-2 rounded bg-white border-none font-black text-center text-xs outline-none focus:ring-2 ring-blue-500" data-sub="${cs.subject_name}" data-teacher="${cs.assigned_teacher}"></td>
                        <td class="p-3"><input type="number" value="${score.exam}" class="se w-full p-2 rounded bg-white border-none font-black text-center text-xs outline-none focus:ring-2 ring-blue-500"></td>
                    </tr>
                `;
            }).join('');
        }

        async function saveScores() {
            const subs = [];
            const tests = document.querySelectorAll('.st');
            const exams = document.querySelectorAll('.se');

            tests.forEach((t, i) => {
                subs.push({
                    name: t.getAttribute('data-sub'),
                    teacher: t.getAttribute('data-teacher'),
                    test: parseFloat(t.value) || 0,
                    exam: parseFloat(exams[i].value) || 0
                });
            });

            const { error } = await _supabase.from('students').update({
                subjects: subs,
                teacher_remark: document.getElementById('remark').value,
                result_status: 'Published'
            }).eq('id', activeId);

            if(!error) {
                alert("Report Updated Successfully!");
                loadData();
            } else {
                alert("Error: " + error.message);
            }
        }

        function filterEngine(val) {
            renderEngineList(students.filter(s => s.full_name.toLowerCase().includes(val.toLowerCase())));
        }

        function handleLogout() { _supabase.auth.signOut().then(() => window.location.replace('login.html')); }
        window.onload = init;
    </script>
</body>
</html>
