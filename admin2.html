<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.3s; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; transition: all 0.3s; position: fixed; height: 100vh; }
        .sidebar.collapsed { width: 80px; }
        .sidebar.collapsed span, .sidebar.collapsed .logo-text { display: none; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; white-space: nowrap; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .main-content { transition: margin-left 0.3s; margin-left: 260px; padding: 2rem; flex: 1; }
        .main-content.expanded { margin-left: 80px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex text-slate-900 uppercase">

    <aside id="sidebar" class="sidebar text-white p-6 flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10 min-w-[40px]">
            <span class="logo-text font-black text-lg text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> <span>Student List</span></button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="edit-3"></i> <span>Score Entry</span></button>
            <button onclick="showView('broadsheet')" id="btn-broadsheet" class="nav-link"><i data-lucide="layout-grid"></i> <span>Broadsheet</span></button>
            <button onclick="showView('diary')" id="btn-diary" class="nav-link"><i data-lucide="award"></i> <span>The Diary</span></button>
            <button onclick="showView('curriculum')" id="btn-curriculum" class="nav-link"><i data-lucide="book-open"></i> <span>Curriculum</span></button>
        </nav>
        <button onclick="toggleSidebar()" class="nav-link text-slate-400 mb-2 border-t border-slate-800 pt-4"><i data-lucide="arrow-left-right"></i> <span>Shrink Menu</span></button>
        <button onclick="handleLogout()" class="nav-link text-red-400"><i data-lucide="log-out"></i> <span>Logout</span></button>
    </aside>

    <main id="mainContent" class="main-content">
        <section id="view-directory" class="view-section active">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-black">Student List</h1>
                    <p id="dirCount" class="text-blue-600 text-xs font-black">Total: 0 Students</p>
                </div>
                <div class="flex gap-3">
                    <select id="dirClassFilter" onchange="renderDirectory()" class="px-4 py-2 rounded-xl border-none shadow-sm ring-1 ring-slate-200 text-xs font-bold outline-none">
                        <option value="ALL">All Classes</option>
                        <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                        <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                    </select>
                    <input type="text" id="dirSearchInput" oninput="renderDirectory()" placeholder="Find name..." class="px-4 py-2 rounded-xl border-none shadow-sm ring-1 ring-slate-200 text-sm font-bold w-64 outline-none">
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] font-black text-slate-400">
                        <tr><th class="p-4">Reg ID</th><th class="p-4">Name, Class & Dept</th><th class="p-4 text-right">Settings</th></tr>
                    </thead>
                    <tbody id="directoryTable" class="divide-y text-[11px] font-bold"></tbody>
                </table>
            </div>
        </section>

        <section id="view-engine" class="view-section">
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-4 bg-white rounded-2xl border h-[750px] flex flex-col overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b space-y-2">
                        <select id="engineClassFilter" onchange="renderEngineList()" class="w-full p-2 rounded bg-white ring-1 ring-slate-200 border-none text-[10px] font-black">
                            <option value="ALL">All Classes</option>
                            <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                            <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                        </select>
                        <input type="text" id="engineSearchInput" oninput="renderEngineList()" placeholder="Find Student..." class="w-full p-3 rounded-lg ring-1 ring-slate-200 text-xs font-black outline-none">
                    </div>
                    <div id="engineList" class="overflow-y-auto divide-y"></div>
                </div>
                
                <div id="editorPanel" class="col-span-8 bg-white rounded-2xl border shadow-xl hidden flex flex-col overflow-hidden">
                    <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
                        <div>
                            <h2 id="editName" class="text-xl font-black">---</h2>
                            <span id="editMetaLabel" class="text-blue-400 text-[10px] font-black">---</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="saveScores('Draft')" class="bg-slate-700 px-4 py-2 rounded-lg font-black text-[10px]">Save Draft</button>
                            <button onclick="saveScores('Published')" class="bg-green-600 px-4 py-2 rounded-lg font-black text-[10px] shadow-lg">Publish Result</button>
                        </div>
                    </div>
                    <div class="p-6 flex-1 overflow-y-auto">
                        <div class="grid grid-cols-4 gap-2 mb-6 p-4 bg-blue-50 rounded-xl border border-blue-100">
                            <div>
                                <label class="text-[8px] font-black text-blue-800 uppercase">1st Term Tot</label>
                                <input type="number" id="t1Total" class="w-full mt-1 p-2 rounded bg-white border-none font-black text-sm outline-none ring-1 ring-slate-200">
                            </div>
                            <div>
                                <label class="text-[8px] font-black text-blue-800 uppercase">2nd Term Tot</label>
                                <input type="number" id="t2Total" class="w-full mt-1 p-2 rounded bg-white border-none font-black text-sm outline-none ring-1 ring-slate-200">
                            </div>
                            <div>
                                <label class="text-[8px] font-black text-blue-800 uppercase">Sch opened</label>
                                <input type="number" id="globalOpened" class="w-full mt-1 p-2 rounded bg-white border-none font-black text-sm outline-none ring-1 ring-slate-200">
                            </div>
                            <div>
                                <label class="text-[8px] font-black text-blue-800 uppercase">Present</label>
                                <input type="number" id="stPresent" class="w-full mt-1 p-2 rounded bg-white border-none font-black text-sm outline-none ring-1 ring-slate-200">
                            </div>
                        </div>
                        <table class="w-full">
                            <thead class="text-[10px] text-slate-400 font-black border-b uppercase">
                                <tr><th class="text-left py-3">Subject</th><th class="text-center w-24">Test (40)</th><th class="text-center w-24">Exam (60)</th></tr>
                            </thead>
                            <tbody id="scoreRows"></tbody>
                        </table>
                        <textarea id="remark" class="w-full p-4 mt-6 bg-slate-50 rounded-xl ring-1 ring-slate-100 text-sm h-16" placeholder="Principal's Remark..."></textarea>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-broadsheet" class="view-section">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black">Class Broadsheet</h1>
                <select id="bsClassFilter" onchange="renderBroadsheet()" class="p-3 rounded-xl ring-1 ring-slate-200 text-xs font-bold">
                    <option value="">Select Class...</option>
                    <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                    <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                </select>
            </div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-x-auto p-4">
                <table id="bsTable" class="w-full text-[10px] font-bold border-collapse text-center"></table>
            </div>
        </section>

        <section id="view-diary" class="view-section">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black">The Diary</h1>
                <select id="diaryClassFilter" onchange="renderDiary()" class="p-3 rounded-xl ring-1 ring-slate-200 text-xs font-bold">
                    <option value="">Select Class...</option>
                    <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                    <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                </select>
            </div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                <table class="w-full text-left text-[11px] font-bold">
                    <thead class="bg-slate-900 text-white">
                        <tr><th class="p-4">POS</th><th class="p-4">Student Name</th><th class="p-4 text-center">Aggregate</th><th class="p-4 text-center">Current %</th><th class="p-4 text-center">Cumulative %</th></tr>
                    </thead>
                    <tbody id="diaryTable" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        <section id="view-curriculum" class="view-section">
            <div class="bg-white rounded-2xl border overflow-hidden p-6">
                <h1 class="text-xl font-black mb-6">Subject Setup</h1>
                <div class="grid grid-cols-4 gap-4 mb-8">
                    <select id="currClass" class="p-3 rounded-xl ring-1 ring-slate-200 text-xs font-bold"><option>JSS 1</option><option>JSS 2</option><option>JSS 3</option><option>SSS 1</option><option>SSS 2</option><option>SSS 3</option></select>
                    <select id="currGroup" class="p-3 rounded-xl ring-1 ring-slate-200 text-xs font-bold"><option value="GENERAL">GENERAL</option><option value="ART">ART</option><option value="SCIENCE">SCIENCE</option></select>
                    <input type="text" id="currSub" placeholder="Subject Name" class="p-3 rounded-xl ring-1 ring-slate-200 text-xs font-bold">
                    <input type="text" id="currTeacher" placeholder="Teacher Name" class="p-3 rounded-xl ring-1 ring-slate-200 text-xs font-bold">
                    <button onclick="addCurriculum()" class="col-span-4 bg-blue-600 text-white p-3 rounded-xl font-black text-xs">Save Subject</button>
                </div>
                <table class="w-full text-left text-[10px] font-bold">
                    <thead class="bg-slate-50 border-b"><tr><th class="p-4">Class</th><th class="p-4">Dept</th><th class="p-4">Subject</th><th class="p-4 text-right">Action</th></tr></thead>
                    <tbody id="curriculumTable" class="divide-y"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        let students = [], curriculum = [], activeId = null;

        async function init() { 
            const { data: st } = await _supabase.from('students').select('*').order('full_name');
            const { data: cu } = await _supabase.from('school_curriculum').select('*');
            students = st || []; curriculum = cu || [];
            renderDirectory(); renderEngineList(); renderCurriculum();
            lucide.createIcons();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('mainContent').classList.toggle('expanded');
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.getElementById(`btn-${v}`).classList.add('active');
            lucide.createIcons();
        }

        function renderDirectory() {
            const classFilter = document.getElementById('dirClassFilter').value;
            const search = document.getElementById('dirSearchInput').value.toLowerCase();
            const filtered = students.filter(s => (classFilter === 'ALL' || s.grade_level === classFilter) && s.full_name.toLowerCase().includes(search));
            
            document.getElementById('dirCount').innerText = `Total: ${filtered.length} Students`;
            document.getElementById('directoryTable').innerHTML = filtered.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 text-blue-600">ID-${s.id.substring(0,4)}</td>
                    <td class="p-4">${s.full_name} <span class="text-blue-500 ml-1 text-[9px]">${s.grade_level}</span></td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button onclick="gotoEdit('${s.id}')" class="p-2 bg-blue-50 text-blue-600 rounded-lg"><i data-lucide="edit-3" class="w-3 h-3"></i></button>
                        <button onclick="deleteStudent('${s.id}')" class="p-2 bg-red-50 text-red-600 rounded-lg"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                    </td>
                </tr>`).join('');
            lucide.createIcons();
        }

        function renderEngineList() {
            const cf = document.getElementById('engineClassFilter').value;
            const search = document.getElementById('engineSearchInput').value.toLowerCase();
            const filtered = students.filter(s => (cf === 'ALL' || s.grade_level === cf) && s.full_name.toLowerCase().includes(search));
            document.getElementById('engineList').innerHTML = filtered.map(s => `
                <div onclick="openEditor('${s.id}')" class="p-4 hover:bg-blue-50 cursor-pointer font-black text-[11px]">
                    ${s.full_name} <span class="text-slate-400 block text-[9px]">${s.grade_level}</span>
                </div>`).join('');
        }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('editName').innerText = s.full_name;
            document.getElementById('editMetaLabel').innerText = `${s.grade_level} — ${s.student_group || 'GENERAL'}`;
            document.getElementById('globalOpened').value = s.times_opened || 0;
            document.getElementById('stPresent').value = s.times_present || 0;
            document.getElementById('t1Total').value = s.term1_total || 0;
            document.getElementById('t2Total').value = s.term2_total || 0;
            document.getElementById('remark').value = s.teacher_remark || '';
            
            const saved = s.subjects || [];
            const match = curriculum.filter(c => c.class_name === s.grade_level && (c.subject_group === 'GENERAL' || c.subject_group === s.student_group));
            document.getElementById('scoreRows').innerHTML = match.map(c => {
                const sv = saved.find(e => e.name === c.subject_name) || { test: '-', exam: '-' };
                return `<tr>
                    <td class="py-3 font-black text-[11px]">${c.subject_name}</td>
                    <td><input type="text" value="${sv.test}" class="st w-16 p-2 rounded bg-slate-50 text-center text-xs" data-sub="${c.subject_name}"></td>
                    <td><input type="text" value="${sv.exam}" class="se w-16 p-2 rounded bg-slate-50 text-center text-xs"></td>
                </tr>`;
            }).join('');
        }

        async function saveScores(status) {
            const subs = [];
            const tests = document.querySelectorAll('.st');
            const exams = document.querySelectorAll('.se');
            tests.forEach((t, i) => subs.push({ name: t.getAttribute('data-sub'), test: t.value, exam: exams[i].value }));
            
            await _supabase.from('students').update({ 
                subjects: subs, 
                teacher_remark: document.getElementById('remark').value, 
                times_opened: parseInt(document.getElementById('globalOpened').value) || 0, 
                times_present: parseInt(document.getElementById('stPresent').value) || 0,
                term1_total: parseFloat(document.getElementById('t1Total').value) || 0,
                term2_total: parseFloat(document.getElementById('t2Total').value) || 0,
                result_status: status 
            }).eq('id', activeId);
            
            alert("Scores Updated!"); init();
        }

        function calculateStats(s) {
            let aggregate = 0, count = 0;
            (s.subjects || []).forEach(sub => {
                const t = (sub.test === '-' || !sub.test) ? 0 : parseFloat(sub.test);
                const e = (sub.exam === '-' || !sub.exam) ? 0 : parseFloat(sub.exam);
                aggregate += (t + e);
                if(t + e > 0 || sub.test === '-' || sub.exam === '-') count++;
            });
            const avg = count > 0 ? (aggregate / count).toFixed(2) : 0;
            
            // CUMULATIVE LOGIC
            const t1 = parseFloat(s.term1_total) || 0;
            const t2 = parseFloat(s.term2_total) || 0;
            let cum = avg;
            if (t1 > 0 && t2 > 0) cum = ((t1 + t2 + parseFloat(avg)) / 3).toFixed(2);
            else if (t1 > 0) cum = ((t1 + parseFloat(avg)) / 2).toFixed(2);

            return { aggregate, average: avg, cumulative: cum };
        }

        function renderBroadsheet() {
            const cls = document.getElementById('bsClassFilter').value;
            if(!cls) return;
            const classStudents = students.filter(s => s.grade_level === cls);
            const classSubs = curriculum.filter(c => c.class_name === cls);
            
            let html = `<thead><tr><th class="p-2 border">NAME</th>`;
            classSubs.forEach(c => html += `<th class="p-2 border text-[8px]">${c.subject_name}</th>`);
            html += `<th class="p-2 border bg-blue-50">AGG</th><th class="p-2 border bg-blue-50">CURR%</th><th class="p-2 border bg-green-50">CUM%</th></tr></thead><tbody>`;

            classStudents.forEach(s => {
                const st = calculateStats(s);
                html += `<tr><td class="p-2 border text-left">${s.full_name}</td>`;
                classSubs.forEach(cs => {
                    const score = (s.subjects || []).find(sub => sub.name === cs.subject_name);
                    html += `<td class="p-2 border">${score ? (parseFloat(score.test)||0) + (parseFloat(score.exam)||0) : '-'}</td>`;
                });
                html += `<td class="p-2 border bg-blue-50 font-black">${st.aggregate}</td><td class="p-2 border bg-blue-50">${st.average}</td><td class="p-2 border bg-green-50">${st.cumulative}</td></tr>`;
            });
            document.getElementById('bsTable').innerHTML = html + `</tbody>`;
        }

        function renderDiary() {
            const cls = document.getElementById('diaryClassFilter').value;
            if(!cls) return;
            const ranked = students.filter(s => s.grade_level === cls)
                .map(s => ({ ...s, stats: calculateStats(s) }))
                .sort((a, b) => b.stats.aggregate - a.stats.aggregate);

            document.getElementById('diaryTable').innerHTML = ranked.map((s, i) => `
                <tr>
                    <td class="p-4 font-black text-blue-600">${i + 1}</td>
                    <td class="p-4">${s.full_name}</td>
                    <td class="p-4 text-center font-black">${s.stats.aggregate}</td>
                    <td class="p-4 text-center">${s.stats.average}%</td>
                    <td class="p-4 text-center text-green-600 font-black">${s.stats.cumulative}%</td>
                </tr>`).join('');
        }

        async function addCurriculum() {
            const class_name = document.getElementById('currClass').value, subject_group = document.getElementById('currGroup').value;
            const subject_name = document.getElementById('currSub').value.toUpperCase(), assigned_teacher = document.getElementById('currTeacher').value;
            await _supabase.from('school_curriculum').insert([{ class_name, subject_group, subject_name, assigned_teacher }]);
            init();
        }

        function renderCurriculum() {
            document.getElementById('curriculumTable').innerHTML = curriculum.map(c => `<tr><td class="p-4">${c.class_name}</td><td class="p-4">${c.subject_group}</td><td class="p-4">${c.subject_name}</td><td class="p-4 text-right"><button onclick="deleteCurr('${c.id}')" class="text-red-400"><i data-lucide="x-circle" class="w-4 h-4"></i></button></td></tr>`).join('');
            lucide.createIcons();
        }

        async function deleteCurr(id) { if(confirm("Remove?")) { await _supabase.from('school_curriculum').delete().eq('id', id); init(); } }
        async function deleteStudent(id) { if(confirm("Delete?")) { await _supabase.from('students').delete().eq('id', id); init(); } }
        function gotoEdit(id) { showView('engine'); openEditor(id); }
        function handleLogout() { _supabase.auth.signOut().then(() => window.location.replace('login.html')); }
        window.onload = init;
    </script>
</body>
</html>
