<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-header { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .student-card:hover { transform: translateY(-2px); transition: all 0.2s; }
        .hidden-row { display: none !important; }
        /* Professional loading pulse */
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans opacity-0 transition-opacity duration-500" id="adminBody">
    
    <nav class="glass-header text-white p-4 shadow-2xl sticky top-0 z-50 border-b border-slate-700">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10 drop-shadow-md" alt="Logo">
                <div class="hidden sm:block">
                    <h1 class="text-lg font-black tracking-tighter uppercase leading-none">Console</h1>
                    <span class="text-[9px] text-blue-400 font-bold uppercase tracking-[0.2em]">Mustard Seed School</span>
                </div>
            </div>
            <div class="flex gap-4 items-center font-bold text-[11px] uppercase tracking-widest">
                <button onclick="handleLogout()" class="bg-red-500/10 text-red-400 border border-red-500/20 px-5 py-2 rounded-full hover:bg-red-500 hover:text-white transition">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-10 px-4 pb-20">
        <div class="flex flex-col lg:flex-row justify-between items-end gap-6 mb-10">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">DIRECTORY</h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Management & Access Control</p>
            </div>
            
            <div class="flex flex-wrap gap-4 w-full lg:w-auto">
                <div class="flex-1 min-w-[280px] relative group">
                    <input type="text" id="searchInput" onkeyup="filterStudents()" placeholder="Search Name, ID, or Phone..." 
                           class="w-full pl-12 pr-4 py-4 rounded-2xl border-none shadow-xl shadow-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <svg class="w-5 h-5 text-slate-300 absolute left-4 top-4 group-focus-within:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                
                <div class="bg-white px-8 py-3 rounded-2xl shadow-xl shadow-slate-200 flex items-center gap-6 border border-white">
                    <div class="text-center">
                        <span id="student-count" class="text-3xl font-black text-blue-600 block leading-none">0</span>
                        <span class="text-[8px] text-slate-400 font-black uppercase tracking-widest">Total</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-white overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left" id="studentTable">
                    <thead class="bg-slate-50/50 border-b border-slate-100">
                        <tr>
                            <th class="p-6 text-[10px] uppercase text-slate-400 font-black tracking-widest">Student Profile</th>
                            <th class="p-6 text-[10px] uppercase text-slate-400 font-black tracking-widest text-center">Identity</th>
                            <th class="p-6 text-[10px] uppercase text-slate-400 font-black tracking-widest text-center">Status</th>
                            <th class="p-6 text-[10px] uppercase text-slate-400 font-black tracking-widest text-right">Power Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');

        async function checkAdminAccess() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }

            const { data: profile } = await _supabase.from('students').select('is_admin').eq('id', user.id).single();
            if (!profile || !profile.is_admin) {
                alert("Restricted Area!");
                window.location.href = 'profile.html';
            } else {
                document.getElementById('adminBody').classList.remove('opacity-0');
                loadAllStudents();
            }
        }

        async function loadAllStudents() {
            const { data: students, error } = await _supabase.from('students').select('*').eq('is_admin', false).order('full_name', { ascending: true });
            if (!error) renderTable(students);
        }

        function renderTable(list) {
            const tableBody = document.getElementById('admin-table-body');
            document.getElementById('student-count').textContent = list.length;
            
            tableBody.innerHTML = list.map(st => {
                const msId = "MS-" + st.id.substring(0, 5).toUpperCase();
                const isNull = !st.full_name || st.status === null;
                const statusColor = st.status === 'Enrolled' ? 'bg-green-500' : (st.status === 'Suspended' ? 'bg-red-500' : 'bg-amber-400');

                return `
                    <tr class="hover:bg-blue-50/30 transition group student-row" data-search="${st.full_name} ${msId} ${st.phone}">
                        <td class="p-6">
                            <div class="flex items-center gap-4">
                                <div class="relative">
                                    <img src="${st.avatar_url || 'https://via.placeholder.com/100'}" class="w-12 h-12 rounded-2xl border-2 border-white shadow-md object-cover">
                                    <span class="absolute -bottom-1 -right-1 w-4 h-4 rounded-full border-2 border-white ${statusColor}"></span>
                                </div>
                                <div>
                                    <p class="font-black text-slate-800 uppercase tracking-tighter leading-none">${st.full_name || 'INCOMPLETE REG'}</p>
                                    <p class="text-[9px] text-slate-400 mt-1 font-bold uppercase">${st.grade_level || 'No Class'} • ${st.phone || 'NO PHONE'}</p>
                                </div>
                            </div>
                        </td>
                        <td class="p-6 text-center">
                            <span class="font-black text-[10px] bg-slate-100 px-3 py-1.5 rounded-lg text-slate-500 border border-slate-200 tracking-widest">${msId}</span>
                        </td>
                        <td class="p-6 text-center">
                            <span class="px-4 py-1.5 rounded-full text-[8px] font-black uppercase tracking-widest border ${st.status === 'Enrolled' ? 'text-green-600 bg-green-50 border-green-100' : 'text-amber-600 bg-amber-50 border-amber-100'}">
                                ${st.status || 'NULL'}
                            </span>
                        </td>
                        <td class="p-6 text-right">
                            <div class="flex justify-end gap-3">
                                <button onclick="updateStatus('${st.id}', 'Enrolled')" class="p-2.5 rounded-xl bg-green-50 text-green-600 hover:bg-green-600 hover:text-white transition shadow-sm" title="Approve">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </button>
                                <button onclick="updateStatus('${st.id}', 'Suspended')" class="p-2.5 rounded-xl bg-amber-50 text-amber-600 hover:bg-amber-600 hover:text-white transition shadow-sm" title="Suspend/Disable">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
                                </button>
                                <button onclick="deleteStudent('${st.id}')" class="p-2.5 rounded-xl bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition shadow-sm" title="Delete Permanent">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterStudents() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('.student-row');
            rows.forEach(row => {
                const text = row.getAttribute('data-search').toLowerCase();
                row.classList.toggle('hidden-row', !text.includes(val));
            });
        }

        async function updateStatus(id, newStatus) {
            if(!confirm(`Set student to ${newStatus}?`)) return;
            const { error } = await _supabase.from('students').update({ status: newStatus }).eq('id', id);
            if (!error) loadAllStudents();
        }

        async function deleteStudent(id) {
            if(!confirm("⚠️ PERMANENT DELETE? This cannot be undone.")) return;
            const { error } = await _supabase.from('students').delete().eq('id', id);
            if (!error) {
                alert("Student Record Wiped.");
                loadAllStudents();
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.replace('login.html');
        }

        window.onload = checkAdminAccess;
    </script>
</body>
</html>
