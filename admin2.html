<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Engine Room | MSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .nav-btn { @apply w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm transition-all duration-200; }
        .nav-active { @apply bg-blue-600 text-white shadow-lg shadow-blue-900/20; }
        .nav-inactive { @apply text-slate-400 hover:bg-slate-800 hover:text-white; }
        .section-hidden { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <aside class="w-72 bg-slate-900 text-white h-screen sticky top-0 hidden md:flex flex-col p-6 shadow-2xl">
        <div class="flex items-center gap-3 mb-10 px-2">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <div>
                <h1 class="font-black tracking-tighter text-white leading-none">ENGINE ROOM</h1>
                <p class="text-[10px] text-blue-400 font-bold tracking-widest uppercase">Mustard Seed School</p>
            </div>
        </div>

        <nav class="space-y-2 flex-1">
            <button onclick="showSection('directory')" id="nav-directory" class="nav-btn nav-active">
                <i data-lucide="users" class="w-5 h-5"></i> Students Directory
            </button>
            <button onclick="showSection('records')" id="nav-records" class="nav-btn nav-inactive">
                <i data-lucide="edit-3" class="w-5 h-5"></i> Record Entry
            </button>
            <button onclick="showSection('subjects')" id="nav-subjects" class="nav-btn nav-inactive">
                <i data-lucide="book-open" class="w-5 h-5"></i> Subject Management
            </button>
            <button onclick="showSection('teachers')" id="nav-teachers" class="nav-btn nav-inactive">
                <i data-lucide="user-check" class="w-5 h-5"></i> Assign Teachers
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">

        <section id="sec-directory">
            <div class="mb-8">
                <h2 class="text-3xl font-black text-slate-800 tracking-tighter italic">Students Directory</h2>
                <div class="relative mt-4">
                    <i data-lucide="search" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                    <input type="text" oninput="filterDirectory(this.value)" placeholder="Search 170+ students..." class="w-full pl-12 pr-6 py-3.5 bg-white rounded-2xl shadow-sm border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 outline-none font-medium">
                </div>
            </div>
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                        <tr><th class="p-4">Full Name</th><th class="p-4">Class</th><th class="p-4">Action</th></tr>
                    </thead>
                    <tbody id="directoryList" class="divide-y text-sm font-semibold"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-records" class="section-hidden">
            <div class="mb-8"><h2 class="text-3xl font-black text-slate-800 italic">Record Entry</h2></div>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 bg-white rounded-3xl p-6 shadow-sm border">
                    <input type="text" oninput="filterRecords(this.value)" placeholder="Find student..." class="w-full p-3 bg-slate-50 rounded-xl mb-4 text-sm">
                    <div id="recordSearchList" class="space-y-2 max-h-[500px] overflow-y-auto"></div>
                </div>
                <div id="scoreEditor" class="lg:col-span-8 hidden bg-white rounded-3xl shadow-2xl border overflow-hidden">
                    <div class="p-6 bg-blue-900 text-white flex justify-between">
                        <h3 id="edit-name" class="font-black italic uppercase">Select Student</h3>
                        <div id="save-status" class="hidden text-xs bg-green-500 px-3 py-1 rounded-full">SAVING...</div>
                    </div>
                    <div class="p-6">
                        <table class="w-full mb-4 text-sm"><tbody id="scoreRows"></tbody></table>
                        <div class="flex gap-2">
                            <button onclick="addRow()" class="bg-slate-100 p-3 rounded-xl font-bold text-xs">Add Row</button>
                            <button onclick="saveScores()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-black text-sm">UPDATE REPORT</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-subjects" class="section-hidden">
            <div class="mb-8"><h2 class="text-3xl font-black text-slate-800 italic">Subject Management</h2></div>
            <div class="bg-white rounded-3xl p-8 border">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="sub-class" placeholder="Class" class="w-1/4 p-3 bg-slate-50 rounded-xl">
                    <input type="text" id="sub-name" placeholder="Subject Name" class="flex-1 p-3 bg-slate-50 rounded-xl">
                    <button onclick="addSubject()" class="bg-blue-600 text-white px-6 rounded-xl font-black">ADD</button>
                </div>
                <div id="curriculumDisplay" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
            </div>
        </section>

        <section id="sec-teachers" class="section-hidden">
            <div class="mb-8"><h2 class="text-3xl font-black text-slate-800 italic">Assign Teachers</h2></div>
            <div class="bg-white rounded-3xl border overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-[10px] font-black uppercase">
                        <tr><th class="p-4">Class</th><th class="p-4">Subject</th><th class="p-4">Teacher Name</th><th class="p-4">Action</th></tr>
                    </thead>
                    <tbody id="teacherTable" class="divide-y font-bold"></tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        // AUTHENTICATED WITH YOUR CREDENTIALS
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA2NTgyNzgsImV4cCI6MjA1NjIzNDI3OH0.S8X3WpQ6S8pQ6S8pQ6S8pQ6S8pQ6S8pQ6S8pQ6S8pQ6');
        
        let students = [], curData = [], activeStudent = null;

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('section-hidden'));
            document.getElementById('sec-' + id).classList.remove('section-hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('nav-active', 'nav-inactive'));
            document.getElementById('nav-' + id).classList.replace('nav-inactive', 'nav-active');
            if(id === 'directory' || id === 'records') fetchStudents();
            if(id === 'subjects' || id === 'teachers') fetchCurriculum();
        }

        async function fetchStudents() {
            const { data } = await _supabase.from('students').select('*').order('full_name');
            if(data) { students = data; renderDirectory(data); renderRecordSearch(data); }
            lucide.createIcons();
        }

        async function fetchCurriculum() {
            const { data } = await _supabase.from('school_curriculum').select('*').order('class_name');
            if(data) { curData = data; renderCurriculum(); renderTeacherAssignments(); }
            lucide.createIcons();
        }

        function filterDirectory(v) { renderDirectory(students.filter(s => s.full_name.toLowerCase().includes(v.toLowerCase()))); }
        function filterRecords(v) { renderRecordSearch(students.filter(s => s.full_name.toLowerCase().includes(v.toLowerCase()))); }

        function renderDirectory(list) {
            document.getElementById('directoryList').innerHTML = list.map(s => `<tr><td class="p-4 font-bold">${s.full_name}</td><td class="p-4 text-blue-600">${s.grade_level}</td><td class="p-4"><button onclick="showSection('records'); openEditor('${s.id}')" class="text-xs text-blue-600 font-black">EDIT</button></td></tr>`).join('');
        }

        function renderRecordSearch(list) {
            document.getElementById('recordSearchList').innerHTML = list.map(s => `<div onclick="openEditor('${s.id}')" class="p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-blue-600 hover:text-white transition text-xs font-black uppercase">${s.full_name}</div>`).join('');
        }

        async function openEditor(id) {
            activeStudent = students.find(s => s.id === id);
            document.getElementById('scoreEditor').classList.remove('hidden');
            document.getElementById('edit-name').innerText = activeStudent.full_name;
            const tbody = document.getElementById('scoreRows');
            tbody.innerHTML = "";
            (activeStudent.subjects || []).forEach(s => addRow(s.name, s.test, s.exam));
            if(!(activeStudent.subjects?.length)) addRow();
            lucide.createIcons();
        }

        function addRow(n='', t=0, e=0) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="p-1"><input type="text" value="${n}" class="sub-name w-full p-2 bg-slate-50 rounded font-bold text-[10px] uppercase border-none"></td><td class="p-1"><input type="number" value="${t}" class="sub-test w-full p-2 bg-slate-50 rounded text-center border-none"></td><td class="p-1"><input type="number" value="${e}" class="sub-exam w-full p-2 bg-slate-50 rounded text-center border-none"></td><td class="p-1"><button onclick="this.parentElement.parentElement.remove()" class="text-red-400"><i data-lucide="x" class="w-4 h-4"></i></button></td>`;
            document.getElementById('scoreRows').appendChild(tr);
            lucide.createIcons();
        }

        async function saveScores() {
            const status = document.getElementById('save-status');
            status.classList.remove('hidden');
            const { data: cur } = await _supabase.from('school_curriculum').select('*').eq('class_name', activeStudent.grade_level);
            const subList = [];
            document.querySelectorAll('.sub-name').forEach((el, i) => {
                const name = el.value.toUpperCase();
                const match = cur?.find(c => c.subject_name.toUpperCase() === name);
                if(name) subList.push({ name, test: Number(document.querySelectorAll('.sub-test')[i].value), exam: Number(document.querySelectorAll('.sub-exam')[i].value), teacher: match ? match.assigned_teacher : "Not Assigned" });
            });
            await _supabase.from('students').update({ subjects: subList }).eq('id', activeStudent.id);
            status.classList.add('hidden');
            fetchStudents();
        }

        async function addSubject() {
            const c = document.getElementById('sub-class').value.toUpperCase();
            const s = document.getElementById('sub-name').value.toUpperCase();
            await _supabase.from('school_curriculum').insert([{ class_name: c, subject_name: s, assigned_teacher: 'Not Set' }]);
            fetchCurriculum();
        }

        function renderCurriculum() {
            document.getElementById('curriculumDisplay').innerHTML = curData.map(c => `<div class="p-3 bg-slate-50 rounded-xl border text-[10px] font-black uppercase"><div>${c.class_name}</div><div class="text-blue-600">${c.subject_name}</div></div>`).join('');
        }

        function renderTeacherAssignments() {
            document.getElementById('teacherTable').innerHTML = curData.map(c => `<tr><td class="p-4 text-blue-600">${c.class_name}</td><td class="p-4 uppercase">${c.subject_name}</td><td class="p-4"><input type="text" id="t-${c.id}" value="${c.assigned_teacher}" class="p-2 bg-slate-50 rounded w-full border-none"></td><td class="p-4"><button onclick="updateTeacher(${c.id})" class="text-blue-600 text-xs font-black">SAVE</button></td></tr>`).join('');
        }

        async function updateTeacher(id) {
            await _supabase.from('school_curriculum').update({ assigned_teacher: document.getElementById('t-'+id).value }).eq('id', id);
            fetchCurriculum();
        }

        window.onload = () => { fetchStudents(); lucide.createIcons(); };
    </script>
</body>
</html>
