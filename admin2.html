<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; cursor: pointer; border: none; text-align: left; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex text-slate-900">

    <aside class="sidebar text-white p-6 fixed h-screen flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <span class="font-black text-lg tracking-tighter uppercase text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> Students List</button>
            <button onclick="showView('curriculum')" id="btn-curriculum" class="nav-link"><i data-lucide="book-open"></i> Class Subjects</button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="award"></i> Score Entry Room</button>
            <button onclick="showView('broadsheet')" id="btn-broadsheet" class="nav-link"><i data-lucide="layout-grid"></i> Broadsheet</button>
            <button onclick="showView('diary')" id="btn-diary" class="nav-link"><i data-lucide="book"></i> Academic Diary</button>
        </nav>
        <button onclick="handleLogout()" class="nav-link text-red-400 hover:bg-red-400/10 mt-auto"><i data-lucide="log-out"></i> Logout</button>
    </aside>

    <main class="flex-1 ml-[260px] p-8">
        
        <section id="view-directory" class="view-section active">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-black uppercase text-slate-900">Directory</h1>
                    <p class="text-slate-400 text-xs font-bold uppercase">Student Management</p>
                </div>
                <input type="text" oninput="filterDirectory(this.value)" placeholder="Search Name..." class="px-4 py-2 rounded-xl border-none shadow-sm ring-1 ring-slate-200 text-sm font-bold w-64 uppercase">
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] uppercase font-black text-slate-400">
                        <tr><th class="p-4">Full Name</th><th class="p-4">Class</th><th class="p-4">Group</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="directoryTable" class="divide-y divide-slate-50 uppercase text-[11px] font-bold"></tbody>
                </table>
            </div>
        </section>

        <section id="view-engine" class="view-section">
            <div class="flex flex-wrap gap-4 mb-6 bg-white p-4 rounded-2xl shadow-sm border">
                <div class="flex-1 min-w-[200px]">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Select Term</label>
                    <select id="engineTermFilter" onchange="setTerm(this.value)" class="w-full p-3 rounded-xl bg-blue-50 border-none ring-1 ring-blue-200 font-bold text-sm text-blue-700">
                        <option value="term1">1st Term</option>
                        <option value="term2">2nd Term</option>
                        <option value="term3">3rd Term</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 bg-white rounded-2xl border h-[700px] flex flex-col overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b">
                        <input type="text" oninput="filterEngine(this.value)" placeholder="Search Student..." class="w-full p-3 rounded-lg border-none ring-1 ring-slate-200 text-xs font-black uppercase">
                    </div>
                    <div id="engineList" class="overflow-y-auto divide-y"></div>
                </div>
                
                <div id="editorPanel" class="lg:col-span-8 bg-white rounded-2xl border shadow-xl hidden flex flex-col overflow-hidden">
                    <div class="p-6 bg-blue-900 text-white flex justify-between items-center">
                        <div>
                            <h2 id="editName" class="text-xl font-black uppercase">---</h2>
                            <span id="activeTermTag" class="bg-amber-500 px-2 py-0.5 rounded text-[9px] font-black uppercase">TERM 1</span>
                        </div>
                        <button onclick="saveScores()" class="bg-green-500 px-6 py-2 rounded-lg font-black text-[9px] uppercase">Save Scores</button>
                    </div>

                    <div class="p-6 flex-1 overflow-y-auto">
                        <table class="w-full">
                            <thead class="text-[10px] text-slate-400 font-black uppercase border-b">
                                <tr><th class="text-left py-3">Subject</th><th class="text-center w-24">Test (30)</th><th class="text-center w-24">Exam (70)</th></tr>
                            </thead>
                            <tbody id="scoreRows"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-broadsheet" class="view-section">
            <h1 class="text-3xl font-black uppercase">Broadsheet</h1>
            <div id="broadsheetContent" class="mt-4 bg-white p-6 rounded-xl border italic text-slate-400 text-sm">Select a class to view averages...</div>
        </section>

        <section id="view-curriculum" class="view-section">
            <h1 class="text-3xl font-black uppercase">Curriculum</h1>
            <div id="curriculumContent" class="mt-4">
                <p class="text-slate-500 font-bold uppercase text-xs">Loading curriculum details...</p>
            </div>
        </section>

        <section id="view-diary" class="view-section">
            <h1 class="text-3xl font-black uppercase">Academic Diary</h1>
            <div class="mt-4 p-8 border-2 border-dashed border-slate-200 rounded-2xl text-center text-slate-400 font-bold uppercase text-xs">Attendance & Diary features coming soon</div>
        </section>
    </main>

    <script>
        // Your Supabase credentials from your file
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        
        let students = [], curriculum = [], activeId = null, currentTerm = "term1";

        async function loadData() {
            try {
                const { data: st, error: stErr } = await _supabase.from('students').select('*').order('full_name');
                const { data: cu, error: cuErr } = await _supabase.from('school_curriculum').select('*').order('class_name');
                
                if (stErr || cuErr) throw new Error("Database error");

                students = st || [];
                curriculum = cu || [];
                renderDirectory();
                renderEngineList(students);
                lucide.createIcons();
            } catch (e) {
                console.error(e);
                alert("Failed to load data. Check your Supabase connection.");
            }
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            const targetSection = document.getElementById(`view-${v}`);
            const targetBtn = document.getElementById(`btn-${v}`);
            
            if (targetSection) targetSection.classList.add('active');
            if (targetBtn) targetBtn.classList.add('active');
            
            lucide.createIcons();
        }

        function setTerm(t) {
            currentTerm = t;
            document.getElementById('activeTermTag').innerText = t.toUpperCase();
            if(activeId) openEditor(activeId);
        }

        function renderDirectory() {
            document.getElementById('directoryTable').innerHTML = students.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4">${s.full_name}</td>
                    <td class="p-4">${s.grade_level || '---'}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded bg-slate-100 text-[9px] font-black">${s.student_group || 'GENERAL'}</span></td>
                    <td class="p-4 text-right">
                        <button onclick="openEditor('${s.id}'); showView('engine')" class="p-2 bg-blue-50 rounded-lg text-blue-600 font-bold text-[10px]">EDIT SCORES</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderEngineList(list) {
            document.getElementById('engineList').innerHTML = list.map(s => `
                <div onclick="openEditor('${s.id}')" class="p-4 hover:bg-blue-50 cursor-pointer flex justify-between items-center group">
                    <div class="uppercase">
                        <p class="text-[11px] font-black text-slate-800">${s.full_name}</p>
                        <p class="text-[9px] font-bold text-slate-400">${s.grade_level || 'No Class'}</p>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-200"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('editName').innerText = s.full_name;

            // Use the specific term column (term1, term2, or term3)
            const termScores = s[currentTerm] || [];
            const classSubs = curriculum.filter(c => c.class_name === s.grade_level);

            document.getElementById('scoreRows').innerHTML = classSubs.map(cs => {
                const score = termScores.find(e => e.name === cs.subject_name) || { test: 0, exam: 0 };
                return `
                    <tr class="bg-slate-50 border-b border-white">
                        <td class="p-3">
                            <span class="font-black text-[11px] uppercase block sub-name">${cs.subject_name}</span>
                        </td>
                        <td class="p-3"><input type="number" value="${score.test}" class="st w-full p-2 rounded bg-white text-center font-black text-xs outline-none"></td>
                        <td class="p-3"><input type="number" value="${score.exam}" class="se w-full p-2 rounded bg-white text-center font-black text-xs outline-none"></td>
                    </tr>
                `;
            }).join('');
        }

        async function saveScores() {
            const termScores = [];
            document.querySelectorAll('#scoreRows tr').forEach(row => {
                const name = row.querySelector('.sub-name').innerText;
                const test = parseFloat(row.querySelector('.st').value) || 0;
                const exam = parseFloat(row.querySelector('.se').value) || 0;
                termScores.push({ name, test, exam });
            });

            const updateData = {};
            updateData[currentTerm] = termScores;

            const { error } = await _supabase.from('students').update(updateData).eq('id', activeId);
            
            if(!error) {
                alert("Scores saved to " + currentTerm);
                loadData();
            } else {
                alert("Error saving: " + error.message);
            }
        }

        function handleLogout() {
            _supabase.auth.signOut().then(() => window.location.reload());
        }

        window.onload = loadData;
    </script>
</body>
</html>
