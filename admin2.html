<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.3s; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; transition: all 0.3s; position: fixed; height: 100vh; }
        .sidebar.collapsed { width: 80px; }
        .sidebar.collapsed span, .sidebar.collapsed .logo-text { display: none; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .main-content { margin-left: 260px; transition: all 0.3s; }
        .main-content.expanded { margin-left: 80px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        .subject-card { border-left: 4px solid #e2e8f0; transition: 0.2s; }
        .subject-card:focus-within { border-left-color: #2563eb; background: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <aside id="sidebar" class="sidebar text-white p-4 flex flex-col">
        <div class="flex items-center gap-3 px-2 mb-10">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="w-10 h-10 rounded-lg">
            <div class="logo-text">
                <h1 class="font-black text-sm tracking-tighter">MUSTARD SEED</h1>
                <p class="text-[10px] text-blue-400 font-bold uppercase">Master Admin</p>
            </div>
        </div>

        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" class="nav-link active" id="link-directory">
                <i data-lucide="users"></i> <span>Student Directory</span>
            </button>
            <button onclick="showView('engine')" class="nav-link" id="link-engine">
                <i data-lucide="cpu"></i> <span>Result Engine</span>
            </button>
            <button onclick="showView('curriculum')" class="nav-link" id="link-curriculum">
                <i data-lucide="book-open"></i> <span>Curriculum</span>
            </button>
        </nav>

        <button onclick="handleLogout()" class="nav-link text-red-400 hover:bg-red-500/10 mt-auto">
            <i data-lucide="log-out"></i> <span>Sign Out</span>
        </button>
    </aside>

    <main id="main-content" class="main-content p-8">
        
        <section id="view-directory" class="view-section active">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-3xl font-black tracking-tight">STUDENT DIRECTORY</h2>
                    <p class="text-slate-500 font-medium">Manage and monitor all registered students</p>
                </div>
            </div>
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 font-black text-slate-400 uppercase text-[10px]">Student Name</th>
                            <th class="p-4 font-black text-slate-400 uppercase text-[10px]">Class</th>
                            <th class="p-4 font-black text-slate-400 uppercase text-[10px]">Status</th>
                            <th class="p-4"></th>
                        </tr>
                    </thead>
                    <tbody id="directoryTable"></tbody>
                </table>
            </div>
        </section>

        <section id="view-engine" class="view-section">
            <div class="grid grid-cols-12 gap-8 h-[calc(100vh-100px)]">
                <div class="col-span-4 flex flex-col gap-4">
                    <input type="text" oninput="filterEngine(this.value)" placeholder="Search name..." class="w-full p-4 rounded-2xl bg-white border border-slate-200 font-bold outline-none focus:ring-2 ring-blue-500">
                    <div id="engineList" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
                </div>
                <div id="editorPlaceholder" class="col-span-8 flex flex-col items-center justify-center bg-white rounded-3xl border-2 border-dashed border-slate-200 text-slate-400">
                    <i data-lucide="mouse-pointer-2" class="w-12 h-12 mb-4 opacity-20"></i>
                    <p class="font-black uppercase tracking-widest text-xs">Select a student to enter marks</p>
                </div>
                <div id="scoreEditor" class="col-span-8 bg-white rounded-3xl shadow-xl border border-slate-200 hidden flex flex-col overflow-hidden">
                    <div id="editorHeader" class="p-6 bg-slate-900 text-white flex justify-between items-center"></div>
                    <div id="subjectList" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50"></div>
                    <div class="p-6 border-t border-slate-200 bg-white flex justify-between items-center">
                        <div class="text-[10px] font-black uppercase text-slate-400">Auto-saving enabled</div>
                        <button onclick="saveScores()" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-black uppercase text-xs shadow-lg shadow-blue-500/30">Save All Records</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-curriculum" class="view-section">
             <div class="mb-8">
                <h2 class="text-3xl font-black tracking-tight uppercase">School Curriculum</h2>
                <p class="text-slate-500 font-medium">Define subjects for different classes and groups</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <select id="currClass" class="p-3 bg-slate-50 rounded-xl font-bold outline-none"><option>JSS 1</option><option>JSS 2</option><option>JSS 3</option><option>SSS 1</option><option>SSS 2</option><option>SSS 3</option></select>
                <select id="currGroup" class="p-3 bg-slate-50 rounded-xl font-bold outline-none"><option>GENERAL</option><option>SCIENCE</option><option>ART</option></select>
                <input type="text" id="currSub" placeholder="Subject Name" class="p-3 bg-slate-50 rounded-xl font-bold outline-none uppercase">
                <button onclick="addCurriculum()" class="bg-blue-600 text-white rounded-xl font-black uppercase text-xs">Add Subject</button>
            </div>
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr><th class="p-4 font-black uppercase text-[10px]">Class</th><th class="p-4 font-black uppercase text-[10px]">Group</th><th class="p-4 font-black uppercase text-[10px]">Subject</th><th class="p-4"></th></tr>
                    </thead>
                    <tbody id="curriculumTable"></tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        
        let students = [], curriculum = [], activeId = null;

        // --- THE NECESSARY LOGIN GATE ---
        async function checkAdmin() {
            const { data: { user } } = await _supabase.auth.getUser();
            
            // Redirect if not logged in
            if (!user) {
                window.location.replace('login.html');
                return;
            }
            
            // If logged in, initialize the dashboard
            init();
        }

        async function init() {
            const { data: st } = await _supabase.from('students').select('*').order('full_name');
            const { data: cu } = await _supabase.from('school_curriculum').select('*');
            students = st || [];
            curriculum = cu || [];
            
            renderDirectory();
            renderEngineList(students);
            renderCurriculum();
            lucide.createIcons();
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.getElementById(`link-${v}`).classList.add('active');
        }

        function renderDirectory() {
            document.getElementById('directoryTable').innerHTML = students.map(s => `
                <tr class="border-b border-slate-50 hover:bg-slate-50/50">
                    <td class="p-4 font-black uppercase text-xs">${s.full_name}</td>
                    <td class="p-4 font-bold text-blue-600 text-[10px] uppercase">${s.grade_level || '---'}</td>
                    <td class="p-4"><span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-[9px] font-black uppercase">${s.status || 'Active'}</span></td>
                    <td class="p-4 text-right">
                        <button onclick="deleteStudent('${s.id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function renderEngineList(list) {
            document.getElementById('engineList').innerHTML = list.map(s => `
                <button onclick="openEditor('${s.id}')" class="w-full text-left p-4 rounded-2xl border ${activeId === s.id ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-slate-100 hover:border-blue-200'} transition-all">
                    <div class="font-black uppercase text-[11px] truncate">${s.full_name}</div>
                    <div class="text-[9px] font-bold opacity-60 uppercase">${s.grade_level} • ${s.dept || 'GENERAL'}</div>
                </button>
            `).join('');
        }

        async function openEditor(id) {
            activeId = id;
            const student = students.find(s => s.id === id);
            renderEngineList(students);
            
            document.getElementById('editorPlaceholder').classList.add('hidden');
            document.getElementById('scoreEditor').classList.remove('hidden');
            
            document.getElementById('editorHeader').innerHTML = `
                <div>
                    <h3 class="font-black text-lg uppercase tracking-tight">${student.full_name}</h3>
                    <p class="text-[10px] font-bold text-blue-300 uppercase">${student.grade_level} — ${student.dept || 'GENERAL'}</p>
                </div>
                <div class="flex gap-4">
                    <div class="text-right">
                        <p class="text-[8px] uppercase font-black text-slate-400">Attendance</p>
                        <input type="number" id="att-present" value="${student.times_present || 0}" class="bg-transparent border-b border-white/20 w-12 text-center font-black outline-none">
                    </div>
                </div>
            `;

            const studentGroup = student.dept || 'GENERAL';
            const relevantSubs = curriculum.filter(c => c.class_name === student.grade_level && (c.subject_group === 'GENERAL' || c.subject_group === studentGroup));

            const scores = student.scores || {};
            document.getElementById('subjectList').innerHTML = relevantSubs.map(sub => `
                <div class="subject-card bg-white p-4 rounded-xl flex items-center justify-between shadow-sm">
                    <span class="font-black text-xs uppercase text-slate-600">${sub.subject_name}</span>
                    <div class="flex gap-2">
                        <div class="text-center">
                            <label class="block text-[8px] font-black text-slate-400 uppercase">Test</label>
                            <input type="number" data-sub="${sub.subject_name}" data-type="test" value="${scores[sub.subject_name]?.test || ''}" class="score-input w-12 p-2 bg-slate-50 rounded-lg text-center font-black outline-none focus:ring-1 ring-blue-500">
                        </div>
                        <div class="text-center">
                            <label class="block text-[8px] font-black text-slate-400 uppercase">Exam</label>
                            <input type="number" data-sub="${sub.subject_name}" data-type="exam" value="${scores[sub.subject_name]?.exam || ''}" class="score-input w-12 p-2 bg-slate-50 rounded-lg text-center font-black outline-none focus:ring-1 ring-blue-500">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function saveScores() {
            if (!activeId) return;
            const student = students.find(s => s.id === activeId);
            const scoreData = {};
            
            document.querySelectorAll('.score-input').forEach(input => {
                const sub = input.dataset.sub;
                const type = input.dataset.type;
                if (!scoreData[sub]) scoreData[sub] = {};
                scoreData[sub][type] = input.value;
            });

            const attendance = document.getElementById('att-present').value;

            const { error } = await _supabase.from('students').update({ 
                scores: scoreData, 
                times_present: attendance 
            }).eq('id', activeId);

            if (!error) {
                alert("RESULTS SAVED SUCCESSFULLY");
                init();
            }
        }

        async function addCurriculum() {
            const class_name = document.getElementById('currClass').value;
            const subject_group = document.getElementById('currGroup').value;
            const subject_name = document.getElementById('currSub').value.toUpperCase();
            if (!subject_name) return;
            await _supabase.from('school_curriculum').insert([{ class_name, subject_group, subject_name }]);
            init();
        }

        function renderCurriculum() {
            document.getElementById('curriculumTable').innerHTML = curriculum.map(c => `
                <tr class="border-b border-slate-50">
                    <td class="p-4 font-black text-xs uppercase">${c.class_name}</td>
                    <td class="p-4 font-bold text-blue-600 text-[10px] uppercase">${c.subject_group}</td>
                    <td class="p-4 font-bold text-slate-600 text-xs uppercase">${c.subject_name}</td>
                    <td class="p-4 text-right">
                        <button onclick="deleteCurr('${c.id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="x-circle" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        async function deleteCurr(id) { await _supabase.from('school_curriculum').delete().eq('id', id); init(); }
        
        async function deleteStudent(id) { 
            if(confirm("Confirm deletion?")) { 
                await _supabase.from('students').delete().eq('id', id); 
                init(); 
            } 
        }

        function handleLogout() { 
            _supabase.auth.signOut().then(() => window.location.replace('login.html')); 
        }

        // ENTRY POINT: ALWAYS CHECK ADMIN FIRST
        window.onload = checkAdmin;
    </script>
</body>
</html>
