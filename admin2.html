<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex text-slate-900">

    <aside class="sidebar text-white p-6 fixed h-screen flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
            <span class="font-black text-lg tracking-tighter uppercase text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> Students List</button>
            <button onclick="showView('curriculum')" id="btn-curriculum" class="nav-link"><i data-lucide="book-open"></i> Class Subjects</button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="award"></i> Score Entry</button>
            <button onclick="showView('published')" id="btn-published" class="nav-link"><i data-lucide="check-circle"></i> Published</button>
        </nav>
        <button onclick="handleLogout()" class="nav-link text-red-400 hover:bg-red-400/10 mt-auto"><i data-lucide="log-out"></i> Logout</button>
    </aside>

    <main class="flex-1 ml-[260px] p-8">
        
        <section id="view-directory" class="view-section active">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-black uppercase text-slate-900">Directory</h1>
                    <p id="dirCount" class="text-blue-600 text-xs font-black uppercase">Count: 0</p>
                </div>
                <div class="flex gap-3">
                    <select id="dirClassFilter" onchange="renderDirectory()" class="px-4 py-2 rounded-xl border-none shadow-sm ring-1 ring-slate-200 text-xs font-bold uppercase outline-none">
                        <option value="ALL">All Classes</option>
                        <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                        <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                    </select>
                    <input type="text" id="dirSearchInput" oninput="renderDirectory()" placeholder="Search Name..." class="px-4 py-2 rounded-xl border-none shadow-sm ring-1 ring-slate-200 text-sm font-bold w-64 uppercase">
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] uppercase font-black text-slate-400">
                        <tr><th class="p-4">Reg ID</th><th class="p-4">Full Name</th><th class="p-4">Class</th><th class="p-4">Group</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="directoryTable" class="divide-y divide-slate-50 uppercase text-[11px] font-bold"></tbody>
                </table>
            </div>
        </section>

        <section id="view-engine" class="view-section">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 bg-white rounded-2xl border h-[750px] flex flex-col overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b space-y-2">
                        <p id="engineCount" class="text-[9px] font-black text-blue-600 uppercase">Filtered: 0</p>
                        <select id="engineClassFilter" onchange="renderEngineList()" class="w-full p-2 rounded bg-white ring-1 ring-slate-200 border-none text-[10px] font-black uppercase outline-none">
                            <option value="ALL">All Classes</option>
                            <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                            <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                        </select>
                        <input type="text" id="engineSearchInput" oninput="renderEngineList()" placeholder="Search Student..." class="w-full p-3 rounded-lg border-none ring-1 ring-slate-200 text-xs font-black uppercase outline-none">
                    </div>
                    <div id="engineList" class="overflow-y-auto divide-y"></div>
                </div>
                
                <div id="editorPanel" class="lg:col-span-8 bg-white rounded-2xl border shadow-xl hidden flex flex-col overflow-hidden">
                    <div class="p-6 bg-blue-900 text-white flex justify-between items-center">
                        <div>
                            <h2 id="editName" class="text-xl font-black uppercase">---</h2>
                            <span id="editClass" class="text-blue-300 text-[10px] font-black uppercase">---</span>
                        </div>
                        <button onclick="saveScores()" class="bg-green-500 px-6 py-2 rounded-lg font-black text-[9px] uppercase shadow-md">Publish Result</button>
                    </div>

                    <div class="p-6 flex-1 overflow-y-auto">
                        <div class="grid grid-cols-2 gap-4 mb-6 p-4 bg-slate-50 rounded-xl border">
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase">Total School Opened (Global)</label>
                                <input type="number" id="timesOpened" class="w-full mt-1 p-2 rounded bg-white ring-1 ring-slate-200 border-none font-black text-sm">
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase">Times Attended (Individual)</label>
                                <input type="number" id="timesPresent" class="w-full mt-1 p-2 rounded bg-white ring-1 ring-slate-200 border-none font-black text-sm">
                            </div>
                        </div>

                        <table class="w-full">
                            <thead class="text-[10px] text-slate-400 font-black uppercase border-b">
                                <tr><th class="text-left py-3">Subject & Teacher</th><th class="text-center w-24">Test</th><th class="text-center w-24">Exam</th></tr>
                            </thead>
                            <tbody id="scoreRows"></tbody>
                        </table>
                        <div class="mt-8 pt-6 border-t">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Teacher's Remark</label>
                            <textarea id="remark" class="w-full p-4 mt-2 bg-slate-50 rounded-xl border-none ring-1 ring-slate-100 italic outline-none text-sm"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-published" class="view-section">
            <div class="mb-8">
                <h1 class="text-3xl font-black uppercase text-slate-900">Published Results</h1>
                <p class="text-slate-400 text-xs font-bold uppercase">View students with ready reports</p>
            </div>
            <div id="publishedGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="view-curriculum" class="view-section">
            </section>

    </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        let students = [], curriculum = [], activeId = null;

        async function init() { loadData(); }

        async function loadData() {
            const { data: st } = await _supabase.from('students').select('*').order('full_name');
            const { data: cu } = await _supabase.from('school_curriculum').select('*').order('class_name');
            students = st || []; curriculum = cu || [];
            renderDirectory();
            renderEngineList();
            renderPublished();
            lucide.createIcons();
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.getElementById(`btn-${v}`).classList.add('active');
            lucide.createIcons();
        }

        // --- DIRECTORY LOGIC ---
        function renderDirectory() {
            const classFilter = document.getElementById('dirClassFilter').value;
            const search = document.getElementById('dirSearchInput').value.toLowerCase();
            
            const filtered = students.filter(s => {
                const matchesClass = (classFilter === 'ALL' || s.grade_level === classFilter);
                const matchesSearch = s.full_name.toLowerCase().includes(search);
                return matchesClass && matchesSearch;
            });

            document.getElementById('dirCount').innerText = `Total Students: ${filtered.length}`;
            document.getElementById('directoryTable').innerHTML = filtered.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 text-blue-600 font-black">MS-${s.id.substring(0,5).toUpperCase()}</td>
                    <td class="p-4">${s.full_name}</td>
                    <td class="p-4">${s.grade_level}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded bg-slate-100 text-[9px] font-black">${s.student_group || 'GENERAL'}</span></td>
                    <td class="p-4 text-right"><button onclick="deleteStudent('${s.id}')" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        // --- ENGINE ROOM LOGIC ---
        function renderEngineList() {
            const classFilter = document.getElementById('engineClassFilter').value;
            const search = document.getElementById('engineSearchInput').value.toLowerCase();

            const filtered = students.filter(s => {
                const matchesClass = (classFilter === 'ALL' || s.grade_level === classFilter);
                const matchesSearch = s.full_name.toLowerCase().includes(search);
                return matchesClass && matchesSearch && s.status !== 'Suspended';
            });

            document.getElementById('engineCount').innerText = `Filtered: ${filtered.length}`;
            document.getElementById('engineList').innerHTML = filtered.map(s => `
                <div onclick="openEditor('${s.id}')" class="p-4 hover:bg-blue-50 cursor-pointer flex justify-between items-center group">
                    <div class="uppercase">
                        <p class="text-[11px] font-black text-slate-800">${s.full_name}</p>
                        <p class="text-[9px] font-bold text-slate-400">${s.grade_level}</p>
                    </div>
                    ${s.result_status === 'Published' ? '<i data-lucide="check" class="text-green-500 w-4 h-4"></i>' : ''}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('editName').innerText = s.full_name;
            document.getElementById('editClass').innerText = s.grade_level;
            document.getElementById('timesOpened').value = s.times_opened || 0;
            document.getElementById('timesPresent').value = s.times_present || 0;
            document.getElementById('remark').value = s.teacher_remark || '';
            
            const savedSubs = s.subjects || [];
            const classCurriculum = curriculum.filter(c => c.class_name === s.grade_level && (c.subject_group === 'GENERAL' || c.subject_group === s.student_group));

            document.getElementById('scoreRows').innerHTML = classCurriculum.map(curr => {
                const saved = savedSubs.find(sub => sub.name === curr.subject_name) || { test: 0, exam: 0 };
                return `
                    <tr class="bg-slate-50 border-b border-white">
                        <td class="p-3">
                            <span class="font-black text-[11px] uppercase block">${curr.subject_name}</span>
                            <span class="text-[8px] text-slate-400 font-bold italic uppercase">${curr.assigned_teacher || 'Staff'}</span>
                        </td>
                        <td class="p-3"><input type="number" value="${saved.test}" class="st w-full p-2 rounded bg-white border-none font-black text-center text-xs" data-sub="${curr.subject_name}" data-teacher="${curr.assigned_teacher}"></td>
                        <td class="p-3"><input type="number" value="${saved.exam}" class="se w-full p-2 rounded bg-white border-none font-black text-center text-xs"></td>
                    </tr>
                `;
            }).join('');
        }

        async function saveScores() {
            const subs = [];
            const tests = document.querySelectorAll('.st');
            const exams = document.querySelectorAll('.se');
            const globalOpened = parseInt(document.getElementById('timesOpened').value) || 0;

            tests.forEach((t, i) => {
                subs.push({
                    name: t.getAttribute('data-sub'),
                    teacher: t.getAttribute('data-teacher'),
                    test: parseFloat(t.value) || 0,
                    exam: parseFloat(exams[i].value) || 0
                });
            });

            // Update Current Student
            await _supabase.from('students').update({
                subjects: subs,
                teacher_remark: document.getElementById('remark').value,
                times_opened: globalOpened,
                times_present: parseInt(document.getElementById('timesPresent').value) || 0,
                result_status: 'Published'
            }).eq('id', activeId);

            // GLOBAL UPDATE: Update "Total School Opened" for EVERYONE
            await _supabase.from('students').update({ times_opened: globalOpened }).neq('id', 'null');

            alert("Record Published & Global Attendance Updated!");
            loadData();
        }

        function renderPublished() {
            const published = students.filter(s => s.result_status === 'Published');
            document.getElementById('publishedGrid').innerHTML = published.map(s => `
                <div class="bg-white p-6 rounded-2xl border shadow-sm flex flex-col gap-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-black text-sm uppercase">${s.full_name}</h3>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">${s.grade_level}</p>
                        </div>
                        <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-[9px] font-black uppercase tracking-tighter">Published</span>
                    </div>
                    <button class="w-full py-2 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase">View Card</button>
                </div>
            `).join('');
        }

        function handleLogout() { _supabase.auth.signOut().then(() => window.location.replace('login.html')); }
        window.onload = init;
    </script>
</body>
</html>
