<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Mustard Seed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.3s; }
        .sidebar { width: 260px; background: #0f172a; z-index: 50; transition: all 0.3s; position: fixed; height: 100vh; }
        .sidebar.collapsed { width: 80px; }
        .sidebar.collapsed span, .sidebar.collapsed .logo-text { display: none; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: 0.2s; font-weight: 700; font-size: 13px; width: 100%; white-space: nowrap; }
        .nav-link:hover, .nav-link.active { background: #2563eb; color: white; }
        .main-content { transition: margin-left 0.3s; margin-left: 260px; padding: 2rem; flex: 1; }
        .main-content.expanded { margin-left: 80px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex text-slate-900 uppercase">

    <aside id="sidebar" class="sidebar text-white p-6 flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-10 pb-6 border-b border-slate-800">
            <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10 min-w-[40px]">
            <span class="logo-text font-black text-lg text-blue-400">MSS ADMIN</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showView('directory')" id="btn-directory" class="nav-link active"><i data-lucide="users"></i> <span>Student Registry</span></button>
            <button onclick="showView('engine')" id="btn-engine" class="nav-link"><i data-lucide="clipboard-check"></i> <span>Score Entry</span></button>
            <button onclick="showView('curriculum')" id="btn-curriculum" class="nav-link"><i data-lucide="book-open"></i> <span>Curriculum</span></button>
        </nav>
        <button onclick="toggleSidebar()" class="nav-link text-slate-400 mb-2 border-t border-slate-800 pt-4"><i data-lucide="arrow-left-right"></i> <span>Shrink Menu</span></button>
        <button onclick="handleLogout()" class="nav-link text-red-400"><i data-lucide="log-out"></i> <span>Logout</span></button>
    </aside>

    <main id="mainContent" class="main-content">
        <section id="view-directory" class="view-section active">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-black text-slate-800">Student Registry</h1>
                    <p id="dirCount" class="text-blue-600 text-xs font-black">Total: 0 Students</p>
                </div>
                <div class="flex gap-3">
                    <select id="dirClassFilter" onchange="renderDirectory()" class="px-4 py-2 rounded-xl border-none shadow-sm ring-1 ring-slate-200 text-xs font-bold outline-none">
                        <option value="ALL">All Students</option>
                        <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                        <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                    </select>
                    <input type="text" id="dirSearchInput" oninput="renderDirectory()" placeholder="Search Name..." class="px-4 py-2 rounded-xl border-none shadow-sm ring-1 ring-slate-200 text-sm font-bold w-64 outline-none">
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] font-black text-slate-400">
                        <tr><th class="p-4">Reg ID</th><th class="p-4">Student Details</th><th class="p-4">Status</th><th class="p-4 text-right">Actions</th></tr>
                    </thead>
                    <tbody id="directoryTable" class="divide-y text-[11px] font-bold"></tbody>
                </table>
            </div>
        </section>

        <section id="view-engine" class="view-section">
             <div class="grid grid-cols-12 gap-6">
                <div class="col-span-4 bg-white rounded-2xl border h-[750px] flex flex-col overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b">
                         <h2 class="text-xs font-black mb-3">Select Student</h2>
                        <select id="engineClassFilter" onchange="renderEngineList()" class="w-full p-2 mb-2 rounded bg-white ring-1 ring-slate-200 border-none text-[10px] font-black">
                            <option value="ALL">All Classes</option>
                            <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                            <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
                        </select>
                        <input type="text" id="engineSearchInput" oninput="renderEngineList()" placeholder="Quick Find..." class="w-full p-3 rounded-lg ring-1 ring-slate-200 text-xs font-black outline-none">
                    </div>
                    <div id="engineList" class="overflow-y-auto divide-y"></div>
                </div>
                
                <div id="editorPanel" class="col-span-8 bg-white rounded-2xl border shadow-xl hidden flex flex-col overflow-hidden">
                    <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
                        <div>
                            <h2 id="editName" class="text-xl font-black">---</h2>
                            <span id="editMetaLabel" class="text-blue-400 text-[10px] font-black">---</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="saveScores('Draft')" class="bg-slate-700 px-4 py-2 rounded-lg font-black text-[10px]">Save Draft</button>
                            <button onclick="saveScores('Published')" class="bg-green-600 px-4 py-2 rounded-lg font-black text-[10px] shadow-lg">Publish</button>
                        </div>
                    </div>
                    <div class="p-6 flex-1 overflow-y-auto">
                        <table class="w-full">
                            <thead class="text-[10px] text-slate-400 font-black border-b uppercase">
                                <tr><th class="text-left py-3">Subject</th><th class="text-center w-24">Test (40)</th><th class="text-center w-24">Exam (60)</th></tr>
                            </thead>
                            <tbody id="scoreRows"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-curriculum" class="view-section">
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-4 bg-white p-6 rounded-2xl border h-fit shadow-sm">
                    <h2 class="font-black text-sm mb-4">Add New Subject</h2>
                    <div class="space-y-4">
                        <select id="currClass" class="w-full p-3 rounded-xl ring-1 ring-slate-200 text-xs font-bold"><option>JSS 1</option><option>JSS 2</option><option>JSS 3</option><option>SSS 1</option><option>SSS 2</option><option>SSS 3</option></select>
                        <select id="currGroup" class="w-full p-3 rounded-xl ring-1 ring-slate-200 text-xs font-bold"><option value="GENERAL">GENERAL</option><option value="ART">ART</option><option value="SCIENCE">SCIENCE</option></select>
                        <input type="text" id="currSub" placeholder="Subject Name (e.g. MATHS)" class="w-full p-3 rounded-xl ring-1 ring-slate-200 text-xs font-bold uppercase">
                        <input type="text" id="currTeacher" placeholder="Teacher Name" class="w-full p-3 rounded-xl ring-1 ring-slate-200 text-xs font-bold">
                        <button onclick="addCurriculum()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black text-xs hover:bg-blue-700">Save to System</button>
                    </div>
                </div>
                <div class="col-span-8 bg-white rounded-2xl border shadow-sm overflow-hidden">
                    <table class="w-full text-left text-[10px] font-bold">
                        <thead class="bg-slate-50 border-b"><tr><th class="p-4">Class</th><th class="p-4">Dept</th><th class="p-4">Subject</th><th class="p-4">Teacher</th><th class="p-4 text-right">Action</th></tr></thead>
                        <tbody id="curriculumTable" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="editModal" class="modal">
        <div class="bg-white p-8 rounded-2xl w-96 shadow-2xl">
            <h2 class="font-black text-lg mb-4">Update Student Profile</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black text-slate-400">Class</label>
                    <select id="modalClass" class="w-full p-2 rounded-lg ring-1 ring-slate-200 font-bold text-xs"><option>JSS 1</option><option>JSS 2</option><option>JSS 3</option><option>SSS 1</option><option>SSS 2</option><option>SSS 3</option></select>
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-400">Department / Group</label>
                    <select id="modalGroup" class="w-full p-2 rounded-lg ring-1 ring-slate-200 font-bold text-xs"><option value="GENERAL">GENERAL</option><option value="ART">ART</option><option value="SCIENCE">SCIENCE</option></select>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="closeModal()" class="flex-1 p-3 bg-slate-100 rounded-xl font-black text-xs">Cancel</button>
                    <button onclick="updateStudentProfile()" class="flex-1 p-3 bg-blue-600 text-white rounded-xl font-black text-xs">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use your existing Supabase Key and URL
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        
        let students = [], curriculum = [], activeId = null, editingStudentId = null;

        async function init() { 
            const { data: st } = await _supabase.from('students').select('*').order('full_name');
            const { data: cu } = await _supabase.from('school_curriculum').select('*');
            students = st || []; curriculum = cu || [];
            renderDirectory(); renderEngineList(); renderCurriculum();
            lucide.createIcons();
        }

        // --- NAVIGATION LOGIC ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('mainContent').classList.toggle('expanded');
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.getElementById(`btn-${v}`).classList.add('active');
            lucide.createIcons();
        }

        // --- STUDENT LIST (DIRECTORY) ---
        function renderDirectory() {
            const classFilter = document.getElementById('dirClassFilter').value;
            const search = document.getElementById('dirSearchInput').value.toLowerCase();
            
            // FIX: Ensure 'ALL' works for all students
            const filtered = students.filter(s => {
                const matchesClass = (classFilter === 'ALL' || s.grade_level === classFilter);
                const matchesSearch = s.full_name.toLowerCase().includes(search);
                return matchesClass && matchesSearch;
            });
            
            document.getElementById('dirCount').innerText = `Total: ${filtered.length} Students`;
            document.getElementById('directoryTable').innerHTML = filtered.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 text-blue-600">ID-${s.id.substring(0,4)}</td>
                    <td class="p-4">
                        <p class="text-slate-900">${s.full_name}</p>
                        <p class="text-blue-500 text-[9px]">${s.grade_level} | ${s.student_group || 'GENERAL'}</p>
                    </td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-[8px] ${s.status === 'Suspended' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">${s.status || 'Active'}</span></td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button onclick="openModal('${s.id}')" title="Edit Profile (Dept/Class)" class="p-2 bg-blue-50 text-blue-600 rounded-lg"><i data-lucide="edit-3" class="w-3 h-3"></i></button>
                        <button onclick="gotoScoreEntry('${s.id}')" title="Enter Scores" class="p-2 bg-green-50 text-green-600 rounded-lg"><i data-lucide="check-square" class="w-3 h-3"></i></button>
                        <button onclick="toggleSuspension('${s.id}', '${s.status}')" class="p-2 bg-amber-50 text-amber-600 rounded-lg"><i data-lucide="shield-alert" class="w-3 h-3"></i></button>
                    </td>
                </tr>`).join('');
            lucide.createIcons();
        }

        // --- SCORE ENGINE ---
        function renderEngineList() {
            const cf = document.getElementById('engineClassFilter').value;
            const search = document.getElementById('engineSearchInput').value.toLowerCase();
            
            const filtered = students.filter(s => (cf === 'ALL' || s.grade_level === cf) && s.full_name.toLowerCase().includes(search));
            
            document.getElementById('engineList').innerHTML = filtered.map(s => `
                <div onclick="openEditor('${s.id}')" class="p-4 hover:bg-blue-50 cursor-pointer font-black text-[11px] border-l-4 border-transparent hover:border-blue-600">
                    ${s.full_name} <span class="text-slate-400 block text-[9px]">${s.grade_level} - ${s.student_group || 'GEN'}</span>
                </div>`).join('');
        }

        function gotoScoreEntry(id) { showView('engine'); openEditor(id); }

        function openEditor(id) {
            activeId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('editName').innerText = s.full_name;
            document.getElementById('editMetaLabel').innerText = `${s.grade_level} — ${s.student_group || 'GENERAL'}`;
            
            const saved = s.subjects || [];
            const match = curriculum.filter(c => c.class_name === s.grade_level && (c.subject_group === 'GENERAL' || c.subject_group === s.student_group));
            
            document.getElementById('scoreRows').innerHTML = match.map(c => {
                const sv = saved.find(e => e.name === c.subject_name) || { test: 0, exam: 0 };
                return `<tr class="border-b border-slate-50">
                    <td class="py-3"><p class="font-black text-[11px]">${c.subject_name}</p><p class="text-[9px] text-slate-400 italic">${c.assigned_teacher || 'No Teacher'}</p></td>
                    <td><input type="number" value="${sv.test}" class="st w-16 p-2 rounded bg-slate-50 text-center text-xs ring-1 ring-slate-200" data-sub="${c.subject_name}" data-teacher="${c.assigned_teacher}"></td>
                    <td><input type="number" value="${sv.exam}" class="se w-16 p-2 rounded bg-slate-50 text-center text-xs ring-1 ring-slate-200"></td>
                </tr>`;
            }).join('');
        }

        async function saveScores(status) {
            const subs = [];
            const tests = document.querySelectorAll('.st');
            const exams = document.querySelectorAll('.se');
            tests.forEach((t, i) => subs.push({ name: t.getAttribute('data-sub'), teacher: t.getAttribute('data-teacher'), test: parseFloat(t.value)||0, exam: parseFloat(exams[i].value)||0 }));
            
            await _supabase.from('students').update({ subjects: subs, result_status: status }).eq('id', activeId);
            alert("Score Recorded!"); init();
        }

        // --- PROFILE EDIT MODAL ---
        function openModal(id) {
            editingStudentId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('modalClass').value = s.grade_level;
            document.getElementById('modalGroup').value = s.student_group || 'GENERAL';
            document.getElementById('editModal').classList.add('active');
        }

        function closeModal() { document.getElementById('editModal').classList.remove('active'); }

        async function updateStudentProfile() {
            const grade_level = document.getElementById('modalClass').value;
            const student_group = document.getElementById('modalGroup').value;
            await _supabase.from('students').update({ grade_level, student_group }).eq('id', editingStudentId);
            closeModal();
            init();
        }

        // --- CURRICULUM ---
        async function addCurriculum() {
            const class_name = document.getElementById('currClass').value;
            const subject_group = document.getElementById('currGroup').value;
            const subject_name = document.getElementById('currSub').value.toUpperCase();
            const assigned_teacher = document.getElementById('currTeacher').value;
            if(!subject_name) return alert("Enter subject name");
            await _supabase.from('school_curriculum').insert([{ class_name, subject_group, subject_name, assigned_teacher }]);
            init();
        }

        function renderCurriculum() {
            document.getElementById('curriculumTable').innerHTML = curriculum.map(c => `<tr><td class="p-4">${c.class_name}</td><td class="p-4">${c.subject_group}</td><td class="p-4 text-blue-600">${c.subject_name}</td><td class="p-4">${c.assigned_teacher || '-'}</td><td class="p-4 text-right"><button onclick="deleteCurr('${c.id}')" class="text-red-400 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td></tr>`).join('');
            lucide.createIcons();
        }

        async function deleteCurr(id) { if(confirm("Remove subject?")) { await _supabase.from('school_curriculum').delete().eq('id', id); init(); } }
        async function toggleSuspension(id, cur) { await _supabase.from('students').update({ status: cur === 'Suspended' ? 'Active' : 'Suspended' }).eq('id', id); init(); }
        function handleLogout() { _supabase.auth.signOut().then(() => window.location.replace('login.html')); }
        
        window.onload = init;
    </script>
</body>
</html>
