<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | MSS Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .sidebar-transition { transition: all 0.3s ease-in-out; }
        @media (max-width: 768px) { .sidebar-closed { transform: translateX(-100%); } }
        .premium-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-radius: 12px; transition: all 0.2s; color: #cbd5e1;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }
        .hidden-row { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 flex min-h-screen">

    <aside id="sidebar" class="sidebar-transition fixed inset-y-0 left-0 z-50 w-72 premium-bg text-white p-6 shadow-2xl">
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-3">
                <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-10 w-10">
                <span class="font-black tracking-tighter text-xl italic">MSS ADMIN</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-white/10 rounded-lg">
                <i data-lucide="x"></i>
            </button>
        </div>

        <nav class="space-y-2">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 ml-2">Management</p>
            <a href="#" class="nav-item active"><i data-lucide="users" class="w-5 h-5"></i> Student Directory</a>
            
            <a href="Report Entry.html" class="nav-item hover:scale-[1.02] transition-transform">
                <i data-lucide="award" class="w-5 h-5 text-yellow-400"></i> Report Card Entry
            </a>
            
            <a href="#" class="nav-item"><i data-lucide="shield-check" class="w-5 h-5"></i> CBT Control</a>
            
            <div class="pt-10">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 ml-2">Account</p>
                <button onclick="handleLogout()" class="nav-item w-full text-red-400 hover:bg-red-400/10">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                </button>
            </div>
        </nav>
    </aside>

    <main class="flex-1 md:ml-72 transition-all duration-300">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200 px-8 py-4 flex justify-between items-center">
            <button onclick="toggleSidebar()" class="md:hidden p-2 bg-slate-100 rounded-lg">
                <i data-lucide="menu"></i>
            </button>
            <div class="relative w-full max-w-md hidden md:block">
                <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-slate-400"></i>
                <input type="text" id="searchInput" oninput="filterStudents()" placeholder="Search 170+ students..." class="w-full pl-10 pr-4 py-2 bg-slate-100 border-none rounded-xl focus:ring-2 ring-blue-500 outline-none text-sm font-medium">
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-black text-slate-800 uppercase italic">Admin Portal</p>
                    <p id="admin-email" class="text-[10px] text-slate-400 font-bold">Verifying...</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-blue-900 flex items-center justify-center text-white font-black text-xs">AD</div>
            </div>
        </header>

        <div class="p-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tighter italic">STUDENT DIRECTORY</h2>
                    <p class="text-slate-500 text-sm font-medium">Manage student status and access academic tools.</p>
                </div>
                <div class="flex gap-2">
                    <button class="bg-blue-900 text-white px-6 py-2.5 rounded-xl font-black text-xs shadow-lg flex items-center gap-2">
                        <i data-lucide="user-plus" class="w-4 h-4"></i> ADD STUDENT
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <th class="p-5 text-left">Student Info</th>
                            <th class="p-5 text-center">Class</th>
                            <th class="p-5 text-center">CBT Access</th>
                            <th class="p-5 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
        }

        async function checkAdminAccess() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.replace('login.html'); return; }

            const { data: profile } = await _supabase.from('students').select('is_admin').eq('id', session.user.id).single();
            if (!profile || !profile.is_admin) {
                window.location.replace('conf dshb.html');
            } else {
                document.getElementById('admin-email').innerText = session.user.email;
                loadAllStudents();
            }
        }

        async function loadAllStudents() {
            const { data, error } = await _supabase.from('students').select('*').order('full_name');
            if (data) renderTable(data);
            lucide.createIcons();
        }

        function renderTable(list) {
            const tbody = document.getElementById('student-table-body');
            tbody.innerHTML = list.map(st => `
                <tr class="student-row border-b border-slate-50 hover:bg-slate-50/50 transition-colors" data-search="${st.full_name}">
                    <td class="p-5">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-full bg-blue-100 flex items-center justify-center font-black text-blue-900 text-xs">${st.full_name.charAt(0)}</div>
                            <div>
                                <p class="text-sm font-black text-slate-800">${st.full_name}</p>
                                <p class="text-[10px] text-slate-400 font-bold">${st.id.substring(0,8)}</p>
                            </div>
                        </div>
                    </td>
                    <td class="p-5 text-center text-xs font-bold text-slate-600 uppercase">${st.grade_level || '---'}</td>
                    <td class="p-5 text-center">
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${st.status === 'Active' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                            ${st.status || 'Inactive'}
                        </span>
                    </td>
                    <td class="p-5 text-right">
                        <div class="flex justify-end gap-2">
                            <a href="Report Entry.html" class="p-2 bg-yellow-50 text-yellow-600 rounded-lg hover:bg-yellow-600 hover:text-white transition shadow-sm" title="Manage Results">
                                <i data-lucide="award" class="w-4 h-4"></i>
                            </a>
                            <button class="p-2 bg-slate-100 text-slate-400 rounded-lg hover:text-red-600 transition">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterStudents() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.student-row').forEach(row => {
                row.classList.toggle('hidden-row', !row.getAttribute('data-search').toLowerCase().includes(val));
            });
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.replace('login.html');
        }

        window.onload = checkAdminAccess;
    </script>
</body>
</html>
