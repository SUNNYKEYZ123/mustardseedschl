<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Controller | Mustard Seed</title>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .published { background: #dcfce7; color: #166534; }
        .unpublished { background: #fee2e2; color: #991b1b; }
        /* Hide content until admin status is fully verified */
        body { display: none; }
    </style>
</head>
<body class="flex">

    <aside class="w-64 bg-slate-900 h-screen sticky top-0 text-white p-6 flex flex-col">
        <div class="mb-10 uppercase font-black text-blue-400">MSS Control Center</div>
        <nav class="space-y-2 flex-1">
            <a href="admin2.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 text-sm font-bold">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="broadsheet.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 text-sm font-bold">
                <i data-lucide="file-text"></i> Broadsheet
            </a>
            <button class="w-full flex items-center gap-3 p-3 rounded-lg bg-blue-600 text-sm font-bold">
                <i data-lucide="settings"></i> Result Manager
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black uppercase italic">Academic Report Manager</h1>
                <p class="text-slate-500 font-bold text-xs">Manage publishing and generate student report cards</p>
            </div>
            <select id="classSelect" onchange="loadClassData()" class="p-3 rounded-xl border-2 border-slate-300 font-bold uppercase">
                <option value="">Select Class...</option>
                <option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
                <option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
            </select>
        </header>

        <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b">
                    <tr>
                        <th class="p-4">Student</th>
                        <th class="p-4">Prev Term Avg</th>
                        <th class="p-4">This Term Avg</th>
                        <th class="p-4 text-center">Status</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="controlTable" class="divide-y text-sm font-bold uppercase">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // Initialize Supabase Client
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');
        
        // 1. STRICT AUTHENTICATION GUARD: Verify user session instantly
        async function checkAdminAuth() {
            const { data: { session }, error } = await _supabase.auth.getSession();
            
            if (error || !session) {
                alert("Unauthorized Access! Please log in first.");
                window.location.href = "login.html"; // Change this if your login filename is different
                return false;
            }

            // Reveal the HTML document layout once verified
            document.body.style.display = "flex";
            return true;
        }

        // Run security verification check immediately
        checkAdminAuth();

        // 2. DATA RENDERING AND AGGREGATION
        async function loadClassData() {
            // Re-check authentication context before querying
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return;

            const cls = document.getElementById('classSelect').value;
            if(!cls) return;

            const { data: students, error } = await _supabase.from('students').select('*').eq('grade_level', cls);
            
            if (error) {
                alert("Error retrieving student database records: " + error.message);
                return;
            }

            document.getElementById('controlTable').innerHTML = students.map(s => {
                const t1Avg = calculateAvg(s.term_data?.term1 || []);
                const t2Avg = calculateAvg(s.term_data?.term2 || []);
                const isPublished = s.is_published || false;

                return `
                    <tr class="hover:bg-slate-50">
                        <td class="p-4">${s.full_name}</td>
                        <td class="p-4 text-slate-400">${t1Avg}%</td>
                        <td class="p-4 text-blue-600">${t2Avg}%</td>
                        <td class="p-4 text-center">
                            <span class="status-badge ${isPublished ? 'published' : 'unpublished'}">
                                ${isPublished ? 'PUBLISHED' : 'HIDDEN'}
                            </span>
                        </td>
                        <td class="p-4 text-right space-x-2">
                            <button onclick="togglePublish('${s.id}', ${!isPublished})" class="text-[10px] bg-slate-900 text-white px-3 py-2 rounded-lg transition hover:bg-slate-700">
                                ${isPublished ? 'Unpublish' : 'Publish'}
                            </button>
                            <button onclick="viewReport('${s.id}')" class="text-[10px] bg-blue-600 text-white px-3 py-2 rounded-lg transition hover:bg-blue-500">
                                <i data-lucide="external-link" class="w-3 h-3 inline"></i> View Card
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        function calculateAvg(data) {
            if(!data.length) return 0;
            let total = 0;
            data.forEach(x => total += (parseFloat(x.test)||0) + (parseFloat(x.exam)||0));
            return (total / data.length).toFixed(1);
        }

        // 3. SECURE ACTION EXECUTION
        async function togglePublish(id, status) {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                alert("Action denied: Active session not detected.");
                return;
            }

            const { error } = await _supabase.from('students').update({ is_published: status }).eq('id', id);
            
            if (error) {
                alert("Update failed! Ensure your database Row-Level Security policies permit admin operations.");
            } else {
                loadClassData();
            }
        }

        function viewReport(id) {
            window.open(`report_card.html?studentId=${id}`, '_blank');
        }
    </script>
</body>
</html>
