<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | MSS Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .sidebar-transition { transition: all 0.3s ease-in-out; }
        @media (max-width: 768px) { .sidebar-closed { transform: translateX(-100%); } }
        .premium-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            position: relative;
            overflow: hidden;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.2s;
            color: #cbd5e1;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-active { background: #2563eb; color: white; font-weight: bold; }
        .badge-soon {
            font-size: 9px; background: #f59e0b; color: #451a03; padding: 2px 6px; border-radius: 4px; font-weight: 900;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex">

    <aside id="sidebar" class="sidebar-transition w-72 bg-slate-950 text-white flex flex-col h-screen z-50 fixed md:relative sidebar-closed md:translate-x-0 shadow-2xl border-r border-slate-800">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="https://sunnykeyz123.github.io/mustardseedschl/images/Logo.png" class="h-8 w-8">
                <span class="font-black text-blue-400 tracking-tighter">MSS CONTROL</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-500"><i data-lucide="x"></i></button>
        </div>
        <nav class="flex-1 overflow-y-auto p-4 space-y-6">
            <div>
                <p class="text-[10px] font-black text-slate-500 uppercase px-3 mb-3">Menu</p>
                <div class="space-y-1">
                    <a href="#" class="nav-item nav-active"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</a>
                    <a href="https://sunnykeyz123.github.io/mustardseedcbt/CBT.html" class="nav-item"><i data-lucide="pen-tool" class="w-5 h-5"></i> CBT Exam</a>
                </div>
            </div>
            <div>
                <p class="text-[10px] font-black text-slate-500 uppercase px-3 mb-3">Academic Tools</p>
                <div class="space-y-1">
                    <a href="#" class="nav-item justify-between"><span class="flex items-center gap-3"><i data-lucide="file-check" class="w-5 h-5"></i> Result Checker</span><span class="badge-soon">Soon</span></a>
                </div>
            </div>
            <div>
                <p class="text-[10px] font-black text-slate-500 uppercase px-3 mb-3">Settings</p>
                <div class="space-y-1">
                    <a href="#" onclick="document.getElementById('photoInput').click()" class="nav-item"><i data-lucide="camera" class="w-5 h-5"></i> Update Photo</a>
                    <button onclick="handleLogout()" class="nav-item w-full text-left text-red-400"><i data-lucide="log-out" class="w-5 h-5"></i> Logout</button>
                </div>
            </div>
        </nav>
    </aside>

    <div class="flex-1 h-screen overflow-y-auto">
        <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-40">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-blue-800 rounded-lg transition"><i data-lucide="menu"></i></button>
            <div class="flex items-center gap-3 bg-blue-800/50 px-3 py-1 rounded-full border border-white/10">
                <span id="header-name-top" class="text-xs font-medium">Student</span>
                <img id="header-img" src="" class="h-7 w-7 rounded-full border border-white/20 hidden object-cover">
            </div>
        </nav>

        <div class="container mx-auto mt-6 px-4 pb-20 max-w-5xl">
            <div class="premium-bg p-8 md:p-12 rounded-[2.5rem] shadow-2xl flex flex-col md:flex-row items-center gap-8 mb-10 border border-white/10">
                <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-600 rounded-full blur-[120px] opacity-20"></div>
                
                <div class="relative group z-10" onclick="document.getElementById('photoInput').click()">
                    <div class="w-36 h-36 rounded-[2rem] bg-white/5 border-2 border-white/20 flex items-center justify-center overflow-hidden cursor-pointer shadow-inner">
                        <img id="profile-img" src="" class="hidden w-full h-full object-cover">
                        <i id="placeholder-icon" data-lucide="user" class="w-16 h-16 text-white/20"></i>
                    </div>
                    <div class="absolute -bottom-2 -right-2 bg-blue-500 text-white p-2 rounded-xl border-4 border-slate-900 shadow-xl">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </div>
                </div>

                <div class="text-center md:text-left z-10 flex-1">
                    <div class="flex flex-wrap gap-2 justify-center md:justify-start mb-3">
                        <span id="display-status" class="bg-yellow-400 text-blue-950 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-md">Loading...</span>
                        <span id="display-msid" class="bg-white/10 text-blue-100 px-3 py-1 rounded-full text-[10px] font-mono border border-white/10">MS-XXXXX</span>
                    </div>
                    <h2 id="display-fullname" class="text-4xl md:text-5xl font-black text-white tracking-tight">Loading...</h2>
                    <p id="display-email" class="text-blue-200/60 text-lg font-medium italic">---</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-8 rounded-3xl shadow-xl border-t-4 border-blue-900">
                    <h3 class="text-lg font-black text-slate-800 uppercase mb-6 flex items-center gap-2">Academic Details</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between border-b pb-2"><span class="text-gray-400">Grade</span><span id="display-grade" class="font-bold">---</span></div>
                        <div class="flex justify-between border-b pb-2"><span class="text-gray-400">Subject</span><span id="display-subject" class="font-bold text-blue-700">---</span></div>
                    </div>
                </div>
                <div class="bg-white p-8 rounded-3xl shadow-xl border-t-4 border-blue-900">
                    <h3 class="text-lg font-black text-slate-800 uppercase mb-6 flex items-center gap-2">Guardian Info</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between border-b pb-2"><span class="text-gray-400">Parent Name</span><span id="display-parent-name" class="font-bold">---</span></div>
                        <div class="flex justify-between border-b pb-2"><span class="text-gray-400">Contact</span><span id="display-parent-phone" class="font-bold">---</span></div>
                    </div>
                </div>
            </div>

            <div class="mt-10 p-4 bg-black/5 rounded-xl border border-dashed border-black/10">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">System Debugger</p>
                <div id="status-log" class="text-[12px] text-gray-600 font-mono">System standby...</div>
            </div>
        </div>
    </div>

    <input type="file" id="photoInput" class="hidden" accept="image/*" onchange="uploadPhoto(event)">

    <script>
        const _supabase = supabase.createClient('https://jqrcoqslmylmubxwfgyt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmNvcXNsbXlsbXVieHdmZ3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2ODc2NzgsImV4cCI6MjA4MDI2MzY3OH0.4bXOY35R3eGYZjPxtuJzvwifPEfHXr5UEdzFbB-caKU');

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-closed'); }
        function log(msg) { document.getElementById('status-log').innerText = msg; }

        async function loadProfile() {
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (!session) { window.location.href = 'login.html'; return; }

                log("Fetching data for: " + session.user.email);

                const { data: st, error } = await _supabase.from('students').select('*').eq('id', session.user.id).single();
                
                if (error) { log("Database Error: " + error.message); return; }

                if (st) {
                    document.getElementById('display-fullname').textContent = st.full_name || "New Student";
                    document.getElementById('display-grade').textContent = st.grade_level || "---";
                    document.getElementById('display-subject').textContent = st.subject || "---";
                    document.getElementById('display-parent-name').textContent = st.parent_name || "---";
                    document.getElementById('display-parent-phone').textContent = st.parent_phone || "---";
                    document.getElementById('display-email').textContent = session.user.email;
                    document.getElementById('display-status').textContent = st.status || "Pending";

                    if (st.avatar_url) {
                        log("Loading photo from: " + st.avatar_url);
                        const imgUrl = `${st.avatar_url}?t=${new Date().getTime()}`;
                        ['profile-img', 'header-img'].forEach(id => {
                            const el = document.getElementById(id);
                            el.src = imgUrl; 
                            el.classList.remove('hidden');
                        });
                        document.getElementById('placeholder-icon').classList.add('hidden');
                    } else {
                        log("No photo URL found in students table.");
                    }
                }
            } catch (err) { log("System Crash: " + err.message); }
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        async function uploadPhoto(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 1000 * 1024) { alert("File too big! Keep it under 1000KB (1MB)."); return; }

            const { data: { session } } = await _supabase.auth.getSession();
            // Use a specific folder inside the bucket
            const filePath = `avatars/${session.user.id}.png`;

            log("Uploading photo...");

            try {
                const { error: upErr } = await _supabase.storage.from('avatars').upload(filePath, file, { 
                    contentType: file.type, 
                    upsert: true 
                });
                
                if (upErr) { log("Storage Error: " + upErr.message); return; }

                const { data: { publicUrl } } = _supabase.storage.from('avatars').getPublicUrl(filePath);
                
                log("Photo uploaded. Updating record with: " + publicUrl);

                const { error: dbErr } = await _supabase.from('students').update({ avatar_url: publicUrl }).eq('id', session.user.id);
                
                if (dbErr) { log("Database Update Failed: " + dbErr.message); return; }
                
                log("Success! Refreshing...");
                setTimeout(() => location.reload(), 1000); 
            } catch (err) { log("Upload Crash: " + err.message); }
        }

        async function handleLogout() { await _supabase.auth.signOut(); window.location.replace('login.html'); }

        window.onload = loadProfile;
    </script>
</body>
</html>
